<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测速结果</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: #1a1d29;
            min-height: 100vh;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            background-color: #1a1d29;
            min-height: 100vh;
        }

        /* 头部区域 - 深色背景 */
        .header {
            background: linear-gradient(135deg, #252a3a 0%, #1a1d29 100%);
            padding: 20px;
            color: #fff;
            border-bottom: 1px solid #2d3142;
        }

        .header-top {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .back-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: #fff;
        }

        .header-title {
            flex: 1;
            text-align: center;
            font-size: 18px;
            font-weight: 500;
            margin-right: 32px;
        }

        .wifi-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .wifi-icon {
            width: 48px;
            height: 48px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wifi-icon svg {
            width: 28px;
            height: 28px;
            fill: #4a9eff;
        }

        .wifi-details h2 {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .wifi-details p {
            font-size: 13px;
            opacity: 0.8;
        }

        /* 内容区域 */
        .content {
            padding: 0;
        }

        .info-list {
            background-color: #252a3a;
            margin: 16px;
            border-radius: 12px;
            overflow: hidden;
        }

        .info-row {
            display: flex;
            padding: 16px 16px;
            border-bottom: 1px solid #2d3142;
            gap: 16px;
        }

        .info-item-half {
            flex: 1;
            display: flex;
            align-items: flex-start;
        }

        .info-item {
            display: flex;
            align-items: flex-start;
            padding: 16px 16px;
            border-bottom: 1px solid #2d3142;
        }

        .info-icon {
            width: 24px;
            height: 24px;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .info-icon svg {
            width: 20px;
            height: 20px;
            fill: #4a9eff;
        }

        .info-content {
            flex: 1;
        }

        .info-label {
            font-size: 13px;
            color: #8b92a8;
            margin-bottom: 4px;
        }

        .info-value {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .info-value-text {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
        }

        .info-value-unit {
            font-size: 13px;
            color: #8b92a8;
            font-weight: 400;
        }

        .tag {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .tag-blue {
            background-color: rgba(74, 158, 255, 0.15);
            color: #4a9eff;
        }

        .tag-green {
            background-color: rgba(74, 158, 255, 0.15);
            color: #4a9eff;
        }

        /* 网速卡片区域 */
        .speed-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 0 16px;
            margin: 0 0 16px 0;
        }

        .speed-card {
            background-color: #252a3a;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            border: 1px solid #2d3142;
        }

        .speed-card-icon {
            width: 40px;
            height: 40px;
            margin: 0 auto 8px;
            background: linear-gradient(135deg, rgba(74, 158, 255, 0.2) 0%, rgba(74, 158, 255, 0.1) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .speed-card-icon svg {
            width: 24px;
            height: 24px;
            fill: #4a9eff;
        }

        .speed-card-label {
            font-size: 13px;
            color: #8b92a8;
            margin-bottom: 8px;
        }

        .speed-card-value {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
        }

        .speed-card-unit {
            font-size: 14px;
            color: #8b92a8;
            font-weight: 400;
        }

        /* 延迟路径 */
        .latency-path {
            background-color: #252a3a;
            margin: 0 16px 16px;
            padding: 20px 16px;
            border-radius: 12px;
            border: 1px solid #2d3142;
        }

        .latency-title {
            font-size: 14px;
            color: #4a9eff;
            margin-bottom: 16px;
            text-align: center;
            font-weight: 500;
        }

        .latency-flow {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 4px;
        }

        .latency-node {
            text-align: center;
            flex: 1;
        }

        .latency-icon {
            width: 44px;
            height: 44px;
            margin: 0 auto 8px;
            background: linear-gradient(135deg, rgba(74, 158, 255, 0.2) 0%, rgba(74, 158, 255, 0.1) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .latency-icon svg {
            width: 24px;
            height: 24px;
            fill: #4a9eff;
        }

        .latency-node-name {
            font-size: 12px;
            color: #8b92a8;
            margin-bottom: 4px;
        }

        .latency-node-value {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
        }

        .latency-arrow {
            color: #4a9eff;
            font-size: 20px;
            padding: 0 4px;
            opacity: 0.6;
        }

        /* AI诊断建议 */
        .ai-diagnosis {
            background-color: #252a3a;
            margin: 0 16px 16px;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #2d3142;
        }

        .ai-diagnosis-title {
            font-size: 16px;
            font-weight: 600;
            color: #4a9eff;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ai-diagnosis-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: linear-gradient(180deg, #4a9eff 0%, #357abd 100%);
            border-radius: 2px;
        }

        .ai-diagnosis-content {
            font-size: 14px;
            color: #8b92a8;
            line-height: 1.6;
        }

        /* 按钮区域 */
        .buttons {
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            width: 100%;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4a9eff 0%, #357abd 100%);
            color: #fff;
        }

        .btn-primary:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .btn-secondary {
            background-color: #252a3a;
            color: #fff;
            border: 1px solid #2d3142;
        }

        .btn-secondary:active {
            background-color: #2d3142;
        }

        /* 在线终端 */
        .terminal-item {
            display: flex;
            align-items: center;
            padding: 16px 16px;
            border-bottom: 1px solid #2d3142;
            cursor: pointer;
        }

        .terminal-icon {
            width: 24px;
            height: 24px;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .terminal-icon svg {
            width: 20px;
            height: 20px;
            fill: #4a9eff;
        }

        .terminal-content {
            flex: 1;
        }

        .terminal-label {
            font-size: 13px;
            color: #8b92a8;
            margin-bottom: 4px;
        }

        .terminal-value {
            font-size: 15px;
            color: #fff;
        }

        .terminal-value span {
            color: #4a9eff;
            font-weight: 600;
        }

        .terminal-arrow {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .terminal-arrow svg {
            width: 16px;
            height: 16px;
            fill: #8b92a8;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div class="header-top">
                <div class="back-btn">
                    <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                </div>
                <div class="header-title">检测结果</div>
            </div>
            <div class="wifi-info">
                <div class="wifi-icon">
                    <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
                </div>
                <div class="wifi-details">
                    <h2>X-WRT_419E_2.4G</h2>
                    <p>V2020CA</p>
                </div>
            </div>
        </div>

        <!-- 内容区域 -->
        <div class="content">
            <!-- 信息列表 -->
            <div class="info-list">
                <!-- 信号强度和WiFi干扰并排 -->
                <div class="info-row">
                    <div class="info-item-half">
                        <div class="info-icon">
                            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                        </div>
                        <div class="info-content">
                            <div class="info-label">信号强度</div>
                            <div class="info-value">
                                <span class="info-value-text">-50</span>
                                <span class="info-value-unit">dBm</span>
                            </div>
                        </div>
                    </div>
                    <div class="info-item-half">
                        <div class="info-icon">
                            <svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9v7c0 1.1.9 2 2 2h4v-8H5v-1c0-3.87 3.13-7 7-7s7 3.13 7 7v1h-4v8h4c1.1 0 2-.9 2-2v-7c0-4.97-4.03-9-9-9z"/></svg>
                        </div>
                        <div class="info-content">
                            <div class="info-label">Wi-Fi 干扰</div>
                            <div class="info-value">
                                <span class="info-value-text" style="font-size: 15px; font-weight: 500;">干扰较少</span>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <!-- 网速卡片 -->
            <div class="speed-cards">
                <div class="speed-card">
                    <div class="speed-card-icon">
                        <svg viewBox="0 0 24 24"><path d="M19 15l-6 6-1.42-1.42L15.17 16H4V4h2v10h9.17l-3.59-3.58L13 9l6 6z"/></svg>
                    </div>
                    <div class="speed-card-label">下行网速</div>
                    <div class="speed-card-value">
                        4.68 <span class="speed-card-unit">MB/s</span>
                    </div>
                </div>
                <div class="speed-card">
                    <div class="speed-card-icon">
                        <svg viewBox="0 0 24 24" style="transform: rotate(180deg);"><path d="M19 15l-6 6-1.42-1.42L15.17 16H4V4h2v10h9.17l-3.59-3.58L13 9l6 6z"/></svg>
                    </div>
                    <div class="speed-card-label">上行网速</div>
                    <div class="speed-card-value">
                        4.68 <span class="speed-card-unit">MB/s</span>
                    </div>
                </div>
            </div>

            <!-- 延迟路径 -->
            <div class="latency-path">
                <div class="latency-title">网络延迟分析</div>
                <div class="latency-flow">
                    <div class="latency-node">
                        <div class="latency-icon">
                            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                        </div>
                        <div class="latency-node-name">内网</div>
                        <div class="latency-node-value">4ms</div>
                    </div>
                    <div class="latency-arrow">→</div>
                    <div class="latency-node">
                        <div class="latency-icon">
                            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15v-2h4v2h-4zm2-13.75c2.07 2.14 4.51 3.34 8 3.84v1.5c-3.66-.49-6.35-1.79-8-3.98-1.65 2.19-4.34 3.49-8 3.98v-1.5c3.49-.5 5.93-1.7 8-3.84z"/></svg>
                        </div>
                        <div class="latency-node-name">运营商</div>
                        <div class="latency-node-value">10ms</div>
                    </div>
                    <div class="latency-arrow">→</div>
                    <div class="latency-node">
                        <div class="latency-icon">
                            <svg viewBox="0 0 24 24"><path d="M19 5v2h-4V5h4M9 5v6H5V5h4m10 8v6h-4v-6h4M9 17v2H5v-2h4M21 3h-8v6h8V3zM11 3H3v10h8V3zm10 8h-8v10h8V11zM11 15H3v6h8v-6z"/></svg>
                        </div>
                        <div class="latency-node-name">互联网</div>
                        <div class="latency-node-value">30ms</div>
                    </div>
                </div>
            </div>

            <!-- AI诊断建议 -->
            <div class="ai-diagnosis">
                <div class="ai-diagnosis-title">AI诊断结果建议</div>
                <div class="ai-diagnosis-content">
                    您的网络状态良好，信号强度优秀，Wi-Fi干扰较少。建议保持当前路由器位置，如需更高速度可考虑升级宽带套餐。
                </div>
            </div>

            <!-- 按钮 -->
            <div class="buttons">
                <button class="btn btn-primary">分享</button>
                <button class="btn btn-secondary">测试详情</button>
                <button class="btn btn-secondary">重新检测</button>
            </div>
        </div>
    </div>
</body>
</html>
