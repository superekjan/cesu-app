<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>网络知识库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #131524;
            --bg-secondary: #131524;
            --bg-card: rgba(38, 41, 58, 0.65);
            --bg-card-hover: rgba(46, 49, 69, 0.75);
            --accent-blue: #5b8def;
            --accent-blue-light: #7ca6f3;
            --accent-cyan: #4ecdc4;
            --accent-green: #5dbe8d;
            --accent-orange: #f4a261;
            --accent-purple: #9b8bf4;
            --text-primary: #e8eaf0;
            --text-secondary: #9aa3b2;
            --text-tertiary: #6b7280;
            --border-subtle: rgba(91, 141, 239, 0.15);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 0 16px;
        }

        /* 头部 */
        .header {
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.8) 0%, rgba(13, 17, 23, 0) 100%);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-subtle);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--text-primary);
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* 搜索区域 */
        .search-section {
            padding: 12px 16px;
        }

        .search-box {
            position: relative;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            overflow: hidden;
        }

        .search-input {
            width: 100%;
            padding: 14px 44px 14px 16px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
        }

        .search-input::placeholder {
            color: var(--text-tertiary);
        }

        .search-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            fill: var(--text-tertiary);
        }

        /* 分类标签 */
        .category-section {
            padding: 0 16px 20px 16px;
        }

        .category-list {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }

        .category-list::-webkit-scrollbar {
            display: none;
        }

        .category-tag {
            flex-shrink: 0;
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .category-tag:hover {
            background: rgba(91, 141, 239, 0.1);
            border-color: rgba(91, 141, 239, 0.3);
        }

        .category-tag.active {
            background: linear-gradient(135deg, rgba(91, 141, 239, 0.2) 0%, rgba(91, 141, 239, 0.1) 100%);
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        /* 知识列表 */
        .knowledge-section {
            padding: 0 16px 20px 16px;
        }

        .knowledge-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .knowledge-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .knowledge-card:hover {
            border-color: rgba(91, 141, 239, 0.3);
            transform: translateY(-2px);
        }

        .knowledge-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 10px;
        }

        .knowledge-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, rgba(91, 141, 239, 0.2) 0%, rgba(91, 141, 239, 0.1) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .knowledge-icon svg {
            width: 20px;
            height: 20px;
            fill: var(--accent-blue);
        }

        .knowledge-title {
            flex: 1;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.4;
        }

        .knowledge-category {
            display: inline-block;
            padding: 3px 8px;
            background: rgba(91, 141, 239, 0.1);
            border-radius: 4px;
            font-size: 11px;
            color: var(--accent-blue);
            margin-bottom: 8px;
        }

        .knowledge-summary {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .knowledge-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-subtle);
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .meta-item svg {
            width: 14px;
            height: 14px;
            fill: var(--text-tertiary);
        }

        /* 详情弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            max-width: 440px;
            width: 100%;
            max-height: 80vh;
            overflow: hidden;
            animation: modalSlideUp 0.3s ease;
        }

        @keyframes modalSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
            padding-right: 16px;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .modal-close svg {
            width: 18px;
            height: 18px;
            fill: var(--text-secondary);
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            max-height: calc(80vh - 80px);
        }

        .modal-category {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(91, 141, 239, 0.1);
            border-radius: 4px;
            font-size: 12px;
            color: var(--accent-blue);
            margin-bottom: 16px;
        }

        .modal-text {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .modal-text p {
            margin-bottom: 12px;
        }

        .modal-text strong {
            color: var(--text-primary);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            background: rgba(88, 166, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .empty-icon svg {
            width: 40px;
            height: 40px;
            fill: var(--accent-blue);
        }

        .empty-title {
            font-size: 16px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .empty-desc {
            font-size: 13px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <div class="header-top">
                <div class="back-btn" onclick="history.back()">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                    </svg>
                </div>

        <!-- 搜索区域 -->
        <section class="search-section">

                    <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>

        <!-- 分类标签 -->
        <section class="category-section">

                <div class="category-tag" data-category="wifi" onclick="filterCategory('wifi')">WiFi问题</div>
                <div class="category-tag" data-category="speed" onclick="filterCategory('speed')">网速优化</div>
                <div class="category-tag" data-category="security" onclick="filterCategory('security')">网络安全</div>
                <div class="category-tag" data-category="device" onclick="filterCategory('device')">设备维护</div>
                <div class="category-tag" data-category="basic" onclick="filterCategory('basic')">基础知识</div>
            </div>
        </section>

        <!-- 知识列表 -->
        <section class="knowledge-section">
            <div class="knowledge-list" id="knowledgeList">
                <!-- 动态生成 -->
            </div>
        </section>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal-overlay" id="detailModal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle"></h3>
                <button class="modal-close" onclick="closeModal()">
                    <svg viewBox="0 0 24 24">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <span class="modal-category" id="modalCategory"></span>
                <div class="modal-text" id="modalContent"></div>
            </div>
        </div>
    </div>

        let currentCategory = 'all';

        function init() {
            renderKnowledgeList();

        function renderKnowledgeList() {
            const listContainer = document.getElementById('knowledgeList');
            
            // 过滤数据
            let filteredData = knowledgeData;

                filteredData = filteredData.filter(item => item.category === currentCategory);
            }
            
            if (searchKeyword) {
                filteredData = filteredData.filter(item => 
                    item.title.toLowerCase().includes(searchKeyword.toLowerCase()) ||
                    item.summary.toLowerCase().includes(searchKeyword.toLowerCase())
                );
            }
            
            // 空状态
            if (filteredData.length === 0) {
                listContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <svg viewBox="0 0 24 24">
                                <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>

        // 分类过滤
        function filterCategory(category) {
            currentCategory = category;
            
            // 更新标签样式
            document.querySelectorAll('.category-tag').forEach(tag => {
                tag.classList.remove('active');
                if (tag.dataset.category === category) {
                    tag.classList.add('active');
                }
            });
            
            renderKnowledgeList();
        }

        // 搜索处理
        function handleSearch() {
            searchKeyword = document.getElementById('searchInput').value.trim();
            renderKnowledgeList();
        }

        // 显示详情
        function showDetail(id) {
            const item = knowledgeData.find(k => k.id === id);
            if (!item) return;
            
            document.getElementById('modalTitle').textContent = item.title;
            document.getElementById('modalCategory').textContent = item.categoryName;
            document.getElementById('modalContent').innerHTML = item.content;
            document.getElementById('detailModal').classList.add('active');
            
            // 增加浏览量
            item.views++;
            renderKnowledgeList();
        }

        // 关闭弹窗
        function closeModal(event) {
            if (!event || event.target.id === 'detailModal') {
                document.getElementById('detailModal').classList.remove('active');
            }
        }

        // 格式化数字
        function formatNumber(num) {
            if (num >= 10000) {
                return (num / 10000).toFixed(1) + 'w';
            }
            if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'k';
            }
            return num.toString();
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
