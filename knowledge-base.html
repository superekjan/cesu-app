<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>网络知识库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #131524;
            --bg-secondary: #131524;
            --bg-card: rgba(38, 41, 58, 0.65);
            --bg-card-hover: rgba(46, 49, 69, 0.75);
            --accent-blue: #5b8def;
            --accent-blue-light: #7ca6f3;
            --accent-cyan: #4ecdc4;
            --accent-green: #5dbe8d;
            --accent-orange: #f4a261;
            --accent-purple: #9b8bf4;
            --text-primary: #e8eaf0;
            --text-secondary: #9aa3b2;
            --text-tertiary: #6b7280;
            --border-subtle: rgba(91, 141, 239, 0.15);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 0 16px;
        }

        /* 页面标题 */
        .page-title {
            text-align: center;
            padding: 20px;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* 知识列表 - 简洁列表样式 */
        .knowledge-section {
            padding: 20px;
        }

        .knowledge-list {
            display: flex;
            flex-direction: column;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-subtle);
            overflow: hidden;
        }

        /* 广告轮播图 */
        .ad-carousel {
            position: relative;
            width: 100%;
            height: 210px;
            overflow: hidden;
            border-bottom: 1px solid var(--border-subtle);
            cursor: pointer;
        }

        .ad-carousel-track {
            display: flex;
            transition: transform 0.5s ease;
            height: 100%;
        }

        .ad-slide {
            min-width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ad-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .ad-dots {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 2;
        }

        .ad-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .ad-dot.active {
            background: rgba(255, 255, 255, 0.95);
            transform: scale(1.2);
        }

        .knowledge-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            cursor: pointer;
            transition: background 0.2s ease;
            border-bottom: 1px solid var(--border-subtle);
        }

        .knowledge-item:last-child {
            border-bottom: none;
        }

        .knowledge-item:hover {
            background: var(--bg-card-hover);
        }

        .knowledge-item:active {
            background: rgba(91, 141, 239, 0.1);
        }

        .knowledge-text {
            flex: 1;
            padding-right: 12px;
        }

        .knowledge-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .knowledge-thumb {
            width: 70px;
            height: 50px;
            border-radius: 4px;
            background: linear-gradient(135deg, rgba(91, 141, 239, 0.15) 0%, rgba(78, 205, 196, 0.15) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }

        .knowledge-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
        }

        /* 详情弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            max-width: 440px;
            width: 100%;
            max-height: 80vh;
            overflow: hidden;
            animation: modalSlideUp 0.3s ease;
        }

        @keyframes modalSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
            padding-right: 16px;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .modal-close svg {
            width: 18px;
            height: 18px;
            fill: var(--text-secondary);
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            max-height: calc(80vh - 80px);
        }

        .modal-category {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(91, 141, 239, 0.1);
            border-radius: 4px;
            font-size: 12px;
            color: var(--accent-blue);
            margin-bottom: 16px;
        }

        .modal-text {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .modal-text p {
            margin-bottom: 12px;
        }

        .modal-text strong {
            color: var(--text-primary);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            background: rgba(88, 166, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .empty-icon svg {
            width: 40px;
            height: 40px;
            fill: var(--accent-blue);
        }

        .empty-title {
            font-size: 16px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .empty-desc {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 底部导航栏 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(22, 27, 34, 0.98);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 calc(12px + env(safe-area-inset-bottom));
            z-index: 100;
            max-width: 480px;
            margin: 0 auto;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 6px 20px;
            cursor: pointer;
            text-decoration: none;
            border-radius: 12px;
        }

        .nav-item.active {
            background: rgba(88, 166, 255, 0.1);
        }

        .nav-item.active .nav-icon {
            fill: var(--accent-blue);
        }

        .nav-item.active .nav-label {
            color: var(--accent-blue);
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            fill: var(--text-tertiary);
        }

        .nav-label {
            font-size: 11px;
            color: var(--text-tertiary);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 页面标题 -->
        <div class="page-title">网络知识库</div>

        <!-- 知识列表 -->
        <section class="knowledge-section">
            <div class="knowledge-list" id="knowledgeList">
                <!-- 广告轮播图 -->

            </div>

    <!-- 详情弹窗 -->
    <div class="modal-overlay" id="detailModal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle"></h3>
                <button class="modal-close" onclick="closeModal()">
                    <svg viewBox="0 0 24 24">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <span class="modal-category" id="modalCategory"></span>
                <div class="modal-text" id="modalContent"></div>
            </div>
        </div>
    </div>

    <script>
        // 知识库数据
        const knowledgeData = [
            {
                id: 9,
                title: '什么是内网网络？',
                category: 'basic',
                categoryName: '基础知识',
                summary: '内网（局域网）是指在一定范围内组建的私有网络，家庭和办公室中的网络都属于内网。',
                content: `<p><strong>内网（局域网）的定义</strong></p>
                <p>内网，即局域网（Local Area Network，LAN），是指在一定地理范围内（如家庭、办公室、学校）组建的私有网络。</p>
                <p><strong>内网的特点</strong></p>
                <p>• 覆盖范围有限，通常在几千米以内</p>

                <p>内网设备通常使用私有IP地址，常见的有：</p>

                <p>• 172.16.x.x - 172.31.x.x</p>
                <p>这些地址无法直接从外网访问，需要通过NAT技术转换。</p>`,
                views: 4521,
                likes: 312,
                link: 'https://mp.weixin.qq.com/s/KWOnSgD4jGdUUJDuST9pMQ'
            },
            {
                id: 10,
                title: 'WiFi频道2.4G/5G的区别',
                category: 'basic',
                categoryName: '基础知识',
                summary: '2.4GHz覆盖广但速度慢，5GHz速度快但覆盖小，根据实际需求选择合适的频段。',

                <p>• 覆盖范围广，穿墙能力强</p>

                <p><strong>使用建议</strong></p>
                <p>• 手机、电脑等需要高速上网的设备连接5GHz</p>
                <p>• 智能家居设备、距离较远的设备连接2.4GHz</p>
                <p>• 根据实际使用场景灵活切换</p>`,
                views: 11234,
                likes: 834,

            {

                summary: 'WiFi 6是最新的无线网络标准，提供更高的速度、更低的延迟和更好的并发性能。',
                content: `<p><strong>WiFi 6简介</strong></p>
                <p>WiFi 6（802.11ax）是最新一代的WiFi标准，相比WiFi 5（802.11ac）有了质的飞跃。</p>
                <p><strong>WiFi 6的核心优势</strong></p>
                <p>• 更高的速度：最高可达9.6Gbps</p>

                <p>• 更好的并发能力：支持更多设备同时连接</p>

                <p><strong>关键技术特性</strong></p>
                <p>• OFDMA：提高网络效率，降低延迟</p>
                <p>• MU-MIMO：支持多用户同时传输</p>
                <p>• 1024-QAM：提升数据密度，增加吞吐量</p>
                <p><strong>使用建议</strong></p>
                <p>• 需要更换支持WiFi 6的路由器</p>
                <p>• 设备也需要支持WiFi 6才能享受全部特性</p>
                <p>• 对于多设备家庭，WiFi 6能显著改善体验</p>`,

                likes: 567,
                link: 'https://mp.weixin.qq.com/s/ZtxONIQi3XXIRVRzzqzhCg'

            {
                id: 12,

                category: 'device',
                categoryName: '设备维护',
                summary: '了解路由器的基本功能、设置方法和维护技巧，让你的网络更稳定高效。',
                content: `<p><strong>路由器的主要功能</strong></p>
                <p>• 网络地址转换（NAT）</p>
                <p>• DHCP动态IP分配</p>
                <p>• 无线网络发射</p>

                <p><strong>路由器设置建议</strong></p>
                <p>• 修改默认管理员密码</p>

                <p><strong>路由器摆放技巧</strong></p>
                <p>• 放置在房屋中央位置</p>
                <p>• 远离电器和金属物体</p>
                <p>• 天线垂直放置</p>
                <p>• 适当抬高位置</p>`,

                likes: 678,
                link: 'https://mp.weixin.qq.com/s/sO_qIdTrdqbkECoJBmhvTQ'
            },
            {
                id: 13,

                content: `<p><strong>第一步：排查带宽占用</strong></p>
                <p>检查是否有设备在下载大文件、观看高清视频或进行在线游戏，这些都会占用大量带宽。</p>

                <p><strong>第五步：联系运营商</strong></p>

        let currentCategory = 'all';
        let searchKeyword = '';

        // 初始化
        function init() {
            renderKnowledgeList();
        }

        // 渲染知识列表
        function renderKnowledgeList() {
            const listContainer = document.getElementById('knowledgeList');
            
            // 过滤数据
            let filteredData = knowledgeData;
            
            if (currentCategory !== 'all') {
                filteredData = filteredData.filter(item => item.category === currentCategory);
            }
            
            if (searchKeyword) {
                filteredData = filteredData.filter(item => 
                    item.title.toLowerCase().includes(searchKeyword.toLowerCase()) ||
                    item.summary.toLowerCase().includes(searchKeyword.toLowerCase())
                );
            }
            
            // 空状态
            if (filteredData.length === 0) {
                listContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <svg viewBox="0 0 24 24">
                                <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                            </svg>
                        </div>
                        <div class="empty-title">未找到相关内容</div>
                        <div class="empty-desc">请尝试其他关键词或分类</div>
                    </div>
                `;
                return;
            }
            
            // 保留轮播图，只渲染知识列表项
            const itemsHTML = filteredData.map((item, index) => {
                // 使用 ico_1 到 ico_8 循环分配图片
                const icoIndex = (index % 8) + 1;
                const clickHandler = item.link ? `openArticle('${item.link}')` : `showDetail(${item.id})`;
                return `
                <div class="knowledge-item" onclick="${clickHandler}">
                    <div class="knowledge-text">
                        <div class="knowledge-title">${item.title}</div>
                    </div>
                    <div class="knowledge-thumb">
                        <img src="img/ico_${icoIndex}.png" alt="${item.title}">
                    </div>
                </div>
            `}).join('');

            // 保留轮播图，只更新列表项
            const carousel = document.getElementById('adCarousel');
            listContainer.innerHTML = '';
            listContainer.appendChild(carousel);
            listContainer.insertAdjacentHTML('beforeend', itemsHTML);
        }

        // 分类过滤
        function filterCategory(category) {
            currentCategory = category;
            
            // 更新标签样式
            document.querySelectorAll('.category-tag').forEach(tag => {
                tag.classList.remove('active');
                if (tag.dataset.category === category) {
                    tag.classList.add('active');
                }
            });
            
            renderKnowledgeList();
        }

        // 搜索处理
        function handleSearch() {
            searchKeyword = document.getElementById('searchInput').value.trim();
            renderKnowledgeList();
        }

        // 显示详情
        function showDetail(id) {
            const item = knowledgeData.find(k => k.id === id);
            if (!item) return;

            document.getElementById('modalTitle').textContent = item.title;
            document.getElementById('modalCategory').textContent = item.categoryName;
            document.getElementById('modalContent').innerHTML = item.content;
            document.getElementById('detailModal').classList.add('active');

            // 增加浏览量
            item.views++;
            renderKnowledgeList();
        }

        // 打开外部文章链接
        function openArticle(url) {
            window.open(url, '_blank');
        }

        // 关闭弹窗
        function closeModal(event) {
            if (!event || event.target.id === 'detailModal') {
                document.getElementById('detailModal').classList.remove('active');
            }
        }

        // 格式化数字
        function formatNumber(num) {
            if (num >= 10000) {
                return (num / 10000).toFixed(1) + 'w';
            }
            if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'k';
            }
            return num.toString();
        }

        // 广告轮播功能
        let currentSlide = 0;
        const totalSlides = 3;
        let carouselInterval;

        function initCarousel() {
            const track = document.getElementById('adCarouselTrack');
            const dots = document.querySelectorAll('.ad-dot');

            // 自动轮播
            carouselInterval = setInterval(() => {
                currentSlide = (currentSlide + 1) % totalSlides;
                updateCarousel();
            }, 3000);

            // 点击指示器切换
            dots.forEach((dot, index) => {
                dot.addEventListener('click', (e) => {
                    e.stopPropagation();
                    currentSlide = index;
                    updateCarousel();
                    // 重置自动轮播计时器
                    clearInterval(carouselInterval);
                    carouselInterval = setInterval(() => {
                        currentSlide = (currentSlide + 1) % totalSlides;
                        updateCarousel();
                    }, 3000);
                });
            });
        }

        function updateCarousel() {
            const track = document.getElementById('adCarouselTrack');
            const dots = document.querySelectorAll('.ad-dot');

            track.style.transform = `translateX(-${currentSlide * 100}%)`;

            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentSlide);
            });
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            init();
            initCarousel();
        });
    </script>
