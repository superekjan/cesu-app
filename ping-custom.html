<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>自定义PING测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #131524;
            --bg-secondary: #131524;
            --bg-card: rgba(38, 41, 58, 0.65);
            --bg-card-hover: rgba(46, 49, 69, 0.75);
            --accent-blue: #5b8def;
            --accent-blue-light: #7ca6f3;
            --accent-cyan: #4ecdc4;
            --accent-green: #5dbe8d;
            --accent-orange: #f4a261;
            --accent-purple: #9b8bf4;
            --text-primary: #e8eaf0;
            --text-secondary: #9aa3b2;
            --text-tertiary: #6b7280;
            --border-subtle: rgba(91, 141, 239, 0.15);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 头部 */
        .header {
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.8) 0%, rgba(13, 17, 23, 0) 100%);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-subtle);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--text-primary);
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* 主内容 */
        .main-content {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        /* 输入区域 */
        .input-section {
            margin-bottom: 24px;
        }

        .input-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            display: block;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            font-size: 15px;
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(91, 141, 239, 0.1);
        }

        .input-field::placeholder {
            color: var(--text-tertiary);
        }

        /* 固定目标 */
        .targets-section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .targets-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .target-item {
            padding: 14px 10px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .target-item:hover {
            border-color: rgba(91, 141, 239, 0.3);
            transform: translateY(-2px);
        }

        .target-item.active {
            border-color: var(--accent-blue);
            background: rgba(91, 141, 239, 0.1);
        }

        .target-icon {
            width: 32px;
            height: 32px;
            margin: 0 auto 6px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }

        .target-icon.baidu {
            background: #2932e1;
        }

        .target-icon.taobao {
            background: #ff5000;
        }

        .target-icon.jd {
            background: #e4393c;
        }

        .target-name {
            font-size: 13px;
            color: var(--text-primary);
            font-weight: 500;
        }

        .target-host {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-top: 2px;
        }

        /* 检测按钮 */
        .test-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 24px;
        }

        .test-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(91, 141, 239, 0.4);
        }

        .test-btn:active {
            transform: translateY(0);
        }

        .test-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 测试结果 */
        .result-section {
            display: none;
        }

        .result-section.show {
            display: block;
        }

        .result-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-subtle);
            margin-bottom: 16px;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .result-target {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .result-status {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
        }

        .result-status.success {
            background: rgba(93, 190, 141, 0.15);
            color: var(--accent-green);
        }

        .result-status.warning {
            background: rgba(244, 162, 97, 0.15);
            color: var(--accent-orange);
        }

        .result-status.fail {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .result-item {
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
        }

        .result-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .result-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .result-value.good {
            color: var(--accent-green);
        }

        .result-value.warning {
            color: var(--accent-orange);
        }

        .result-value.bad {
            color: #ef4444;
        }

        /* 详细列表 */
        .detail-list {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border-subtle);
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-subtle);
            font-size: 14px;
        }

        .detail-item:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: var(--text-tertiary);
        }

        .detail-value {
            color: var(--text-primary);
            font-weight: 500;
        }

        .history-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--accent-blue);
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .history-link:hover {
            opacity: 0.8;
        }

        .history-link svg {
            width: 18px;
            height: 18px;
            fill: var(--accent-blue);
        }

        .detail-value {
            color: var(--text-primary);
            font-weight: 500;
        }

        .safe-area-bottom {
            height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-top">
                <div class="back-btn" onclick="location.href='ping-diagnosis.html'">
                    <svg viewBox="0 0 24 24">
                        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                    </svg>
                </div>
                <div class="header-title">PING测试</div>
            </div>
        </header>

        <main class="main-content">
            <div class="input-section">
                <label class="input-label">测试目标</label>
                <input type="text" class="input-field" id="targetInput" placeholder="输入IP地址或域名，如：8.8.8.8">
            </div>

            <div class="targets-section">
                <div class="section-title">快速选择</div>
                <div class="targets-grid">
                    <div class="target-item" onclick="selectTarget('百度', 'www.baidu.com', this)">
                        <div class="target-icon baidu">B</div>
                        <div class="target-name">百度</div>
                        <div class="target-host">www.baidu.com</div>
                    </div>
                    <div class="target-item" onclick="selectTarget('淘宝', 'www.taobao.com', this)">
                        <div class="target-icon taobao">T</div>
                        <div class="target-name">淘宝</div>
                        <div class="target-host">www.taobao.com</div>
                    </div>
                    <div class="target-item" onclick="selectTarget('京东', 'www.jd.com', this)">
                        <div class="target-icon jd">J</div>
                        <div class="target-name">京东</div>
                        <div class="target-host">www.jd.com</div>
                    </div>
                </div>
            </div>

            <button class="test-btn" onclick="startTest()" id="testBtn">开始检测</button>

            <div class="result-section" id="resultSection">
                <div class="result-card">
                    <div class="result-header">
                        <div class="result-target" id="resultTarget">www.baidu.com</div>
                        <div class="result-status success" id="resultStatus">等待测试</div>
                    </div>
                    <div class="result-grid">
                        <div class="result-item">
                            <div class="result-label">平均延迟</div>
                            <div class="result-value good" id="avgPing">28ms</div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">丢包率</div>
                            <div class="result-value good" id="lossRate">0%</div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">最小延迟</div>
                            <div class="result-value" id="minPing">22ms</div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">最大延迟</div>
                            <div class="result-value" id="maxPing">45ms</div>
                        </div>
                    </div>
                </div>

                <div class="detail-list">
                    <div class="detail-item">
                        <span class="detail-label">发送包数</span>
                        <span class="detail-value">20</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">接收包数</span>
                        <span class="detail-value" id="recvPackets">20</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">抖动</span>
                        <span class="detail-value" id="jitter">3.2ms</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">检测时间</span>
                        <span class="detail-value" id="testTime">2026-04-21 09:35:00</span>
                    </div>
                </div>
            </div>

            <div class="history-link" onclick="location.href='ping-history.html'">
                <svg viewBox="0 0 24 24">
                    <path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/>
                </svg>
                <span>查看历史记录</span>
            </div>

            <div class="safe-area-bottom"></div>
        </main>
    </div>

    <script>
        let selectedHost = '';
        let selectedTargetName = '';

        function selectTarget(name, host, element) {
            selectedHost = host;
            selectedTargetName = name;
            document.getElementById('targetInput').value = host;

            document.querySelectorAll('.target-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');
        }

        function startTest() {
            const input = document.getElementById('targetInput').value.trim();
            const host = input || selectedHost;
            const targetName = input || selectedTargetName || host;

            if (!host) {
                alert('请输入或选择测试目标');
                return;
            }

            const btn = document.getElementById('testBtn');
            btn.disabled = true;
            btn.textContent = '检测中...';

            setTimeout(() => {
                const avgPing = Math.round(20 + Math.random() * 60);
                const minPing = Math.round(avgPing * 0.7);
                const maxPing = Math.round(avgPing * 1.5);
                const lossRate = (Math.random() * 5).toFixed(1);
                const jitter = (Math.random() * 10).toFixed(1);
                const recvPackets = Math.round(20 * (1 - lossRate / 100));

                document.getElementById('resultTarget').textContent = host;
                document.getElementById('avgPing').textContent = avgPing + 'ms';
                document.getElementById('minPing').textContent = minPing + 'ms';
                document.getElementById('maxPing').textContent = maxPing + 'ms';
                document.getElementById('lossRate').textContent = lossRate + '%';
                document.getElementById('recvPackets').textContent = recvPackets;
                document.getElementById('jitter').textContent = jitter + 'ms';

                const now = new Date();
                const timeStr = now.getFullYear() + '-' +
                    String(now.getMonth() + 1).padStart(2, '0') + '-' +
                    String(now.getDate()).padStart(2, '0') + ' ' +
                    String(now.getHours()).padStart(2, '0') + ':' +
                    String(now.getMinutes()).padStart(2, '0') + ':' +
                    String(now.getSeconds()).padStart(2, '0');
                document.getElementById('testTime').textContent = timeStr;

                const avgPingEl = document.getElementById('avgPing');
                const lossRateEl = document.getElementById('lossRate');

                let status = 'good';
                let evalText = '网络优秀';

                if (avgPing < 50 && lossRate < 1) {
                    avgPingEl.className = 'result-value good';
                    lossRateEl.className = 'result-value good';
                    document.getElementById('resultStatus').className = 'result-status success';
                    document.getElementById('resultStatus').textContent = '网络优秀';
                    status = 'excellent';
                    evalText = '网络优秀';
                } else if (avgPing < 100 && lossRate < 5) {
                    avgPingEl.className = 'result-value warning';
                    lossRateEl.className = 'result-value warning';
                    document.getElementById('resultStatus').className = 'result-status warning';
                    document.getElementById('resultStatus').textContent = '网络一般';
                    status = 'good';
                    evalText = '网络一般';
                } else {
                    avgPingEl.className = 'result-value bad';
                    lossRateEl.className = 'result-value bad';
                    document.getElementById('resultStatus').className = 'result-status fail';
                    document.getElementById('resultStatus').textContent = '网络较差';
                    status = 'warning';
                    evalText = '网络较差';
                }

                const record = {
                    id: Date.now().toString(),
                    target: host,
                    targetName: targetName,
                    avgPing: avgPing,
                    minPing: Math.round(avgPing * 0.7),
                    maxPing: Math.round(avgPing * 1.3),
                    lossRate: lossRate,
                    jitter: parseFloat((Math.random() * 5 + 1).toFixed(1)),
                    sentPackets: 20,
                    recvPackets: Math.round(20 * (1 - lossRate / 100)),
                    status: status,
                    testedAt: new Date().toISOString()
                };

                const historyRecords = JSON.parse(localStorage.getItem('pingHistoryRecords') || '[]');
                historyRecords.unshift(record);
                if (historyRecords.length > 50) {
                    historyRecords.pop();
                }
                localStorage.setItem('pingHistoryRecords', JSON.stringify(historyRecords));

                document.getElementById('resultSection').classList.add('show');

                btn.disabled = false;
                btn.textContent = '重新检测';
            }, 1500);
        }
    </script>
</body>
</html>
