<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>装维绑定</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #131524;
            --bg-secondary: #131524;
            --bg-card: rgba(38, 41, 58, 0.65);
            --bg-card-hover: rgba(46, 49, 69, 0.75);
            --accent-blue: #5b8def;
            --accent-blue-light: #7ca6f3;
            --accent-cyan: #4ecdc4;
            --accent-green: #5dbe8d;
            --accent-orange: #f4a261;
            --accent-purple: #9b8bf4;
            --accent-red: #ef4444;
            --text-primary: #e8eaf0;
            --text-secondary: #9aa3b2;
            --text-tertiary: #6b7280;
            --border-subtle: rgba(91, 141, 239, 0.15);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: calc(80px + env(safe-area-inset-bottom));
        }

        /* 头部 */
        .header {
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.8) 0%, rgba(13, 17, 23, 0) 100%);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-subtle);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--text-primary);
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* 主内容 */
        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        /* 绑定方式选择 */
        .binding-methods {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .method-btn {
            flex: 1;
            padding: 20px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .method-btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-blue);
        }

        .method-btn.active {
            background: rgba(91, 141, 239, 0.15);
            border-color: var(--accent-blue);
        }

        .method-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 12px;
            background: rgba(91, 141, 239, 0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .method-icon svg {
            width: 24px;
            height: 24px;
            fill: var(--accent-blue);
        }

        .method-name {
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 500;
            margin-bottom: 4px;
        }

        .method-desc {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* 绑定表单 */
        .binding-form {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-subtle);
            display: none;
        }

        .binding-form.active {
            display: block;
        }

        .form-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            display: block;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            font-size: 16px;
            color: var(--text-primary);
            transition: all 0.2s ease;
            text-align: center;
            letter-spacing: 2px;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-input::placeholder {
            color: var(--text-tertiary);
            letter-spacing: normal;
        }

        .form-hint {
            font-size: 13px;
            color: var(--text-tertiary);
            margin-top: 8px;
            text-align: center;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(91, 141, 239, 0.4);
        }

        .submit-btn:disabled {
            background: linear-gradient(135deg, #3a4a5c, #2d3a4a);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 扫码区域 */
        .scan-area {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            border: 2px dashed var(--border-subtle);
            margin-bottom: 20px;
        }

        .scan-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: rgba(91, 141, 239, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scan-icon svg {
            width: 40px;
            height: 40px;
            fill: var(--accent-blue);
        }

        .scan-text {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .scan-btn {
            padding: 12px 32px;
            background: rgba(91, 141, 239, 0.15);
            border: 1px solid var(--accent-blue);
            border-radius: 10px;
            font-size: 15px;
            color: var(--accent-blue);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .scan-btn:hover {
            background: rgba(91, 141, 239, 0.25);
        }

        /* 已绑定装维信息 */
        .staff-info-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-subtle);
        }

        .staff-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .staff-avatar {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .staff-avatar svg {
            width: 32px;
            height: 32px;
            fill: #fff;
        }

        .staff-basic-info {
            flex: 1;
        }

        .staff-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .staff-id {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .staff-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(93, 190, 141, 0.15);
            border-radius: 20px;
            font-size: 12px;
            color: var(--accent-green);
            margin-top: 8px;
        }

        .staff-status::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent-green);
            border-radius: 50%;
        }

        .staff-details {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .detail-value {
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 500;
        }

        .change-staff-btn {
            width: 100%;
            padding: 14px;
            background: rgba(91, 141, 239, 0.15);
            border: 1px solid rgba(91, 141, 239, 0.3);
            border-radius: 10px;
            font-size: 15px;
            color: var(--accent-blue);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .change-staff-btn:hover {
            background: rgba(91, 141, 239, 0.25);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-icon svg {
            width: 40px;
            height: 40px;
            fill: var(--text-tertiary);
        }

        .empty-text {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .empty-hint {
            font-size: 13px;
            color: var(--text-tertiary);
        }

        /* Toast提示 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 15px;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 28px;
            max-width: 320px;
            width: 100%;
            border: 1px solid var(--border-subtle);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            text-align: center;
        }

        .modal-text {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            text-align: center;
            line-height: 1.6;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .modal-btn.cancel {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
        }

        .modal-btn.cancel:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .modal-btn.confirm {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            color: #fff;
        }

        .modal-btn.confirm:hover {
            opacity: 0.9;
        }

        .modal-btn.danger {
            background: rgba(248, 81, 73, 0.15);
            color: var(--accent-red);
            border: 1px solid rgba(248, 81, 73, 0.3);
        }

        .modal-btn.danger:hover {
            background: rgba(248, 81, 73, 0.25);
        }

        /* 绑定状态标签 */
        .binding-status-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(93, 190, 141, 0.15);
            border-radius: 20px;
            font-size: 13px;
            color: var(--accent-green);
            margin-bottom: 20px;
        }

        .binding-status-tag::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
        }

        .binding-status-tag.unbound {
            background: rgba(154, 163, 178, 0.15);
            color: var(--text-secondary);
        }

        .binding-status-tag.unbound::before {
            background: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <div class="header-top">
                <div class="back-btn" onclick="history.back()">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                    </svg>
                </div>
                <div class="header-title">装维绑定</div>
            </div>
        </header>

        <!-- 主内容 -->
        <main class="main-content">
            <!-- 未绑定状态 -->
            <div id="unboundState">
                <div class="binding-status-tag unbound">
                    未绑定装维人员
                </div>

                <!-- 绑定方式选择 -->
                <div class="binding-methods">
                    <div class="method-btn active" onclick="selectMethod('scan')" id="scanMethod">
                        <div class="method-icon">
                            <svg viewBox="0 0 24 24">
                                <path d="M9.5 6.5v3h-3v-3h3M11 5H5v6h6V5zm-1.5 9.5v3h-3v-3h3M11 13H5v6h6v-6zm6.5-6.5v3h-3v-3h3M19 5h-6v6h6V5zm-6 8h1.5v1.5H13V11h1.5v1.5H17V11h1.5v1.5H21V5h-6v6z"/>
                            </svg>
                        </div>
                        <div class="method-name">扫码绑定</div>
                        <div class="method-desc">扫描二维码</div>
                    </div>
                    <div class="method-btn" onclick="selectMethod('code')" id="codeMethod">
                        <div class="method-icon">
                            <svg viewBox="0 0 24 24">
                                <path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/>
                            </svg>
                        </div>
                        <div class="method-name">邀请码绑定</div>
                        <div class="method-desc">输入邀请码</div>
                    </div>
                </div>

                <!-- 扫码绑定表单 -->
                <div class="binding-form active" id="scanForm">
                    <div class="form-title">扫码绑定装维</div>
                    <div class="scan-area">
                        <div class="scan-icon">
                            <svg viewBox="0 0 24 24">
                                <path d="M9.5 6.5v3h-3v-3h3M11 5H5v6h6V5zm-1.5 9.5v3h-3v-3h3M11 13H5v6h6v-6zm6.5-6.5v3h-3v-3h3M19 5h-6v6h6V5zm-6 8h1.5v1.5H13V11h1.5v1.5H17V11h1.5v1.5H21V5h-6v6z"/>
                            </svg>
                        </div>
                        <div class="scan-text">请扫描装维人员提供的专属二维码</div>
                        <button class="scan-btn" onclick="startScan()">点击扫码</button>
                    </div>
                </div>

                <!-- 邀请码绑定表单 -->
                <div class="binding-form" id="codeForm">
                    <div class="form-title">邀请码绑定装维</div>
                    <div class="form-group">
                        <label class="form-label">请输入邀请码</label>
                        <input type="text" class="form-input" id="inviteCodeInput" placeholder="请输入6-12位字母数字组合" maxlength="12">
                        <div class="form-hint">邀请码由装维人员提供，请仔细核对</div>
                    </div>
                    <button class="submit-btn" id="bindBtn" onclick="bindWithCode()" disabled>确认绑定</button>
                </div>
            </div>

            <!-- 已绑定状态 -->
            <div id="boundState" style="display: none;">
                <div class="binding-status-tag">
                    已绑定装维人员
                </div>

                <div class="staff-info-card">
                    <div class="staff-header">
                        <div class="staff-avatar">
                            <svg viewBox="0 0 24 24">
                                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                            </svg>
                        </div>
                        <div class="staff-basic-info">
                            <div class="staff-name" id="staffName">李师傅</div>
                            <div class="staff-id" id="staffId">工号：ST2024001</div>
                            <div class="staff-status">在线服务中</div>
                        </div>
                    </div>
                    <div class="staff-details">
                        <div class="detail-row">
                            <span class="detail-label">联系电话</span>
                            <span class="detail-value" id="staffPhone">138****5678</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">服务区域</span>
                            <span class="detail-value" id="staffArea">北京市朝阳区</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">绑定时间</span>
                            <span class="detail-value" id="bindTime">2024-03-15</span>
                        </div>
                    </div>
                    <button class="change-staff-btn" onclick="showChangeModal()">更换绑定</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast提示 -->
    <div class="toast" id="toast"></div>

    <!-- 更换绑定模态框 -->
    <div class="modal-overlay" id="changeModal">
        <div class="modal-content">
            <div class="modal-title">更换绑定</div>
            <div class="modal-text">更换装维人员需要先解绑当前装维，然后绑定新的装维人员。是否继续？</div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="hideChangeModal()">取消</button>
                <button class="modal-btn confirm" onclick="confirmChange()">继续更换</button>
            </div>
        </div>
    </div>

    <!-- 新装维绑定模态框 -->
    <div class="modal-overlay" id="newBindModal">
        <div class="modal-content" style="max-width: 360px;">
            <div class="modal-title">绑定新装维</div>
            <div class="modal-text" style="margin-bottom: 20px;">请选择绑定方式</div>
            <div class="binding-methods" style="margin-bottom: 20px;">
                <div class="method-btn" onclick="selectNewBindMethod('scan')" style="flex: 1;">
                    <div class="method-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M9.5 6.5v3h-3v-3h3M11 5H5v6h6V5zm-1.5 9.5v3h-3v-3h3M11 13H5v6h6v-6zm6.5-6.5v3h-3v-3h3M19 5h-6v6h6V5zm-6 8h1.5v1.5H13V11h1.5v1.5H17V11h1.5v1.5H21V5h-6v6z"/>
                        </svg>
                    </div>
                    <div class="method-name">扫码绑定</div>
                </div>
                <div class="method-btn" onclick="selectNewBindMethod('code')" style="flex: 1;">
                    <div class="method-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/>
                        </svg>
                    </div>
                    <div class="method-name">邀请码</div>
                </div>
            </div>
            <!-- 扫码绑定区域 -->
            <div id="newScanArea" style="display: none; margin-bottom: 20px;">
                <div class="scan-area" style="padding: 30px 20px;">
                    <div class="scan-icon" style="width: 60px; height: 60px; margin-bottom: 12px;">
                        <svg viewBox="0 0 24 24" style="width: 30px; height: 30px;">
                            <path d="M9.5 6.5v3h-3v-3h3M11 5H5v6h6V5zm-1.5 9.5v3h-3v-3h3M11 13H5v6h6v-6zm6.5-6.5v3h-3v-3h3M19 5h-6v6h6V5zm-6 8h1.5v1.5H13V11h1.5v1.5H17V11h1.5v1.5H21V5h-6v6z"/>
                        </svg>
                    </div>
                    <div class="scan-text" style="font-size: 13px; margin-bottom: 12px;">请扫描新装维人员的二维码</div>
                    <button class="scan-btn" onclick="startNewScan()">点击扫码</button>
                </div>
            </div>
            <!-- 邀请码绑定区域 -->
            <div id="newCodeArea" style="display: none; margin-bottom: 20px;">
                <div class="form-group" style="margin-bottom: 16px;">
                    <input type="text" class="form-input" id="newInviteCodeInput" placeholder="请输入邀请码" maxlength="12" style="font-size: 14px; padding: 12px;">
                </div>
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="hideNewBindModal()">取消</button>
                <button class="modal-btn confirm" id="confirmNewBindBtn" onclick="confirmNewBind()" disabled>确认绑定</button>
            </div>
        </div>
    </div>

    <script>
        // 选择绑定方式
        function selectMethod(method) {
            const scanMethod = document.getElementById('scanMethod');
            const codeMethod = document.getElementById('codeMethod');
            const scanForm = document.getElementById('scanForm');
            const codeForm = document.getElementById('codeForm');

            if (method === 'scan') {
                scanMethod.classList.add('active');
                codeMethod.classList.remove('active');
                scanForm.classList.add('active');
                codeForm.classList.remove('active');
            } else {
                scanMethod.classList.remove('active');
                codeMethod.classList.add('active');
                scanForm.classList.remove('active');
                codeForm.classList.add('active');
            }
        }

        // 开始扫码
        function startScan() {
            showToast('扫码功能开发中...');
        }

        // 验证邀请码格式
        function validateInviteCode(code) {
            const regex = /^[A-Za-z0-9]{6,12}$/;
            return regex.test(code);
        }

        // 监听邀请码输入
        document.getElementById('inviteCodeInput').addEventListener('input', function(e) {
            const code = e.target.value.toUpperCase();
            e.target.value = code;
            const bindBtn = document.getElementById('bindBtn');
            bindBtn.disabled = !validateInviteCode(code);
        });

        // 绑定装维人员
        function bindWithCode() {
            const code = document.getElementById('inviteCodeInput').value;
            if (!validateInviteCode(code)) {
                showToast('请输入正确的邀请码');
                return;
            }

            // 模拟绑定成功
            showToast('绑定成功！');
            localStorage.setItem('staffBound', 'true');
            setTimeout(() => {
                document.getElementById('unboundState').style.display = 'none';
                document.getElementById('boundState').style.display = 'block';
            }, 1500);
        }

        // 显示更换绑定弹窗
        function showChangeModal() {
            document.getElementById('changeModal').classList.add('active');
        }

        // 隐藏更换绑定弹窗
        function hideChangeModal() {
            document.getElementById('changeModal').classList.remove('active');
        }

        // 确认更换绑定
        function confirmChange() {
            hideChangeModal();
            // 显示新绑定弹窗
            setTimeout(() => {
                document.getElementById('newBindModal').classList.add('active');
            }, 200);
        }

        // 隐藏新绑定弹窗
        function hideNewBindModal() {
            document.getElementById('newBindModal').classList.remove('active');
            // 重置新绑定表单
            document.getElementById('newScanArea').style.display = 'none';
            document.getElementById('newCodeArea').style.display = 'none';
            document.getElementById('newInviteCodeInput').value = '';
            document.getElementById('confirmNewBindBtn').disabled = true;
        }

        // 选择新绑定方式
        function selectNewBindMethod(method) {
            const newScanArea = document.getElementById('newScanArea');
            const newCodeArea = document.getElementById('newCodeArea');
            const confirmBtn = document.getElementById('confirmNewBindBtn');

            if (method === 'scan') {
                newScanArea.style.display = 'block';
                newCodeArea.style.display = 'none';
                confirmBtn.disabled = true;
            } else {
                newScanArea.style.display = 'none';
                newCodeArea.style.display = 'block';
                confirmBtn.disabled = true;
            }
        }

        // 开始扫描新装维二维码
        function startNewScan() {
            showToast('扫码功能开发中...');
            // 模拟扫码成功
            setTimeout(() => {
                document.getElementById('confirmNewBindBtn').disabled = false;
            }, 1000);
        }

        // 监听新邀请码输入
        document.getElementById('newInviteCodeInput').addEventListener('input', function(e) {
            const code = e.target.value.toUpperCase();
            e.target.value = code;
            const confirmBtn = document.getElementById('confirmNewBindBtn');
            confirmBtn.disabled = !validateInviteCode(code);
        });

        // 确认新绑定
        function confirmNewBind() {
            const scanArea = document.getElementById('newScanArea');
            const codeArea = document.getElementById('newCodeArea');
            
            let newStaffName = '新装维人员';
            
            if (codeArea.style.display !== 'none') {
                const code = document.getElementById('newInviteCodeInput').value;
                if (!validateInviteCode(code)) {
                    showToast('请输入正确的邀请码');
                    return;
                }
                // 根据邀请码解析装维名称（模拟）
                newStaffName = '张师傅';
            }

            hideNewBindModal();
            showToast(`已更换绑定至${newStaffName}`);
            
            // 更新显示的装维信息
            document.getElementById('staffName').textContent = newStaffName;
            document.getElementById('staffId').textContent = '工号：ST2024002';
            document.getElementById('bindTime').textContent = new Date().toISOString().split('T')[0];
        }

        // 显示Toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 页面加载时检查绑定状态
        window.onload = function() {
            const isBound = localStorage.getItem('staffBound');
            if (isBound === 'true') {
                document.getElementById('unboundState').style.display = 'none';
                document.getElementById('boundState').style.display = 'block';
            }
        };
    </script>
</body>
</html>
