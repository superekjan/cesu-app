<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>绑定客户管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #131524;
            --bg-secondary: #131524;
            --bg-card: rgba(38, 41, 58, 0.65);
            --accent-blue: #5b8def;
            --accent-blue-light: #7ca6f3;
            --accent-cyan: #4ecdc4;
            --accent-green: #5dbe8d;
            --accent-orange: #f4a261;
            --accent-red: #ef4444;
            --text-primary: #e8eaf0;
            --text-secondary: #9aa3b2;
            --text-tertiary: #6b7280;
            --border-subtle: rgba(91, 141, 239, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 头部 */
        .header {
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.8) 0%, rgba(13, 17, 23, 0) 100%);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-subtle);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--text-primary);
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* 主内容 */
        .main-content {
            flex: 1;
            padding: 16px 20px;
            overflow-y: auto;
        }

        /* 统计行 - 无卡片容器 */
        .stats-row {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 0 4px;
        }

        .stat-item {
            text-align: center;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.2s ease;
            min-width: 60px;
        }

        .stat-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .stat-item.active {
            background: rgba(91, 141, 239, 0.1);
        }

        .stat-item.active .stat-value {
            color: var(--accent-blue);
        }

        .stat-value {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
            transition: color 0.2s ease;
        }

        .stat-value.active {
            color: var(--accent-green);
        }

        .stat-value.pending {
            color: var(--accent-orange);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            transition: color 0.2s ease;
        }

        /* 搜索与排序栏 */
        .search-filter-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .search-box {
            flex: 1;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            font-size: 14px;
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s ease;
        }

        .search-input::placeholder {
            color: var(--text-tertiary);
        }

        .search-input:focus {
            border-color: rgba(91, 141, 239, 0.4);
            background: rgba(0, 0, 0, 0.3);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            fill: var(--text-tertiary);
        }

        .sort-dropdown {
            position: relative;
        }

        .sort-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .sort-btn:hover {
            border-color: rgba(91, 141, 239, 0.3);
        }

        .sort-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }



        /* 客户列表 */
        .customer-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .customer-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border-subtle);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .customer-card:hover {
            border-color: rgba(91, 141, 239, 0.3);
            transform: translateY(-1px);
        }

        .customer-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .customer-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .customer-avatar svg {
            width: 24px;
            height: 24px;
            fill: #fff;
        }

        .customer-info {
            flex: 1;
        }

        .customer-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .customer-phone {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .customer-status {
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
        }

        .customer-status.active {
            background: rgba(93, 190, 141, 0.15);
            color: var(--accent-green);
        }

        .customer-status.recent {
            background: rgba(91, 141, 239, 0.15);
            color: var(--accent-blue);
        }

        .customer-meta {
            display: flex;
            gap: 16px;
            padding-top: 12px;
            border-top: 1px solid var(--border-subtle);
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .meta-item svg {
            width: 14px;
            height: 14px;
            fill: var(--text-tertiary);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            background: rgba(91, 141, 239, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .empty-icon svg {
            width: 40px;
            height: 40px;
            fill: var(--accent-blue);
        }

        .empty-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .empty-desc {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 底部按钮 */
        .footer-action {
            padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
            border-top: 1px solid var(--border-subtle);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-cyan) 100%);
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-primary svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <script>
        // 选择统计项

            document.querySelectorAll('.stat-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');
            // 根据状态筛选客户
        }

        // 搜索客户

            console.log('搜索客户:', keyword);
        }

        // 切换排序菜单
        function toggleSortMenu() {
            const sortLabel = document.getElementById('sortLabel');
            if (sortLabel.textContent === '时间排序') {
                sortLabel.textContent = '活跃度排序';
            } else {
                sortLabel.textContent = '时间排序';
            }
            // 执行排序
        }

        // 查看客户详情
        function viewCustomerDetail(customerId) {
            window.location.href = `customer-detail.html?id=${customerId}`;
        }

        // 前往邀请页面

            window.location.href = 'staff-invitation.html';
        }
    </script>
