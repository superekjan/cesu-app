<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WiFi检测</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #131524;
            --bg-secondary: #131524;
            --bg-card: rgba(38, 41, 58, 0.65);
            --bg-card-hover: rgba(46, 49, 69, 0.75);
            --accent-blue: #5b8def;
            --accent-blue-light: #7ca6f3;
            --accent-cyan: #4ecdc4;
            --accent-green: #5dbe8d;
            --accent-orange: #f4a261;
            --accent-purple: #9b8bf4;
            --accent-gold: #e3b341;
            --accent-red: #f85149;
            --text-primary: #e8eaf0;
            --text-secondary: #9aa3b2;
            --text-tertiary: #6b7280;
            --border-subtle: rgba(91, 141, 239, 0.15);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 头部 */
        .header {
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.8) 0%, rgba(13, 17, 23, 0) 100%);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-subtle);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--text-primary);
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* 主内容 */
        .main-content {
            flex: 1;
            padding: 16px 20px;
            overflow-y: auto;
        }

        /* WiFi信息卡片 */
        .wifi-card {
            background: linear-gradient(135deg, rgba(91, 141, 239, 0.15) 0%, rgba(78, 205, 196, 0.1) 100%);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .wifi-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .wifi-name-section {
            flex: 1;
        }

        .wifi-name {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .wifi-mac {
            font-size: 13px;
            color: var(--text-secondary);
            font-family: monospace;
        }

        .switch-btn {
            padding: 6px 16px;
            background: rgba(91, 141, 239, 0.15);
            border: 1px solid rgba(91, 141, 239, 0.3);
            border-radius: 20px;
            color: var(--accent-blue);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .switch-btn:hover {
            background: rgba(91, 141, 239, 0.25);
        }

        .wifi-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px 16px;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .wifi-info-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }

        .wifi-info-item .label {
            color: var(--text-secondary);
        }

        .wifi-info-item .value {
            color: var(--text-primary);
            font-weight: 500;
        }

        .signal-strength {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .signal-icon {
            width: 16px;
            height: 16px;
        }

        .interference {
            color: var(--accent-orange);
        }

        .wifi-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 16px;
            font-size: 13px;
        }

        .wifi-detail-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .wifi-detail-item .label {
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .wifi-detail-item .value {
            color: var(--text-primary);
        }

        /* 信号强度图表 */
        .signal-chart-section {
            background: linear-gradient(135deg, rgba(91, 141, 239, 0.1) 0%, rgba(78, 205, 196, 0.05) 100%);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .chart-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-title svg {
            width: 20px;
            height: 20px;
            fill: var(--accent-blue);
        }

        .chart-container {
            position: relative;
            height: 200px;
        }

        .chart-y-labels {
            position: absolute;
            left: 0;
            top: 10px;
            bottom: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-tertiary);
            width: 36px;
            text-align: right;
            padding-right: 8px;
        }

        .chart-y-unit {
            position: absolute;
            left: 0;
            top: -15px;
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .chart-area {
            margin-left: 44px;
            height: 160px;
            position: relative;
            background: linear-gradient(180deg, rgba(91, 141, 239, 0.05) 0%, rgba(0, 0, 0, 0.15) 100%);
            border-radius: 12px;
            border: 1px solid rgba(91, 141, 239, 0.1);
            overflow: hidden;
        }

        .chart-grid {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
        }

        .grid-line {
            position: absolute;
            left: 0;
            right: 0;
            border-top: 1px solid rgba(91, 141, 239, 0.08);
        }

        .chart-svg {
            width: 100%;
            height: 100%;
        }

        .chart-x-labels {
            display: flex;
            justify-content: space-between;
            margin-left: 44px;
            margin-top: 12px;
            padding: 0 12px;
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .chart-x-title {
            text-align: right;
            margin-top: 5px;
            margin-left: 44px;
            padding-right: 12px;
            font-size: 11px;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        /* 操作按钮 */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .action-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(91, 141, 239, 0.4);
        }

        .action-btn svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        /* 底部安全区域 */
        .safe-area-bottom {
            height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <div class="header-top">
                <div class="header-left">
                    <div class="back-btn" onclick="history.back()">
                        <svg viewBox="0 0 24 24">
                            <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                        </svg>
                    </div>
                    <div class="header-title">WiFi检测</div>
                </div>
            </div>
        </header>

        <!-- 主内容 -->
        <main class="main-content">
            <!-- WiFi信息卡片 -->
            <div class="wifi-card">
                <div class="wifi-header">
                    <div class="wifi-name-section">
                        <div class="wifi-name">FH-5G</div>
                        <div class="wifi-mac">B4:04:21:5A:72:57</div>
                    </div>
                    <button class="switch-btn">切换</button>
                </div>

                <div class="wifi-info-grid">
                    <div class="wifi-info-item">
                        <span class="label">信号强度：</span>
                        <span class="value">-36 dBm</span>
                        <svg class="signal-icon" viewBox="0 0 24 24">
                            <path fill="var(--accent-green)" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                        </svg>
                    </div>
                    <div class="wifi-info-item">
                        <span class="label">干扰程度：</span>
                        <span class="value interference">严重</span>
                    </div>
                    <div class="wifi-info-item">
                        <span class="label">频段：</span>
                        <span class="value">5G</span>
                    </div>
                    <div class="wifi-info-item">
                        <span class="label">信道：</span>
                        <span class="value">36</span>
                    </div>
                    <div class="wifi-info-item">
                        <span class="label">协商速率：</span>
                        <span class="value">2161 Mbps</span>
                    </div>
                </div>

                <div class="wifi-details">
                    <div class="wifi-detail-item">
                        <span class="label">IP：</span>
                        <span class="value">192.168.1.20</span>
                    </div>
                    <div class="wifi-detail-item">
                        <span class="label">网关：</span>
                        <span class="value">192.168.1.1</span>
                    </div>
                    <div class="wifi-detail-item">
                        <span class="label">公网IP：</span>
                        <span class="value">120.36.68.9</span>
                    </div>
                    <div class="wifi-detail-item">
                        <span class="label">DNS：</span>
                        <span class="value">218.85.157.99</span>
                    </div>
                    <div class="wifi-detail-item">
                        <span class="label">运营商：</span>
                        <span class="value">电信</span>
                    </div>
                    <div class="wifi-detail-item" style="grid-column: span 2;">
                        <span class="label">定位：</span>
                        <span class="value">福建省福州市鼓楼区工业路572号</span>
                    </div>
                </div>
            </div>

            <!-- 信号强度图表 -->
            <div class="signal-chart-section">
                <div class="chart-title">
                    <svg viewBox="0 0 24 24">
                        <path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/>
                    </svg>
                    信号强度趋势
                </div>
                <div class="chart-container">
                    <div class="chart-y-unit">强度(dBm)</div>
                    <div class="chart-y-labels">
                        <span>-36</span>
                        <span>-37</span>
                        <span>-38</span>
                        <span>-39</span>
                        <span>-40</span>
                        <span>-41</span>
                    </div>
                    <div class="chart-area">
                        <div class="chart-grid">
                            <div class="grid-line" style="top: 0%"></div>
                            <div class="grid-line" style="top: 20%"></div>
                            <div class="grid-line" style="top: 40%"></div>
                            <div class="grid-line" style="top: 60%"></div>
                            <div class="grid-line" style="top: 80%"></div>
                            <div class="grid-line" style="top: 100%"></div>
                        </div>
                        <svg class="chart-svg" viewBox="0 0 300 160" preserveAspectRatio="none">
                            <defs>
                                <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" style="stop-color:#5b8def;stop-opacity:1" />
                                    <stop offset="50%" style="stop-color:#7ca6f3;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#4ecdc4;stop-opacity:1" />
                                </linearGradient>
                                <linearGradient id="areaGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                    <stop offset="0%" style="stop-color:#5b8def;stop-opacity:0.25" />
                                    <stop offset="50%" style="stop-color:#4ecdc4;stop-opacity:0.1" />
                                    <stop offset="100%" style="stop-color:#4ecdc4;stop-opacity:0" />
                                </linearGradient>
                            </defs>
                            <!-- 填充区域 -->
                            <path d="M 0,15 L 60,15 Q 90,15 100,80 Q 110,145 150,145 Q 190,145 200,80 Q 210,15 240,15 L 300,15 L 300,160 L 0,160 Z" 
                                  fill="url(#areaGradient)"/>
                            <!-- 线条 -->
                            <path d="M 0,15 L 60,15 Q 90,15 100,80 Q 110,145 150,145 Q 190,145 200,80 Q 210,15 240,15 L 300,15" 
                                  fill="none" 
                                  stroke="url(#lineGradient)" 
                                  stroke-width="3"
                                  stroke-linecap="round"
                                  stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="chart-x-labels">
                        <span>00:01</span>
                        <span>00:02</span>
                        <span>00:06</span>
                    </div>
                    <div class="chart-x-title">时长(s)</div>
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="action-buttons">
                <button class="action-btn" onclick="location.href='wifi-diagnosis.html'">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                    测网速
                </button>
                <button class="action-btn" onclick="location.href='index.html'">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
                    </svg>
                    网络体检
                </button>
            </div>

            <div class="safe-area-bottom"></div>
        </main>
    </div>

    <script>
        // 模拟实时更新信号强度
        function updateSignalChart() {
            const paths = document.querySelectorAll('.chart-svg path');
            const time = Date.now() / 1000;
            
            // 生成线条路径
            let linePath = 'M 0,15 ';
            let areaPath = 'M 0,15 ';
            
            for (let i = 0; i <= 300; i += 30) {
                const x = i;
                const baseY = 15 + Math.sin((i + time * 10) / 50) * 8;
                const y = Math.max(10, Math.min(150, baseY + Math.random() * 4));
                linePath += `L ${x},${y} `;
                areaPath += `L ${x},${y} `;
            }
            
            // 闭合填充区域
            areaPath += 'L 300,160 L 0,160 Z';
            
            // 更新填充区域
            paths[0].setAttribute('d', areaPath);
            // 更新线条
            paths[1].setAttribute('d', linePath);
        }

        // 每秒更新一次图表
        setInterval(updateSignalChart, 1000);
    </script>
</body>
</html>
