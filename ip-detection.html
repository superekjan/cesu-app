<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IP检测</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #131524;
            --bg-secondary: #131524;
            --bg-card: rgba(38, 41, 58, 0.65);
            --bg-card-hover: rgba(46, 49, 69, 0.75);
            --accent-blue: #5b8def;
            --accent-blue-light: #7ca6f3;
            --accent-cyan: #4ecdc4;
            --accent-green: #5dbe8d;
            --accent-orange: #f4a261;
            --accent-purple: #9b8bf4;
            --accent-red: #ef4444;
            --text-primary: #e8eaf0;
            --text-secondary: #9aa3b2;
            --text-tertiary: #6b7280;
            --border-subtle: rgba(91, 141, 239, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.8) 0%, rgba(13, 17, 23, 0) 100%);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-subtle);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--text-primary);
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .main-content {
            flex: 1;
            padding: 20px;
        }

        .ip-section {
            margin-bottom: 24px;
        }

        .ip-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-subtle);
            margin-bottom: 12px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }

        .ip-card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .ip-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .ip-type {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ip-type-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ip-type-icon.ipv4 {
            background: rgba(91, 141, 239, 0.15);
        }

        .ip-type-icon.ipv4 svg {
            fill: var(--accent-blue);
        }

        .ip-type-icon.ipv6 {
            background: rgba(78, 205, 196, 0.15);
        }

        .ip-type-icon.ipv6 svg {
            fill: var(--accent-cyan);
        }

        .ip-type-icon svg {
            width: 22px;
            height: 22px;
        }

        .ip-type-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .ip-status {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
        }

        .ip-status.detecting {
            background: rgba(244, 162, 97, 0.15);
            color: var(--accent-orange);
            border: 1px solid rgba(244, 162, 97, 0.3);
        }

        .ip-status.success {
            background: rgba(93, 190, 141, 0.15);
            color: var(--accent-green);
            border: 1px solid rgba(93, 190, 141, 0.3);
        }

        .ip-status.failed {
            background: rgba(248, 81, 73, 0.15);
            color: var(--accent-red);
            border: 1px solid rgba(248, 81, 73, 0.3);
        }

        .ip-address {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            word-break: break-all;
            margin-bottom: 12px;
            min-height: 27px;
        }

        .ip-address.loading {
            color: var(--text-tertiary);
        }

        .ip-address.error {
            color: var(--text-tertiary);
            font-size: 14px;
        }

        .connectivity-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-top: 12px;
            border-top: 1px solid var(--border-subtle);
        }

        .connectivity-label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .connectivity-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 500;
        }

        .connectivity-status.success {
            color: var(--accent-green);
        }

        .connectivity-status.failed {
            color: var(--accent-red);
        }

        .connectivity-status.testing {
            color: var(--accent-orange);
        }

        .connectivity-icon {
            width: 16px;
            height: 16px;
        }

        .connectivity-icon.success {
            fill: var(--accent-green);
        }

        .connectivity-icon.failed {
            fill: var(--accent-red);
        }

        .connectivity-icon.testing {
            fill: var(--accent-orange);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .loading-dots::after {
            content: '';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        .action-section {
            margin-top: 8px;
        }

        .action-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(91, 141, 239, 0.4);
        }

        .action-btn:active {
            transform: translateY(0);
        }

        .action-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .action-btn svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        .action-btn.testing {
            background: linear-gradient(135deg, var(--accent-orange), #f4a261);
        }

        .action-btn.testing:hover {
            box-shadow: 0 8px 20px rgba(244, 162, 97, 0.4);
        }

        .hint-text {
            text-align: center;
            font-size: 13px;
            color: var(--text-tertiary);
            margin-top: 16px;
        }

        .safe-area-bottom {
            height: 20px;
        }

        .result-summary {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-subtle);
            margin-top: 24px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }

        .result-summary.show {
            opacity: 1;
            transform: translateY(0);
        }

        .summary-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .summary-title svg {
            width: 20px;
            height: 20px;
            fill: var(--accent-green);
        }

        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .summary-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .summary-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .summary-value {
            font-size: 14px;
            font-weight: 600;
        }

        .summary-value.success {
            color: var(--accent-green);
        }

        .summary-value.failed {
            color: var(--accent-red);
        }

        .summary-value.none {
            color: var(--text-tertiary);
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-top">
                <div class="back-btn" onclick="location.href='toolbox.html'">
                    <svg viewBox="0 0 24 24">
                        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                    </svg>
                </div>
                <div class="header-title">IP检测</div>
            </div>
        </header>

        <main class="main-content">
            <div class="ip-section">
                <div class="ip-card" id="ipv4Card">
                    <div class="ip-card-header">
                        <div class="ip-type">
                            <div class="ip-type-icon ipv4">
                                <svg viewBox="0 0 24 24">
                                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                                </svg>
                            </div>
                            <span class="ip-type-name">IPv4</span>
                        </div>
                        <span class="ip-status detecting" id="ipv4Status">检测中</span>
                    </div>
                    <div class="ip-address loading" id="ipv4Address">正在获取公网地址<span class="loading-dots"></span></div>
                    <div class="connectivity-row">
                        <span class="connectivity-label">网络连通性</span>
                        <span class="connectivity-status testing" id="ipv4Connectivity">
                            <svg class="connectivity-icon testing" viewBox="0 0 24 24">
                                <path d="M12 4V2C6.48 2 2 6.48 2 12h2c0-4.42 3.58-8 8-8zm0 16c-4.42 0-8-3.58-8-8H2c0 5.52 4.48 10 10 10v-2zm8-12c4.42 0 8 3.58 8 8h2c0-5.52-4.48-10-10-10v2z"/>
                            </svg>
                            <span id="ipv4ConnectivityText">测试中</span>
                        </span>
                    </div>
                </div>

                <div class="ip-card" id="ipv6Card">
                    <div class="ip-card-header">
                        <div class="ip-type">
                            <div class="ip-type-icon ipv6">
                                <svg viewBox="0 0 24 24">
                                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                                </svg>
                            </div>
                            <span class="ip-type-name">IPv6</span>
                        </div>
                        <span class="ip-status detecting" id="ipv6Status">检测中</span>
                    </div>
                    <div class="ip-address loading" id="ipv6Address">正在获取IPv6地址<span class="loading-dots"></span></div>
                    <div class="connectivity-row">
                        <span class="connectivity-label">网络连通性</span>
                        <span class="connectivity-status testing" id="ipv6Connectivity">
                            <svg class="connectivity-icon testing" viewBox="0 0 24 24">
                                <path d="M12 4V2C6.48 2 2 6.48 2 12h2c0-4.42 3.58-8 8-8zm0 16c-4.42 0-8-3.58-8-8H2c0 5.52 4.48 10 10 10v-2zm8-12c4.42 0 8 3.58 8 8h2c0-5.52-4.48-10-10-10v2z"/>
                            </svg>
                            <span id="ipv6ConnectivityText">测试中</span>
                        </span>
                    </div>
                </div>
            </div>

            <div class="action-section">
                <button class="action-btn" id="testBtn" onclick="startDetection()">
                    <svg viewBox="0 0 24 24">
                        <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                    </svg>
                    重新检测
                </button>
            </div>

            <div class="hint-text">检测您的公网IP地址及网络连通性状态</div>

            <div class="result-summary" id="resultSummary">
                <div class="summary-title">
                    <svg viewBox="0 0 24 24">
                        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                    </svg>
                    检测结果
                </div>
                <div class="summary-grid">
                    <div class="summary-item">
                        <span class="summary-label">IPv4状态</span>
                        <span class="summary-value" id="summaryIpv4">-</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">IPv4连通性</span>
                        <span class="summary-value" id="summaryIpv4Conn">-</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">IPv6状态</span>
                        <span class="summary-value" id="summaryIpv6">-</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">IPv6连通性</span>
                        <span class="summary-value" id="summaryIpv6Conn">-</span>
                    </div>
                </div>
            </div>

            <div class="safe-area-bottom"></div>
        </main>
    </div>

    <script>
        let ipv4Address = null;
        let ipv6Address = null;
        let isTesting = false;

        function updateCardVisibility() {
            const ipv4Card = document.getElementById('ipv4Card');
            const ipv6Card = document.getElementById('ipv6Card');

            setTimeout(() => {
                ipv4Card.classList.add('show');
            }, 100);

            setTimeout(() => {
                ipv6Card.classList.add('show');
            }, 300);
        }

        function setIPv4Result(address, isConnected) {
            const addressEl = document.getElementById('ipv4Address');
            const statusEl = document.getElementById('ipv4Status');
            const connectivityEl = document.getElementById('ipv4Connectivity');
            const connectivityTextEl = document.getElementById('ipv4ConnectivityText');
            const summaryIpv4 = document.getElementById('summaryIpv4');
            const summaryIpv4Conn = document.getElementById('summaryIpv4Conn');

            ipv4Address = address;

            if (address) {
                addressEl.textContent = address;
                addressEl.classList.remove('loading', 'error');
                statusEl.textContent = '已获取';
                statusEl.className = 'ip-status success';
                summaryIpv4.textContent = address;
                summaryIpv4.className = 'summary-value success';
            } else {
                addressEl.textContent = '未检测到IPv4地址';
                addressEl.classList.remove('loading');
                addressEl.classList.add('error');
                statusEl.textContent = '无';
                statusEl.className = 'ip-status failed';
                summaryIpv4.textContent = '未检测到';
                summaryIpv4.className = 'summary-value none';
            }

            if (isConnected) {
                connectivityEl.className = 'connectivity-status success';
                connectivityEl.innerHTML = `
                    <svg class="connectivity-icon success" viewBox="0 0 24 24">
                        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                    </svg>
                    <span>已接通</span>
                `;
                summaryIpv4Conn.textContent = '已接通';
                summaryIpv4Conn.className = 'summary-value success';
            } else {
                connectivityEl.className = 'connectivity-status failed';
                connectivityEl.innerHTML = `
                    <svg class="connectivity-icon failed" viewBox="0 0 24 24">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                    <span>未接通</span>
                `;
                summaryIpv4Conn.textContent = '未接通';
                summaryIpv4Conn.className = 'summary-value failed';
            }
        }

        function setIPv6Result(address, isConnected) {
            const addressEl = document.getElementById('ipv6Address');
            const statusEl = document.getElementById('ipv6Status');
            const connectivityEl = document.getElementById('ipv6Connectivity');
            const connectivityTextEl = document.getElementById('ipv6ConnectivityText');
            const summaryIpv6 = document.getElementById('summaryIpv6');
            const summaryIpv6Conn = document.getElementById('summaryIpv6Conn');

            ipv6Address = address;

            if (address) {
                addressEl.textContent = address;
                addressEl.classList.remove('loading', 'error');
                statusEl.textContent = '已获取';
                statusEl.className = 'ip-status success';
                summaryIpv6.textContent = address;
                summaryIpv6.className = 'summary-value success';
            } else {
                addressEl.textContent = '未检测到IPv6地址';
                addressEl.classList.remove('loading');
                addressEl.classList.add('error');
                statusEl.textContent = '无';
                statusEl.className = 'ip-status failed';
                summaryIpv6.textContent = '未检测到';
                summaryIpv6.className = 'summary-value none';
            }

            if (isConnected !== null) {
                if (isConnected) {
                    connectivityEl.className = 'connectivity-status success';
                    connectivityEl.innerHTML = `
                        <svg class="connectivity-icon success" viewBox="0 0 24 24">
                            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                        </svg>
                        <span>已接通</span>
                    `;
                    summaryIpv6Conn.textContent = '已接通';
                    summaryIpv6Conn.className = 'summary-value success';
                } else {
                    connectivityEl.className = 'connectivity-status failed';
                    connectivityEl.innerHTML = `
                        <svg class="connectivity-icon failed" viewBox="0 0 24 24">
                            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                        </svg>
                        <span>未接通</span>
                    `;
                    summaryIpv6Conn.textContent = '未接通';
                    summaryIpv6Conn.className = 'summary-value failed';
                }
            }
        }

        async function checkIPv4Connectivity() {
            try {
                const startTime = Date.now();
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);

                const response = await fetch('https://www.google.com/generate_204', {
                    method: 'HEAD',
                    mode: 'no-cors',
                    signal: controller.signal
                });

                clearTimeout(timeoutId);
                const latency = Date.now() - startTime;
                return latency < 5000;
            } catch (e) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 5000);

                    await fetch('https://www.baidu.com', {
                        method: 'HEAD',
                        mode: 'no-cors',
                        signal: controller.signal
                    });

                    clearTimeout(timeoutId);
                    return true;
                } catch (e2) {
                    return false;
                }
            }
        }

        async function checkIPv6Connectivity() {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);

                const response = await fetch('https://www.google.com/generate_204', {
                    method: 'HEAD',
                    mode: 'no-cors',
                    signal: controller.signal
                });

                clearTimeout(timeoutId);
                return true;
            } catch (e) {
                return false;
            }
        }

        async function getIPv4Address() {
            try {
                const response = await fetch('https://api.ipify.org?format=json', {
                    method: 'GET',
                    cache: 'no-cache'
                });
                if (response.ok) {
                    const data = await response.json();
                    return data.ip;
                }
            } catch (e) {
                try {
                    const response = await fetch('https://ipinfo.io/json', {
                        method: 'GET',
                        cache: 'no-cache'
                    });
                    if (response.ok) {
                        const data = await response.json();
                        return data.ip;
                    }
                } catch (e2) {}
            }
            return null;
        }

        async function getIPv6Address() {
            try {
                const response = await fetch('https://api64.ipify.org?format=json', {
                    method: 'GET',
                    cache: 'no-cache'
                });
                if (response.ok) {
                    const data = await response.json();
                    if (data.ip && data.ip.includes(':')) {
                        return data.ip;
                    }
                }
            } catch (e) {}
            return null;
        }

        async function startDetection() {
            if (isTesting) return;

            isTesting = true;
            const testBtn = document.getElementById('testBtn');
            testBtn.disabled = true;
            testBtn.classList.add('testing');
            testBtn.innerHTML = `
                <svg viewBox="0 0 24 24" style="animation: spin 1s linear infinite;">
                    <path d="M12 4V2C6.48 2 2 6.48 2 12h2c0-4.42 3.58-8 8-8zm0 16c-4.42 0-8-3.58-8-8H2c0 5.52 4.48 10 10 10v-2zm8-12c4.42 0 8 3.58 8 8h2c0-5.52-4.48-10-10-10v2z"/>
                </svg>
                检测中...
            `;

            document.getElementById('resultSummary').classList.remove('show');

            const ipv4AddressEl = document.getElementById('ipv4Address');
            const ipv6AddressEl = document.getElementById('ipv6Address');

            ipv4AddressEl.textContent = '正在获取公网地址';
            ipv4AddressEl.classList.add('loading');
            ipv4AddressEl.classList.remove('error');

            ipv6AddressEl.textContent = '正在获取IPv6地址';
            ipv6AddressEl.classList.add('loading');
            ipv6AddressEl.classList.remove('error');

            document.getElementById('ipv4Status').textContent = '检测中';
            document.getElementById('ipv4Status').className = 'ip-status detecting';
            document.getElementById('ipv6Status').textContent = '检测中';
            document.getElementById('ipv6Status').className = 'ip-status detecting';

            document.getElementById('ipv4Connectivity').className = 'connectivity-status testing';
            document.getElementById('ipv4Connectivity').innerHTML = `
                <svg class="connectivity-icon testing" viewBox="0 0 24 24">
                    <path d="M12 4V2C6.48 2 2 6.48 2 12h2c0-4.42 3.58-8 8-8zm0 16c-4.42 0-8-3.58-8-8H2c0 5.52 4.48 10 10 10v-2zm8-12c4.42 0 8 3.58 8 8h2c0-5.52-4.48-10-10-10v2z"/>
                </svg>
                <span>测试中</span>
            `;

            document.getElementById('ipv6Connectivity').className = 'connectivity-status testing';
            document.getElementById('ipv6Connectivity').innerHTML = `
                <svg class="connectivity-icon testing" viewBox="0 0 24 24">
                    <path d="M12 4V2C6.48 2 2 6.48 2 12h2c0-4.42 3.58-8 8-8zm0 16c-4.42 0-8-3.58-8-8H2c0 5.52 4.48 10 10 10v-2zm8-12c4.42 0 8 3.58 8 8h2c0-5.52-4.48-10-10-10v2z"/>
                </svg>
                <span>测试中</span>
            `;

            const [ipv4, ipv6] = await Promise.all([
                getIPv4Address(),
                getIPv6Address()
            ]);

            setIPv4Result(ipv4, null);
            setIPv6Result(ipv6, null);

            const [ipv4Conn, ipv6Conn] = await Promise.all([
                ipv4 ? checkIPv4Connectivity() : Promise.resolve(null),
                ipv6 ? checkIPv6Connectivity() : Promise.resolve(null)
            ]);

            if (ipv4) {
                setIPv4Result(ipv4, ipv4Conn);
            }

            if (ipv6) {
                setIPv6Result(ipv6, ipv6Conn);
            }

            if (!ipv4 && !ipv6) {
                document.getElementById('ipv4Connectivity').className = 'connectivity-status failed';
                document.getElementById('ipv4Connectivity').innerHTML = `
                    <svg class="connectivity-icon failed" viewBox="0 0 24 24">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                    <span>网络异常</span>
                `;
            }

            setTimeout(() => {
                document.getElementById('resultSummary').classList.add('show');
            }, 300);

            isTesting = false;
            testBtn.disabled = false;
            testBtn.classList.remove('testing');
            testBtn.innerHTML = `
                <svg viewBox="0 0 24 24">
                    <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                </svg>
                重新检测
            `;
        }

        window.addEventListener('load', function() {
            updateCardVisibility();
            setTimeout(startDetection, 500);
        });
    </script>
</body>
</html>
