<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>装维绑定邀请</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #131524;
            --bg-secondary: #131524;
            --bg-card: rgba(38, 41, 58, 0.65);
            --bg-card-hover: rgba(46, 49, 69, 0.75);
            --accent-blue: #5b8def;
            --accent-blue-light: #7ca6f3;
            --accent-cyan: #4ecdc4;
            --accent-green: #5dbe8d;
            --accent-orange: #f4a261;
            --accent-purple: #9b8bf4;
            --text-primary: #e8eaf0;
            --text-secondary: #9aa3b2;
            --text-tertiary: #6b7280;
            --border-subtle: rgba(91, 141, 239, 0.15);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: calc(80px + env(safe-area-inset-bottom));
        }

        /* 头部 */
        .header {
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.8) 0%, rgba(13, 17, 23, 0) 100%);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-subtle);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--text-primary);
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* 主内容 */
        .main-content {
            flex: 1;
            padding: 20px;
        }

        /* 装维信息卡片 */
        .staff-info-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-subtle);
            margin-bottom: 20px;
        }

        .staff-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .staff-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .staff-avatar svg {
            width: 32px;
            height: 32px;
            fill: #fff;
        }

        .staff-details h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .staff-id {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .staff-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(93, 190, 141, 0.15);
            border-radius: 20px;
            font-size: 12px;
            color: var(--accent-green);
            margin-top: 12px;
        }

        .staff-status::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 邀请区域 */
        .invitation-section {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-subtle);
            margin-bottom: 20px;
            text-align: center;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .section-desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        /* 二维码区域 */
        .qr-container {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            display: inline-block;
        }

        .qr-code {
            width: 180px;
            height: 180px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .qr-code::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 9px, #333 9px, #333 10px),
                repeating-linear-gradient(90deg, transparent, transparent 9px, #333 9px, #333 10px);
            opacity: 0.5;
        }

        .qr-code svg {
            width: 120px;
            height: 120px;
            fill: #fff;
            position: relative;
            z-index: 1;
        }

        .qr-refresh {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 12px;
            font-size: 12px;
            color: var(--accent-blue);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .qr-refresh:hover {
            color: var(--accent-blue-light);
        }

        .qr-refresh svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* 邀请码区域 */
        .invite-code-section {
            background: rgba(91, 141, 239, 0.1);
            border: 1px dashed var(--accent-blue);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .invite-code-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .invite-code {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent-blue);
            font-family: 'Courier New', monospace;
            letter-spacing: 4px;
            margin-bottom: 12px;
        }

        .invite-code-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .code-btn {
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .code-btn:hover {
            background: rgba(91, 141, 239, 0.1);
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .code-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* Toast提示 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <div class="header-top">
                <div class="back-btn" onclick="history.back()">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                    </svg>
                </div>
                <div class="header-title">邀请码</div>
            </div>
        </header>

        <!-- 主内容 -->
        <main class="main-content">
            <!-- 邀请区域 -->
            <div class="invitation-section">
                <div class="section-title">扫码绑定</div>
                <div class="section-desc">请用户扫描下方二维码或输入邀请码进行绑定</div>

                <!-- 二维码 -->
                <div class="qr-container">
                    <div class="qr-code" id="qrCode">
                        <svg viewBox="0 0 24 24">
                            <path d="M3 11h8V3H3v8zm2-6h4v4H5V5zM3 21h8v-8H3v8zm2-6h4v4H5v-4zM13 3v8h8V3h-8zm6 6h-4V5h4v4zM13 13h2v2h-2zM15 15h2v2h-2zM13 17h2v2h-2zM17 13h2v2h-2zM19 15h2v2h-2zM17 17h2v2h-2zM15 19h2v2h-2zM19 19h2v2h-2z"/>
                        </svg>
                    </div>
                </div>



                <!-- 邀请码 -->
                <div class="invite-code-section">
                    <div class="invite-code-label">专属邀请码</div>
                    <div class="invite-code" id="inviteCode">ST2024001</div>
                    <div class="invite-code-actions">
                        <button class="code-btn" onclick="copyInviteCode()">
                            <svg viewBox="0 0 24 24">
                                <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                            </svg>
                            复制
                        </button>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Toast提示 -->
    <div class="toast" id="toast"></div>

    <script>
        // 复制邀请码
        function copyInviteCode() {
            const code = document.getElementById('inviteCode').textContent;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(code).then(() => {
                    showToast('邀请码已复制');
                });
            } else {
                // 降级方案
                const input = document.createElement('input');
                input.value = code;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                showToast('邀请码已复制');
            }
        }

        // 显示Toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }


    </script>
</body>
</html>
