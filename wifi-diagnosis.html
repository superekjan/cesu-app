<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>网络测速</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #131524;
            --bg-secondary: #131524;
            --bg-card: rgba(38, 41, 58, 0.65);
            --bg-card-hover: rgba(46, 49, 69, 0.75);
            --accent-blue: #5b8def;
            --accent-blue-light: #7ca6f3;
            --accent-cyan: #4ecdc4;
            --accent-green: #5dbe8d;
            --accent-orange: #f4a261;
            --accent-purple: #9b8bf4;
            --text-primary: #e8eaf0;
            --text-secondary: #9aa3b2;
            --text-tertiary: #6b7280;
            --border-subtle: rgba(91, 141, 239, 0.15);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 头部 */
        .header {
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.8) 0%, rgba(13, 17, 23, 0) 100%);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-subtle);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--text-primary);
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .page-title-section {
            text-align: center;
            padding: 20px;
        }

        .page-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 6px;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 测速仪表盘 */
        .speed-gauge {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            position: relative;
        }

        .gauge-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin-bottom: 40px;
        }

        .gauge-svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .gauge-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 8;
        }

        .gauge-progress {
            fill: none;
            stroke: url(#gaugeGradient);
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 754;
            stroke-dashoffset: 754;
            transition: stroke-dashoffset 0.3s ease;
        }

        .gauge-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .gauge-value {
            font-size: 72px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 8px;
        }

        .gauge-unit {
            font-size: 16px;
            color: var(--text-secondary);
        }

        .gauge-label {
            font-size: 13px;
            color: var(--text-tertiary);
            margin-top: 8px;
        }

        /* 测速按钮 */
        .speed-btn {
            width: 200px;
            height: 56px;
            background: linear-gradient(270deg, #00c6ff 0%, #0072ff 100%);
            border: none;
            border-radius: 28px;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 114, 255, 0.4);
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .speed-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0, 114, 255, 0.5);
        }

        .speed-btn:active {
            transform: translateY(0);
        }

        .speed-btn:disabled {
            background: linear-gradient(270deg, #3a4a5c 0%, #2d3a4a 100%);
            cursor: not-allowed;
            box-shadow: none;
        }

        /* 测速结果区域 */
        .results-section {
            width: 100%;
            padding: 0 20px;
            margin-top: 20px;
            display: none;
        }

        .results-section.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .result-item {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px 12px;
            text-align: center;
            border: 1px solid var(--border-subtle);
        }

        .result-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-blue);
            margin-bottom: 4px;
        }

        .result-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .result-unit {
            font-size: 11px;
            color: var(--text-tertiary);
        }

        /* 底部安全区域 */
        .safe-area-bottom {
            height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- SVG渐变定义 -->
        <svg width="0" height="0" style="position: absolute;">
            <defs>
                <linearGradient id="gaugeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#39d0d8;stop-opacity:1" />
                </linearGradient>
            </defs>
        </svg>

        <!-- 头部 -->
        <header class="header">
            <div class="header-top">
                <div class="header-left">
                    <div class="back-btn" onclick="location.href='toolbox.html'">
                        <svg viewBox="0 0 24 24">
                            <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                        </svg>
                    </div>
                    <div class="header-title">网络测速</div>
                </div>
            </div>
        </header>

        <!-- 页面标题 -->
        <div class="page-title-section">
            <div class="page-title">网络测速</div>
            <div class="page-subtitle">检测您的网络连接质量</div>
        </div>

        <!-- 测速仪表盘 -->
        <div class="speed-gauge">
            <div class="gauge-container">
                <svg class="gauge-svg" viewBox="0 0 240 240">
                    <circle class="gauge-bg" cx="120" cy="120" r="110"/>
                    <circle class="gauge-progress" id="gaugeProgress" cx="120" cy="120" r="110"/>
                </svg>
                <div class="gauge-inner">
                    <div class="gauge-value" id="speedValue">0.0</div>
                    <div class="gauge-unit">Mbps</div>
                    <div class="gauge-label" id="gaugeLabel">点击开始测速</div>
                </div>
            </div>

            <button class="speed-btn" id="speedBtn" onclick="startSpeedTest()">开始测速</button>

            <!-- 测速结果 -->
            <div class="results-section" id="resultsSection">
                <div class="results-grid">
                    <div class="result-item">
                        <div class="result-value" id="downloadValue">--</div>
                        <div class="result-label">下行速率</div>
                        <div class="result-unit">Mbps</div>
                    </div>
                    <div class="result-item">
                        <div class="result-value" id="uploadValue">--</div>
                        <div class="result-label">上行速率</div>
                        <div class="result-unit">Mbps</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="safe-area-bottom"></div>
    </div>

    <script>
        let isTesting = false;

        function startSpeedTest() {
            if (isTesting) return;
            
            isTesting = true;
            const btn = document.getElementById('speedBtn');
            const gaugeLabel = document.getElementById('gaugeLabel');
            const gaugeProgress = document.getElementById('gaugeProgress');
            const speedValue = document.getElementById('speedValue');
            const resultsSection = document.getElementById('resultsSection');
            
            btn.disabled = true;
            btn.textContent = '测速中...';
            gaugeLabel.textContent = '正在测试网络...';
            resultsSection.classList.remove('show');
            
            // 模拟测速过程
            let progress = 0;
            const testInterval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress > 100) progress = 100;
                
                // 更新仪表盘
                const offset = 754 - (754 * progress / 100);
                gaugeProgress.style.strokeDashoffset = offset;
                speedValue.textContent = (progress * 5.5).toFixed(1);
                
                if (progress >= 100) {
                    clearInterval(testInterval);
                    completeTest();
                }
            }, 200);
            
            function completeTest() {
                // 生成测试结果
                const testResults = {
                    download: 350 + Math.random() * 200,
                    upload: (350 + Math.random() * 200) * 0.6
                };
                
                // 显示结果 - 只显示上行和下行速率
                document.getElementById('downloadValue').textContent = testResults.download.toFixed(1);
                document.getElementById('uploadValue').textContent = testResults.upload.toFixed(1);
                
                // 更新UI
                speedValue.textContent = testResults.download.toFixed(1);
                gaugeLabel.textContent = '测速完成';
                btn.disabled = false;
                btn.textContent = '重新测速';
                resultsSection.classList.add('show');
                
                // 保存结果
                localStorage.setItem('speedTestResults', JSON.stringify(testResults));
                
                isTesting = false;
            }
        }
    </script>
</body>
</html>
