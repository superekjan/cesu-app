<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>账号绑定</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #131524;
            --bg-secondary: #131524;
            --bg-card: rgba(38, 41, 58, 0.65);
            --bg-card-hover: rgba(46, 49, 69, 0.75);
            --accent-blue: #5b8def;
            --accent-blue-light: #7ca6f3;
            --accent-cyan: #4ecdc4;
            --accent-green: #5dbe8d;
            --accent-orange: #f4a261;
            --accent-purple: #9b8bf4;
            --accent-red: #ef4444;
            --text-primary: #e8eaf0;
            --text-secondary: #9aa3b2;
            --text-tertiary: #6b7280;
            --border-subtle: rgba(91, 141, 239, 0.15);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 头部 */
        .header {
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.8) 0%, rgba(13, 17, 23, 0) 100%);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-subtle);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--text-primary);
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* 主内容 */
        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        /* 绑定状态卡片 */
        .binding-status {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-subtle);
            margin-bottom: 20px;
            text-align: center;
        }

        .status-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: rgba(16, 185, 129, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-icon svg {
            width: 32px;
            height: 32px;
            fill: var(--accent-green);
        }

        .status-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .status-desc {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 绑定列表 */
        .binding-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .binding-item {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .binding-icon {
            width: 48px;
            height: 48px;
            background: rgba(88, 166, 255, 0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .binding-icon svg {
            width: 24px;
            height: 24px;
            fill: var(--accent-blue);
        }

        .binding-icon.wechat {
            background: rgba(16, 185, 129, 0.15);
        }

        .binding-icon.wechat svg {
            fill: var(--accent-green);
        }

        .binding-info {
            flex: 1;
        }

        .binding-name {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .binding-value {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .binding-action {
            padding: 8px 16px;
            background: rgba(248, 81, 73, 0.15);
            border: none;
            border-radius: 8px;
            font-size: 13px;
            color: var(--accent-red);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .binding-action:hover {
            background: rgba(248, 81, 73, 0.25);
        }

        .binding-action.bind {
            background: rgba(88, 166, 255, 0.15);
            color: var(--accent-blue);
        }

        .binding-action.bind:hover {
            background: rgba(88, 166, 255, 0.25);
        }

        /* 装维绑定区域 */
        .staff-binding-section {
            margin-top: 24px;
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            padding-left: 4px;
        }

        /* 绑定方式选择 */
        .binding-methods {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .method-btn {
            flex: 1;
            padding: 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .method-btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-blue);
        }

        .method-btn.active {
            background: rgba(91, 141, 239, 0.15);
            border-color: var(--accent-blue);
        }

        .method-icon {
            width: 40px;
            height: 40px;
            margin: 0 auto 8px;
            background: rgba(91, 141, 239, 0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .method-icon svg {
            width: 20px;
            height: 20px;
            fill: var(--accent-blue);
        }

        .method-name {
            font-size: 13px;
            color: var(--text-primary);
            font-weight: 500;
        }

        /* 绑定表单 */
        .binding-form {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-subtle);
            display: none;
        }

        .binding-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: block;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            font-size: 15px;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-input::placeholder {
            color: var(--text-tertiary);
        }

        .form-hint {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 6px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(91, 141, 239, 0.4);
        }

        .submit-btn:disabled {
            background: linear-gradient(135deg, #3a4a5c, #2d3a4a);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 扫码区域 */
        .scan-area {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            border: 2px dashed var(--border-subtle);
            margin-bottom: 16px;
        }

        .scan-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: rgba(91, 141, 239, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scan-icon svg {
            width: 32px;
            height: 32px;
            fill: var(--accent-blue);
        }

        .scan-text {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .scan-btn {
            padding: 10px 24px;
            background: rgba(91, 141, 239, 0.15);
            border: 1px solid var(--accent-blue);
            border-radius: 8px;
            font-size: 14px;
            color: var(--accent-blue);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .scan-btn:hover {
            background: rgba(91, 141, 239, 0.25);
        }

        /* 已绑定装维信息 */
        .staff-info-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-subtle);
            margin-top: 16px;
        }

        .staff-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .staff-avatar {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .staff-avatar svg {
            width: 28px;
            height: 28px;
            fill: #fff;
        }

        .staff-basic-info {
            flex: 1;
        }

        .staff-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .staff-id {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .staff-status {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: rgba(93, 190, 141, 0.15);
            border-radius: 12px;
            font-size: 11px;
            color: var(--accent-green);
        }

        .staff-status::before {
            content: '';
            width: 5px;
            height: 5px;
            background: var(--accent-green);
            border-radius: 50%;
        }

        .staff-details {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .detail-value {
            font-size: 13px;
            color: var(--text-primary);
        }

        .unbind-staff-btn {
            width: 100%;
            padding: 12px;
            background: rgba(248, 81, 73, 0.15);
            border: 1px solid rgba(248, 81, 73, 0.3);
            border-radius: 8px;
            font-size: 14px;
            color: var(--accent-red);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .unbind-staff-btn:hover {
            background: rgba(248, 81, 73, 0.25);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
        }

        .empty-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-icon svg {
            width: 32px;
            height: 32px;
            fill: var(--text-tertiary);
        }

        .empty-text {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Toast提示 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            max-width: 320px;
            width: 100%;
            border: 1px solid var(--border-subtle);
        }

        .modal-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            text-align: center;
        }

        .modal-text {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.5;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .modal-btn.cancel {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
        }

        .modal-btn.cancel:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .modal-btn.confirm {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            color: #fff;
        }

        .modal-btn.confirm:hover {
            opacity: 0.9;
        }

        .modal-btn.danger {
            background: rgba(248, 81, 73, 0.15);
            color: var(--accent-red);
            border: 1px solid rgba(248, 81, 73, 0.3);
        }

        .modal-btn.danger:hover {
            background: rgba(248, 81, 73, 0.25);
        }

    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <div class="header-top">
                <div class="back-btn" onclick="history.back()">
                    <svg viewBox="0 0 24 24">
                        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                    </svg>
                </div>
                <div class="header-title">账号绑定</div>
            </div>
        </header>

        <!-- 主内容 -->
        <main class="main-content">
            <!-- 绑定状态 -->
            <div class="binding-status">
                <div class="status-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                </div>
                <div class="status-title">账号绑定正常</div>
                <div class="status-desc">您的账号已绑定手机和微信</div>
            </div>

            <!-- 绑定列表 -->
            <div class="binding-list">
                <div class="binding-item" onclick="goToPhoneBinding()">
                    <div class="binding-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                        </svg>
                    </div>
                    <div class="binding-info">
                        <div class="binding-name">手机号码</div>
                        <div class="binding-value" id="phoneBindingStatus">138****5678</div>
                    </div>
                    <svg class="settings-arrow" viewBox="0 0 24 24" style="width: 20px; height: 20px; fill: var(--text-tertiary);">
                        <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/>
                    </svg>
                </div>

                <div class="binding-item">
                    <div class="binding-icon wechat">
                        <svg viewBox="0 0 24 24">
                            <path d="M9.5 4C5.36 4 2 6.69 2 10c0 1.89 1.08 3.56 2.78 4.66L4 17l2.5-1.5c.89.31 1.87.5 2.91.5.38 0 .76-.03 1.12-.08-.26-.64-.41-1.34-.41-2.07 0-2.76 2.69-5 6-5 .46 0 .9.05 1.33.14C16.86 6.06 13.57 4 9.5 4zm-2.7 4.29c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm5.4 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zM16 10c-2.76 0-5 1.79-5 4s2.24 4 5 4c.61 0 1.19-.08 1.73-.23L20 19l-.55-1.66C20.42 16.4 21 15.26 21 14c0-2.21-2.24-4-5-4zm-2.5 3c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm5 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1z"/>
                        </svg>
                    </div>
                    <div class="binding-info">
                        <div class="binding-name">微信账号</div>
                        <div class="binding-value">微信用户_abc123</div>
                    </div>
                    <button class="binding-action" onclick="unbindWechat()">解绑</button>
                </div>
            </div>

        </main>
    </div>

    <script>
        // 跳转到手机号绑定页面
        function goToPhoneBinding() {
            window.location.href = 'phone-binding.html';
        }

        // 解绑微信
        function unbindWechat() {
            if (confirm('确定要解绑微信账号吗？')) {
                alert('解绑功能开发中...');
            }
        }

        // 页面加载时检查手机号绑定状态
        window.addEventListener('load', function() {
            const isPhoneBound = localStorage.getItem('isPhoneBound');
            const boundPhone = localStorage.getItem('boundPhone');
            const phoneStatus = document.getElementById('phoneBindingStatus');

            if (isPhoneBound === 'true' && boundPhone) {
                // 已绑定，显示脱敏手机号
                phoneStatus.textContent = boundPhone.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2');
                phoneStatus.style.color = 'var(--accent-green)';
            } else {
                // 未绑定
                phoneStatus.textContent = '未绑定';
                phoneStatus.style.color = 'var(--accent-orange)';
            }
        });
    </script>
</body>
</html>
