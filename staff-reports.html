<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>用户报告</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #060d1f;
            --bg-card: rgba(14, 28, 60, 0.55);
            --accent-blue: #00aaff;
            --accent-cyan: #38bdf8;
            --accent-light: #7dd3fc;
            --accent-green: #06b6d4;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --text-primary: #e8f0ff;
            --text-secondary: #94a3c8;
            --text-tertiary: #5a6a8a;
            --border-subtle: rgba(56, 189, 248, 0.12);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(180deg, #060d1f 0%, #0a162e 50%, #071024 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 头部 */
        .header {
            background: rgba(6, 13, 31, 0.95);
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid var(--border-subtle);
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s ease;
        }

        .back-btn:active {
            background: rgba(255, 255, 255, 0.08);
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--text-primary);
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-count {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-left: auto;
        }

        /* 搜索区 */
        .search-section {
            padding: 12px 16px;
            background: rgba(6, 13, 31, 0.8);
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            padding: 0 14px;
            transition: border-color 0.2s ease;
        }

        .search-box:focus-within {
            border-color: var(--accent-blue);
        }

        .search-icon {
            width: 20px;
            height: 20px;
            fill: var(--text-tertiary);
            flex-shrink: 0;
        }

        .search-input {
            flex: 1;
            height: 42px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }

        .search-input::placeholder {
            color: var(--text-tertiary);
        }

        .search-clear {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s ease;
        }

        .search-clear:active {
            opacity: 1;
        }

        .search-clear svg {
            width: 16px;
            height: 16px;
            fill: var(--text-tertiary);
        }

        /* 主内容 */
        .main-content {
            flex: 1;
            padding: 0 16px 24px;
            overflow-y: auto;
        }

        /* 用户分组 */
        .user-group {
            margin-bottom: 16px;
        }

        .user-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            margin-bottom: 8px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .user-phone {
            font-size: 12px;
            color: var(--text-secondary);
            font-family: 'SF Mono', Menlo, Consolas, monospace;
        }

        .user-address {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-report-count {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        /* 报告列表 */
        .report-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .report-item {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-subtle);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .report-item:active {
            transform: scale(0.99);
        }

        .report-item.expanded {
            border-color: rgba(56, 189, 248, 0.3);
        }

        /* 报告头部 */
        .report-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            cursor: pointer;
        }

        .report-type-icon {
            width: 36px;
            height: 36px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .report-type-icon.speed {
            background: rgba(0, 170, 255, 0.15);
        }

        .report-type-icon.speed svg {
            fill: var(--accent-blue);
        }

        .report-type-icon.wifi {
            background: rgba(56, 189, 248, 0.15);
        }

        .report-type-icon.wifi svg {
            fill: var(--accent-cyan);
        }

        .report-type-icon.fault {
            background: rgba(245, 158, 11, 0.15);
        }

        .report-type-icon.fault svg {
            fill: var(--accent-orange);
        }

        .report-type-icon svg {
            width: 18px;
            height: 18px;
        }

        .report-info {
            flex: 1;
            min-width: 0;
        }

        .report-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .report-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2px;
        }

        .report-date {
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .report-meta {
            font-size: 11px;
            color: var(--text-tertiary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .report-badge {
            padding: 2px 6px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 500;
        }

        .report-badge.good {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }

        .report-badge.warning {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }

        .report-badge.error {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .expand-icon {
            width: 18px;
            height: 18px;
            fill: var(--text-tertiary);
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }

        .report-item.expanded .expand-icon {
            transform: rotate(180deg);
        }

        /* 报告详情 */
        .report-detail {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .report-item.expanded .report-detail {
            max-height: 500px;
        }

        .report-detail-content {
            padding: 0 14px 14px;
            border-top: 1px solid var(--border-subtle);
        }

        .detail-sections {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-top: 10px;
        }

        .detail-section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 10px 12px;
            border: 1px solid var(--border-subtle);
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        .section-status {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 500;
        }

        .section-status.good {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }

        .section-status.warning {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }

        .section-status.error {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .section-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .metric-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .metric-label {
            font-size: 10px;
            color: var(--text-tertiary);
        }

        .metric-value {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: baseline;
            gap: 2px;
        }

        .metric-value .unit {
            font-size: 9px;
            color: var(--text-tertiary);
            font-weight: 400;
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            text-align: center;
        }

        .empty-icon {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-icon svg {
            width: 100%;
            height: 100%;
            fill: var(--text-tertiary);
        }

        .empty-text {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .empty-hint {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        /* 搜索结果提示 */
        .search-result-tip {
            padding: 8px 0;
            font-size: 12px;
            color: var(--text-tertiary);
            display: none;
        }

        .search-result-tip.visible {
            display: block;
        }
    </style>
</head>
<body>

        // 初始化
        function init() {
            allReports = collectAllReports();
            renderReports();
            updateHeaderCount();

            // 绑定搜索事件
            $('searchInput').addEventListener('input', handleSearch);
        }

        // 收集所有报告
        function collectAllReports() {
            const reports = [];
            mockData.users.forEach(user => {
                user.reports.forEach(report => {
                    reports.push({
                        ...report,
                        userId: user.id,
                        userName: user.name,
                        userPhone: user.phone,
                        userAddress: user.address,
                        avatar: user.avatar
                    });
                });
            });
            // 按日期降序排列
            reports.sort((a, b) => new Date(b.date) - new Date(a.date));
            return reports;
        }

        // 更新头部数量
        function updateHeaderCount() {
            const filtered = getFilteredReports();
            $('headerCount').textContent = `共 ${filtered.length} 份`;
        }

        // 获取筛选后的报告
        function getFilteredReports() {
            let reports = allReports;

            // 按关键词搜索
            if (searchKeyword) {
                const kw = searchKeyword.toLowerCase();
                reports = reports.filter(r =>
                    r.userName.toLowerCase().includes(kw) ||
                    r.userPhone.includes(kw) ||
                    r.userAddress.toLowerCase().includes(kw)
                );
            }

            return reports;
        }

        // 按用户分组
        function groupByUser(reports) {
            const groups = {};
            reports.forEach(report => {
                if (!groups[report.userId]) {
                    groups[report.userId] = {
                        user: {
                            id: report.userId,
                            name: report.userName,
                            phone: report.userPhone,
                            address: report.userAddress,
                            avatar: report.avatar
                        },
                        reports: []
                    };
                }
                groups[report.userId].reports.push(report);
            });
            return Object.values(groups);
        }

        // 渲染报告列表

            const container = $('reportContainer');
            const filtered = getFilteredReports();

                        </div>
                        <div class="empty-text">${searchKeyword ? '未找到匹配的報告' : '暂无报告记录'}</div>
                        <div class="empty-hint">${searchKeyword ? '尝试其他手机号搜索' : '用户报告将在测速后显示'}</div>
                    </div>
                `;
                return;
            }

            const groups = groupByUser(filtered);
            let html = '';

            if (searchKeyword) {
                html += `<div class="search-result-tip visible">找到 ${filtered.length} 份报告（${groups.length} 位用户）</div>`;
            }

            groups.forEach(group => {
                html += `
                    <div class="user-group">
                        <div class="user-header">
                            <div class="user-avatar">${group.user.avatar}</div>
                            <div class="user-info">
                                <div class="user-name">${group.user.name}</div>
                            </div>
                            <div class="user-report-count">${group.reports.length}份报告</div>
                        </div>
                        <div class="report-list">
                            ${group.reports.map(report => renderReportItem(report)).join('')}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // 截取地址（去掉省市区）
        function truncateAddress(address) {
            return address.replace(/^[^区]+区/, '');
        }

        // 渲染单个报告
        function renderReportItem(report) {
            const typeIcon = getTypeIcon(report.type);
            const statusClass = report.status;

            return `
                <div class="report-item" onclick="toggleReport(this)">
                    <div class="report-header">
                        <div class="report-type-icon ${report.type}">
                            ${typeIcon}
                        </div>
                        <div class="report-info">
                            <div class="report-title-row">
                                <div class="report-title">${report.userPhone}</div>
                                <div class="report-date">${report.date}</div>
                            </div>
                            <div class="report-meta">
                                <span>${truncateAddress(report.userAddress)}</span>
                            </div>
                        </div>
                        <svg class="expand-icon" viewBox="0 0 24 24">
                            <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
                        </svg>
                    </div>
                    <div class="report-detail">
                        <div class="report-detail-content">
                            <div class="detail-sections">
                                ${renderWifiSection(report)}
                                ${renderDeviceSection(report)}
                                ${renderQualitySection(report)}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // 获取类型图标
        function getTypeIcon(type) {
            const icons = {
                speed: '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>',
                wifi: '<svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>',
                fault: '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>'
            };
            return icons[type] || icons.speed;
        }

        // 渲染WiFi信息区块
        function renderWifiSection(report) {
            const w = report.wifi;
            const status = w.signal > -60 ? 'good' : (w.signal > -75 ? 'warning' : 'error');
            const statusText = status === 'good' ? '正常' : (status === 'warning' ? '一般' : '较差');

            return `
                <div class="detail-section">
                    <div class="section-header">
                        <div class="section-title">WiFi信息</div>
                        <div class="section-status ${status}">${statusText}</div>
                    </div>
                    <div class="section-grid">
                        <div class="metric-item">
                            <div class="metric-label">速率</div>
                            <div class="metric-value">${w.rate}<span class="unit">Mbps</span></div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">频段</div>
                            <div class="metric-value">${w.band}<span class="unit">GHz</span></div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">信号</div>
                            <div class="metric-value">${w.signal}<span class="unit">dBm</span></div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">WiFi名称</div>
                            <div class="metric-value" style="font-size:11px">${w.ssid}</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">干扰</div>
                            <div class="metric-value" style="font-size:11px">${w.noise}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // 渲染设备信息区块
        function renderDeviceSection(report) {
            const d = report.device;
            return `
                <div class="detail-section">
                    <div class="section-header">
                        <div class="section-title">设备信息</div>
                    </div>
                    <div class="section-grid">
                        <div class="metric-item">
                            <div class="metric-label">手机厂家</div>
                            <div class="metric-value" style="font-size:11px">${d.vendor}</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">手机型号</div>
                            <div class="metric-value" style="font-size:11px">${d.model}</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">网关厂家</div>
                            <div class="metric-value" style="font-size:11px">${d.gateway}</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">手机WiFi6</div>
                            <div class="metric-value" style="font-size:11px">${d.wifi6Phone}</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">网关WiFi6</div>
                            <div class="metric-value" style="font-size:11px">${d.wifi6Gateway}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // 渲染网络质量区块
        function renderQualitySection(report) {
            const q = report.quality;
            const innerDelay = parseInt(q.innerDelay);
            const outerDelay = parseInt(q.outerDelay);
            const innerStatus = innerDelay < 10 ? 'good' : (innerDelay < 30 ? 'warning' : 'error');
            const innerText = innerStatus === 'good' ? '优秀' : (innerStatus === 'warning' ? '一般' : '较差');

            return `
                <div class="detail-section">
                    <div class="section-header">
                        <div class="section-title">网络质量</div>
                        <div class="section-status ${innerStatus}">${innerText}</div>
                    </div>
                    <div class="section-grid">
                        <div class="metric-item">
                            <div class="metric-label">上行</div>
                            <div class="metric-value">${q.up}<span class="unit">MB/s</span></div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">下行</div>
                            <div class="metric-value">${q.down}<span class="unit">MB/s</span></div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">内网延迟</div>
                            <div class="metric-value">${q.innerDelay}<span class="unit">ms</span></div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">外网延迟</div>
                            <div class="metric-value">${q.outerDelay}<span class="unit">ms</span></div>
                        </div>
                    </div>
                </div>
            `;
        }

        // 切换报告展开
        function toggleReport(element) {
            const wasExpanded = element.classList.contains('expanded');

            // 关闭所有其他报告
            document.querySelectorAll('.report-item.expanded').forEach(item => {
                if (item !== element) {
                    item.classList.remove('expanded');
                }
            });

            // 切换当前报告
            element.classList.toggle('expanded', !wasExpanded);
        }

        // 搜索处理
        function handleSearch(e) {
            searchKeyword = e.target.value.trim();
            const clearBtn = $('searchClear');
            clearBtn.style.display = searchKeyword ? 'flex' : 'none';
            updateHeaderCount();
            renderReports();
        }

        // 清除搜索
        function clearSearch() {
            $('searchInput').value = '';
            searchKeyword = '';
            $('searchClear').style.display = 'none';
            updateHeaderCount();
            renderReports();
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
