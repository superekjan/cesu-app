<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的预约</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #131524;
            --bg-secondary: #131524;
            --bg-card: rgba(38, 41, 58, 0.65);
            --bg-card-hover: rgba(46, 49, 69, 0.75);
            --accent-blue: #5b8def;
            --accent-blue-light: #7ca6f3;
            --accent-cyan: #4ecdc4;
            --accent-green: #5dbe8d;
            --accent-orange: #f4a261;
            --accent-purple: #9b8bf4;
            --accent-red: #ef4444;
            --text-primary: #e8eaf0;
            --text-secondary: #9aa3b2;
            --text-tertiary: #6b7280;
            --border-subtle: rgba(91, 141, 239, 0.15);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 头部 */
        .header {
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.8) 0%, rgba(13, 17, 23, 0) 100%);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-subtle);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--text-primary);
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* 主内容 */
        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px 12px;
            text-align: center;
            border: 1px solid var(--border-subtle);
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-blue);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* 筛选标签 */
        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .filter-tabs::-webkit-scrollbar {
            display: none;
        }

        .filter-tab {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .filter-tab:hover, .filter-tab.active {
            background: rgba(91, 141, 239, 0.15);
            color: var(--accent-blue);
            border-color: rgba(91, 141, 239, 0.3);
        }

        /* 预约列表 */
        .appointment-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .appointment-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border-subtle);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .appointment-card:hover {
            border-color: rgba(91, 141, 239, 0.3);
            transform: translateY(-1px);
        }

        .appointment-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .appointment-id {
            font-size: 13px;
            color: var(--text-tertiary);
        }

        .appointment-status {
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
        }

        .appointment-status.pending {
            background: rgba(240, 136, 62, 0.15);
            color: var(--accent-orange);
        }

        .appointment-status.processing {
            background: rgba(88, 166, 255, 0.15);
            color: var(--accent-blue);
        }

        .appointment-status.completed {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-green);
        }

        .appointment-type {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .type-icon {
            width: 44px;
            height: 44px;
            background: rgba(248, 81, 73, 0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .type-icon svg {
            width: 24px;
            height: 24px;
            fill: var(--accent-red);
        }

        .type-icon.service {
            background: rgba(88, 166, 255, 0.15);
        }

        .type-icon.service svg {
            fill: var(--accent-blue);
        }

        .type-info {
            flex: 1;
        }

        .type-name {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .type-sub {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .appointment-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .info-row svg {
            width: 16px;
            height: 16px;
            fill: var(--text-tertiary);
        }

        .info-label {
            color: var(--text-tertiary);
        }

        .info-value {
            color: var(--text-secondary);
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-icon svg {
            width: 100%;
            height: 100%;
            fill: var(--text-tertiary);
        }

        .empty-text {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .empty-subtext {
            font-size: 13px;
            color: var(--text-tertiary);
        }

        /* 新建预约按钮 */
        .new-btn {
            position: fixed;
            bottom: calc(20px + env(safe-area-inset-bottom));
            right: 20px;
            width: 56px;
            height: 56px;
            background: linear-gradient(270deg, #00c6ff 0%, #0072ff 100%);
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0, 114, 255, 0.4);
            transition: all 0.2s ease;
            z-index: 100;
        }

        .new-btn:hover {
            transform: scale(1.05);
        }

        .new-btn svg {
            width: 24px;
            height: 24px;
            fill: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <div class="header-top">
                <div class="back-btn" onclick="history.back()">
                    <svg viewBox="0 0 24 24">
                        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                    </svg>
                </div>
                <div class="header-title">我的预约</div>
            </div>
        </header>

        <!-- 主内容 -->
        <main class="main-content">
            <!-- 统计 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value">3</div>
                    <div class="stat-label">全部预约</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">1</div>
                    <div class="stat-label">进行中</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">2</div>
                    <div class="stat-label">已完成</div>
                </div>
            </div>

            <!-- 筛选 -->
            <div class="filter-tabs">
                <div class="filter-tab active" onclick="selectFilter(this, 'all')">全部</div>
                <div class="filter-tab" onclick="selectFilter(this, 'pending')">待处理</div>
                <div class="filter-tab" onclick="selectFilter(this, 'processing')">进行中</div>
                <div class="filter-tab" onclick="selectFilter(this, 'completed')">已完成</div>
            </div>

            <!-- 预约列表 -->
            <div class="appointment-list">
                <div class="appointment-card" onclick="viewAppointment('APT20240320001')">
                    <div class="appointment-header">
                        <span class="appointment-id">APT20240320001</span>
                        <span class="appointment-status pending">待处理</span>
                    </div>
                    <div class="appointment-type">
                        <div class="type-icon">
                            <svg viewBox="0 0 24 24">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                            </svg>
                        </div>
                        <div class="type-info">
                            <div class="type-name">无法上网</div>
                            <div class="type-sub">故障类预约</div>
                        </div>
                    </div>
                    <div class="appointment-info">
                        <div class="info-row">
                            <svg viewBox="0 0 24 24">
                                <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>
                            </svg>
                            <span class="info-label">预约时间：</span>
                            <span class="info-value">2024-03-22 14:00-16:00</span>
                        </div>
                        <div class="info-row">
                            <svg viewBox="0 0 24 24">
                                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                            </svg>
                            <span class="info-label">服务地址：</span>
                            <span class="info-value">北京市朝阳区建国路88号</span>
                        </div>
                    </div>
                </div>

                <div class="appointment-card" onclick="viewAppointment('APT20240315002')">
                    <div class="appointment-header">
                        <span class="appointment-id">APT20240315002</span>
                        <span class="appointment-status processing">进行中</span>
                    </div>
                    <div class="appointment-type">
                        <div class="type-icon service">
                            <svg viewBox="0 0 24 24">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                            </svg>
                        </div>
                        <div class="type-info">
                            <div class="type-name">智能组网</div>
                            <div class="type-sub">延伸服务类预约</div>
                        </div>
                    </div>
                    <div class="appointment-info">
                        <div class="info-row">
                            <svg viewBox="0 0 24 24">
                                <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>
                            </svg>
                            <span class="info-label">预约时间：</span>
                            <span class="info-value">2024-03-20 09:00-11:00</span>
                        </div>
                        <div class="info-row">
                            <svg viewBox="0 0 24 24">
                                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                            </svg>
                            <span class="info-label">服务地址：</span>
                            <span class="info-value">北京市朝阳区建国路88号</span>
                        </div>
                    </div>
                </div>

                <div class="appointment-card" onclick="viewAppointment('APT20240310003')">
                    <div class="appointment-header">
                        <span class="appointment-id">APT20240310003</span>
                        <span class="appointment-status completed">已完成</span>
                    </div>
                    <div class="appointment-type">
                        <div class="type-icon">
                            <svg viewBox="0 0 24 24">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                            </svg>
                        </div>
                        <div class="type-info">
                            <div class="type-name">上网慢</div>
                            <div class="type-sub">故障类预约</div>
                        </div>
                    </div>
                    <div class="appointment-info">
                        <div class="info-row">
                            <svg viewBox="0 0 24 24">
                                <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>
                            </svg>
                            <span class="info-label">预约时间：</span>
                            <span class="info-value">2024-03-10 10:00-12:00</span>
                        </div>
                        <div class="info-row">
                            <svg viewBox="0 0 24 24">
                                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                            </svg>
                            <span class="info-label">服务地址：</span>
                            <span class="info-value">北京市朝阳区建国路88号</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- 新建预约按钮 -->
        <button class="new-btn" onclick="newAppointment()">
            <svg viewBox="0 0 24 24">
                <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
            </svg>
        </button>
    </div>

    <script>
        // 筛选
        function selectFilter(element, filter) {
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            element.classList.add('active');
        }

        // 查看预约详情
        function viewAppointment(aptId) {
            alert('查看预约详情: ' + aptId);
        }

        // 新建预约
        function newAppointment() {
            window.location.href = 'service-booking.html';
        }
    </script>
</body>
</html>
