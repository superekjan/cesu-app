<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>绑定手机号</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #131524;
            --bg-secondary: #131524;
            --bg-card: rgba(38, 41, 58, 0.65);
            --bg-card-hover: rgba(46, 49, 69, 0.75);
            --accent-blue: #5b8def;
            --accent-blue-light: #7ca6f3;
            --accent-cyan: #4ecdc4;
            --accent-green: #5dbe8d;
            --accent-orange: #f4a261;
            --accent-purple: #9b8bf4;
            --accent-red: #ef4444;
            --text-primary: #e8eaf0;
            --text-secondary: #9aa3b2;
            --text-tertiary: #6b7280;
            --border-subtle: rgba(91, 141, 239, 0.15);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 头部 */
        .header {
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.8) 0%, rgba(13, 17, 23, 0) 100%);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-subtle);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--text-primary);
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* 主内容 */
        .main-content {
            flex: 1;
            padding: 32px 24px;
            overflow-y: auto;
        }

        /* 页面标题 */
        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(91, 141, 239, 0.3);
        }

        .page-icon svg {
            width: 36px;
            height: 36px;
            fill: #fff;
        }

        .page-title {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .page-desc {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* 表单区域 */
        .form-container {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-subtle);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            display: block;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            font-size: 16px;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-input::placeholder {
            color: var(--text-tertiary);
        }

        .input-prefix {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-input.with-prefix {
            padding-left: 56px;
        }

        /* 验证码输入 */
        .code-input-wrapper {
            display: flex;
            gap: 12px;
        }

        .code-input-wrapper .form-input {
            flex: 1;
        }

        .code-btn {
            padding: 0 20px;
            background: rgba(91, 141, 239, 0.15);
            border: 1px solid var(--accent-blue);
            border-radius: 10px;
            font-size: 14px;
            color: var(--accent-blue);
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            min-width: 110px;
        }

        .code-btn:hover:not(:disabled) {
            background: rgba(91, 141, 239, 0.25);
        }

        .code-btn:disabled {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border-subtle);
            color: var(--text-tertiary);
            cursor: not-allowed;
        }

        /* 提交按钮 */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(91, 141, 239, 0.4);
        }

        .submit-btn:disabled {
            background: linear-gradient(135deg, #3a4a5c, #2d3a4a);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 提示信息 */
        .form-hint {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .form-hint svg {
            width: 14px;
            height: 14px;
            fill: var(--text-tertiary);
        }

        /* 协议区域 */
        .agreement-section {
            margin-top: 20px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .checkbox {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border-subtle);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .checkbox.checked {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .checkbox svg {
            width: 12px;
            height: 12px;
            fill: #fff;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .checkbox.checked svg {
            opacity: 1;
        }

        .agreement-text {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .agreement-text a {
            color: var(--accent-blue);
            text-decoration: none;
        }

        .agreement-text a:hover {
            text-decoration: underline;
        }

        /* 底部安全区域 */
        .safe-area-bottom {
            height: 40px;
        }

        /* Toast提示 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
        }

        .toast.success {
            background: rgba(16, 185, 129, 0.9);
        }

        .toast.error {
            background: rgba(239, 68, 68, 0.9);
        }

        /* 步骤指示器 */
        .step-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .step-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--border-subtle);
            transition: all 0.3s ease;
        }

        .step-dot.active {
            background: var(--accent-blue);
            box-shadow: 0 0 8px rgba(91, 141, 239, 0.5);
        }

        .step-dot.completed {
            background: var(--accent-green);
        }

        .step-line {
            width: 40px;
            height: 2px;
            background: var(--border-subtle);
            margin: 0 12px;
            transition: all 0.3s ease;
        }

        .step-line.completed {
            background: var(--accent-green);
        }

        .step-label {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        /* 成功页面 */
        .success-container {
            display: none;
            text-align: center;
            padding: 60px 24px;
        }

        .success-container.active {
            display: block;
        }

        .success-icon {
            width: 88px;
            height: 88px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, var(--accent-green), #34d399);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
            animation: scaleIn 0.5s ease;
        }

        @keyframes scaleIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .success-icon svg {
            width: 44px;
            height: 44px;
            fill: #fff;
        }

        .success-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .success-desc {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .success-phone {
            font-size: 18px;
            font-weight: 600;
            color: var(--accent-blue);
            margin-bottom: 40px;
            padding: 12px 24px;
            background: rgba(91, 141, 239, 0.1);
            border-radius: 10px;
            display: inline-block;
        }

        .back-home-btn {
            padding: 16px 48px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-home-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(91, 141, 239, 0.4);
        }

        /* 隐藏表单 */
        .form-wrapper {
            transition: opacity 0.3s ease;
        }

        .form-wrapper.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <div class="header-top">
                <div class="back-btn" onclick="history.back()">
                    <svg viewBox="0 0 24 24">
                        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                    </svg>
                </div>
                <div class="header-title">绑定手机号</div>
            </div>
        </header>

        <!-- 主内容 -->
        <main class="main-content">
            <!-- 步骤指示器 -->
            <div class="step-indicator">
                <div class="step">
                    <div class="step-dot active" id="step1Dot"></div>
                    <span class="step-label">输入手机号</span>
                </div>
                <div class="step-line" id="stepLine"></div>
                <div class="step">
                    <div class="step-dot" id="step2Dot"></div>
                    <span class="step-label">验证绑定</span>
                </div>
            </div>

            <!-- 表单区域 -->
            <div class="form-wrapper" id="formWrapper">
                <div class="page-header">
                    <div class="page-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                        </svg>
                    </div>
                    <div class="page-title">绑定手机号</div>
                    <div class="page-desc">请填写您的手机号码并验证</div>
                </div>

                <div class="form-container">
                    <!-- 手机号输入 -->
                    <div class="form-group">
                        <label class="form-label">手机号码</label>
                        <div class="input-wrapper">
                            <span class="input-prefix">+86</span>
                            <input type="tel" class="form-input with-prefix" id="phoneInput" placeholder="请输入手机号" maxlength="11">
                        </div>
                        <div class="form-hint">
                            <svg viewBox="0 0 24 24">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
                            </svg>
                            绑定手机号后可使用手机号登录和找回密码
                        </div>
                    </div>

                    <!-- 验证码输入 -->
                    <div class="form-group">
                        <label class="form-label">验证码</label>
                        <div class="code-input-wrapper">
                            <input type="tel" class="form-input" id="codeInput" placeholder="请输入验证码" maxlength="6">
                            <button class="code-btn" id="codeBtn" onclick="sendCode()">获取验证码</button>
                        </div>
                    </div>

                    <!-- 用户协议 -->
                    <div class="agreement-section">
                        <div class="checkbox" id="agreementCheckbox" onclick="toggleAgreement()">
                            <svg viewBox="0 0 24 24">
                                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                            </svg>
                        </div>
                        <div class="agreement-text">
                            我已阅读并同意<a href="#" onclick="showAgreement()">《用户服务协议》</a>和<a href="#" onclick="showPrivacy()">《隐私政策》</a>
                        </div>
                    </div>

                    <!-- 提交按钮 -->
                    <button class="submit-btn" id="submitBtn" onclick="bindPhone()" disabled>立即绑定</button>
                </div>
            </div>

            <!-- 成功页面 -->
            <div class="success-container" id="successContainer">
                <div class="success-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                    </svg>
                </div>
                <div class="success-title">绑定成功</div>
                <div class="success-desc">您的手机号已成功绑定</div>
                <div class="success-phone" id="successPhone">138****5678</div>
                <button class="back-home-btn" onclick="goBack()">完成</button>
            </div>

            <div class="safe-area-bottom"></div>
        </main>
    </div>

    <!-- Toast提示 -->
    <div class="toast" id="toast"></div>

    <script>
        // 全局变量
        let countdown = 0;
        let isAgreementChecked = false;
        let phoneNumber = '';

        // 获取DOM元素
        const phoneInput = document.getElementById('phoneInput');
        const codeInput = document.getElementById('codeInput');
        const codeBtn = document.getElementById('codeBtn');
        const submitBtn = document.getElementById('submitBtn');
        const agreementCheckbox = document.getElementById('agreementCheckbox');
        const toast = document.getElementById('toast');
        const formWrapper = document.getElementById('formWrapper');
        const successContainer = document.getElementById('successContainer');
        const successPhone = document.getElementById('successPhone');
        const step1Dot = document.getElementById('step1Dot');
        const step2Dot = document.getElementById('step2Dot');
        const stepLine = document.getElementById('stepLine');

        // 手机号输入验证
        phoneInput.addEventListener('input', function() {
            // 只允许输入数字
            this.value = this.value.replace(/\D/g, '');
            checkFormValidity();
        });

        // 验证码输入验证
        codeInput.addEventListener('input', function() {
            // 只允许输入数字
            this.value = this.value.replace(/\D/g, '');
            checkFormValidity();
        });

        // 检查表单有效性
        function checkFormValidity() {
            const phone = phoneInput.value.trim();
            const code = codeInput.value.trim();
            const isPhoneValid = /^1[3-9]\d{9}$/.test(phone);
            const isCodeValid = code.length === 6;

            submitBtn.disabled = !(isPhoneValid && isCodeValid && isAgreementChecked);
        }

        // 切换协议同意状态
        function toggleAgreement() {
            isAgreementChecked = !isAgreementChecked;
            agreementCheckbox.classList.toggle('checked', isAgreementChecked);
            checkFormValidity();
        }

        // 发送验证码
        function sendCode() {
            const phone = phoneInput.value.trim();

            // 验证手机号
            if (!phone) {
                showToast('请输入手机号', 'error');
                return;
            }

            if (!/^1[3-9]\d{9}$/.test(phone)) {
                showToast('请输入正确的手机号', 'error');
                return;
            }

            // 开始倒计时
            countdown = 60;
            codeBtn.disabled = true;
            codeBtn.textContent = `${countdown}s后重试`;

            const timer = setInterval(() => {
                countdown--;
                if (countdown > 0) {
                    codeBtn.textContent = `${countdown}s后重试`;
                } else {
                    clearInterval(timer);
                    codeBtn.disabled = false;
                    codeBtn.textContent = '获取验证码';
                }
            }, 1000);

            // 模拟发送验证码
            showToast('验证码已发送', 'success');

            // 模拟自动填充验证码（实际项目中删除）
            setTimeout(() => {
                codeInput.value = '123456';
                checkFormValidity();
                showToast('验证码已自动填充（演示用）', 'success');
            }, 1500);
        }

        // 绑定手机号
        function bindPhone() {
            const phone = phoneInput.value.trim();
            const code = codeInput.value.trim();

            if (!phone || !code) {
                showToast('请填写完整信息', 'error');
                return;
            }

            // 模拟验证验证码
            if (code !== '123456') {
                showToast('验证码错误', 'error');
                return;
            }

            // 保存手机号
            phoneNumber = phone;

            // 更新步骤指示器
            step1Dot.classList.remove('active');
            step1Dot.classList.add('completed');
            stepLine.classList.add('completed');
            step2Dot.classList.add('active');

            // 显示成功页面
            formWrapper.classList.add('hidden');
            successContainer.classList.add('active');

            // 显示脱敏手机号
            successPhone.textContent = phone.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2');

            // 保存到本地存储（实际项目中可能需要调用API）
            localStorage.setItem('boundPhone', phone);
            localStorage.setItem('isPhoneBound', 'true');

            showToast('手机号绑定成功', 'success');
        }

        // 显示Toast提示
        function showToast(message, type = '') {
            toast.textContent = message;
            toast.className = 'toast show ' + type;

            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        // 显示用户协议
        function showAgreement() {
            alert('用户服务协议内容...');
        }

        // 显示隐私政策
        function showPrivacy() {
            alert('隐私政策内容...');
        }

        // 返回上一页
        function goBack() {
            // 检查是否有上一页
            if (document.referrer) {
                history.back();
            } else {
                window.location.href = 'profile.html';
            }
        }

        // 页面加载时检查是否已绑定
        window.addEventListener('load', function() {
            const isBound = localStorage.getItem('isPhoneBound');
            const boundPhone = localStorage.getItem('boundPhone');

            if (isBound === 'true' && boundPhone) {
                // 已绑定，显示成功页面
                phoneNumber = boundPhone;
                phoneInput.value = boundPhone;
                codeInput.value = '123456';

                step1Dot.classList.remove('active');
                step1Dot.classList.add('completed');
                stepLine.classList.add('completed');
                step2Dot.classList.add('active');

                formWrapper.classList.add('hidden');
                successContainer.classList.add('active');
                successPhone.textContent = boundPhone.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2');
            }
        });
    </script>
</body>
</html>
