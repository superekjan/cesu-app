<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>网络测速</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #131524;
            --bg-secondary: #131524;
            --bg-card: rgba(38, 41, 58, 0.65);
            --bg-card-hover: rgba(46, 49, 69, 0.75);
            --accent-blue: #5b8def;
            --accent-blue-light: #7ca6f3;
            --accent-cyan: #4ecdc4;
            --accent-green: #5dbe8d;
            --accent-orange: #f4a261;
            --accent-purple: #9b8bf4;
            --text-primary: #e8eaf0;
            --text-secondary: #9aa3b2;
            --text-tertiary: #6b7280;
            --border-subtle: rgba(91, 141, 239, 0.15);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: calc(80px + env(safe-area-inset-bottom));
        }

        /* 头部 */
        .header {
            padding: 20px;
            text-align: center;
        }

        .header-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 6px;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 测速仪表盘 */
        .speed-gauge {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            position: relative;
        }

        .gauge-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin-bottom: 40px;
        }

        .gauge-svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .gauge-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 8;
        }

        .gauge-progress {
            fill: none;
            stroke: url(#gaugeGradient);
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 754;
            stroke-dashoffset: 754;
        }

        .gauge-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .gauge-value {
            font-size: 72px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 8px;
        }

        .gauge-unit {
            font-size: 16px;
            color: var(--text-secondary);
        }

        .gauge-label {
            font-size: 13px;
            color: var(--text-tertiary);
            margin-top: 8px;
        }

        /* 测速按钮 */
        .speed-btn {
            width: 200px;
            height: 56px;
            background: linear-gradient(270deg, #00c6ff 0%, #0072ff 100%);
            border: none;
            border-radius: 28px;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 114, 255, 0.4);
            margin-bottom: 20px;
        }

        .speed-btn:active {
            opacity: 0.9;
        }


        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(22, 27, 34, 0.98);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 calc(12px + env(safe-area-inset-bottom));
            z-index: 100;
            max-width: 480px;
            margin: 0 auto;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 6px 20px;
            cursor: pointer;
            text-decoration: none;
            border-radius: 12px;
        }

        .nav-item.active {
            background: rgba(88, 166, 255, 0.1);
        }

        .nav-item.active .nav-icon {
            fill: var(--accent-blue);
        }

        .nav-item.active .nav-label {
            color: var(--accent-blue);
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            fill: var(--text-tertiary);
        }

        .nav-label {
            font-size: 11px;
            color: var(--text-tertiary);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- SVG渐变定义 -->
        <svg width="0" height="0" style="position: absolute;">
            <defs>
                <linearGradient id="gaugeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#39d0d8;stop-opacity:1" />
                </linearGradient>
            </defs>
        </svg>

        <!-- 头部 -->
        <header class="header">
            <div class="header-title">网络测速</div>
            <div class="header-subtitle">检测您的网络连接质量</div>
        </header>

        <!-- 测速仪表盘 -->
        <div class="speed-gauge">
            <div class="gauge-container">
                <svg class="gauge-svg" viewBox="0 0 240 240">
                    <circle class="gauge-bg" cx="120" cy="120" r="110"/>
                    <circle class="gauge-progress" id="gaugeProgress" cx="120" cy="120" r="110"/>
                </svg>
                <div class="gauge-inner">
                    <div class="gauge-value" id="speedValue">0.0</div>
                    <div class="gauge-unit">Mbps</div>
                    <div class="gauge-label">点击开始测速</div>
                </div>
            </div>

            <button class="speed-btn" id="speedBtn" onclick="startSpeedTest()">开始测速</button>
        </div>

    </div>

    <!-- 底部导航 -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <svg class="nav-icon" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
            </svg>
            <span class="nav-label">测速</span>
        </a>
        <a href="ping-diagnosis.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
            </svg>
            <span class="nav-label">PING诊断</span>
        </a>
        <a href="wifi-diagnosis.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
                <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/>
            </svg>
            <span class="nav-label">WIFI诊断</span>
        </a>
        <a href="profile.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
            <span class="nav-label">我的</span>
        </a>
    </nav>

    <script>
        // 开始测速 - 直接跳转
        function startSpeedTest() {
            // 生成随机测试结果
            const testResults = {
                ping: Math.floor(Math.random() * 20) + 5,
                jitter: Math.floor(Math.random() * 5) + 1,
                loss: 0,
                download: 350 + Math.random() * 200,
                upload: (350 + Math.random() * 200) * 0.6
            };
            
            // 保存结果
            localStorage.setItem('speedTestResults', JSON.stringify(testResults));
            
            // 直接跳转到结果页面
            window.location.href = 'speedtestresult1.html';
        }
    </script>
</body>
</html>
