
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WiFi诊断</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #131524;
            --bg-secondary: #131524;
            --bg-card: rgba(38, 41, 58, 0.65);
            --bg-card-hover: rgba(46, 49, 69, 0.75);
            --accent-blue: #5b8def;
            --accent-blue-light: #7ca6f3;
            --accent-cyan: #4ecdc4;
            --accent-green: #5dbe8d;
            --accent-orange: #f4a261;
            --accent-purple: #9b8bf4;
            --text-primary: #e8eaf0;
            --text-secondary: #9aa3b2;
            --text-tertiary: #6b7280;
            --border-subtle: rgba(91, 141, 239, 0.15);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: calc(80px + env(safe-area-inset-bottom));
        }

        /* 主内容 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            gap: 40px;
        }

        .page-title {
            font-size: 24px;
            color: var(--text-primary);
            font-weight: 600;
            transition: all 0.5s ease;
        }

        .page-title.hiding {
            opacity: 0;
            transform: translateY(20px);
        }

        .wifi-icon-large {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, rgba(91, 141, 239, 0.2), rgba(78, 205, 196, 0.2));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                        height 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                        margin 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                        background 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .wifi-icon-large.testing {
            width: 140px;
            height: 140px;
            margin-bottom: 15px;
        }

        .wifi-icon-large svg {
            width: 60px;
            height: 60px;
            fill: var(--accent-blue);
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                        height 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                        fill 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .wifi-icon-large.testing svg {
            width: 70px;
            height: 70px;
            fill: var(--accent-cyan);
        }

        .main-title {
            font-size: 24px;
            color: var(--text-primary);
            font-weight: 600;
            transition: opacity 0.5s ease, transform 0.5s ease;
            margin-bottom: 20px;
        }

        .main-title.testing {
            font-size: 20px;
            transform: translateY(5px);
        }

        .main-title.fade-out {
            opacity: 0;
            transform: translateY(-5px);
        }

        .start-test-btn {
            background: linear-gradient(270deg, #00c6ff 0%, #0072ff 100%);
            color: #fff;
            border: none;
            padding: 18px 60px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 114, 255, 0.4);
            transition: opacity 0.5s ease, transform 0.5s ease;
            font-family: inherit;
        }

        .start-test-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0, 114, 255, 0.5);
        }

        .start-test-btn:active {
            transform: translateY(0);
        }

        .start-test-btn.hidden {
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
        }

        .wifi-pulse {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--accent-cyan);
            opacity: 0;
        }

        .wifi-icon-large.testing .wifi-pulse {
            animation: wifiPulse 2s ease-out infinite;
            animation-delay: 0.3s;
        }

        @keyframes wifiPulse {
            0% {
                width: 60%;
                height: 60%;
                opacity: 0.6;
            }
            90% {
                width: 160%;
                height: 160%;
                opacity: 0;
            }
            100% {
                width: 60%;
                height: 60%;
                opacity: 0;
            }
        }

        .progress-bar-container {
            width: 100%;
            max-width: 280px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.5s ease 0.4s;
        }

        .progress-bar-container.show {
            opacity: 1;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue));
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .testing-steps {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.5s ease 0.5s;
        }

        .testing-steps.show {
            opacity: 1;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-tertiary);
            transition: color 0.4s ease;
        }

        .step-item.active {
            color: var(--accent-cyan);
        }

        .step-item.completed {
            color: var(--accent-green);
        }

        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-tertiary);
            transition: background 0.4s ease, box-shadow 0.4s ease;
        }

        .step-item.active .step-dot {
            background: var(--accent-cyan);
            box-shadow: 0 0 8px var(--accent-cyan);
        }

        .step-item.completed .step-dot {
            background: var(--accent-green);
        }

        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(22, 27, 34, 0.98);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 calc(12px + env(safe-area-inset-bottom));
            z-index: 100;
            max-width: 480px;
            margin: 0 auto;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 6px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            border-radius: 12px;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            background: rgba(88, 166, 255, 0.1);
        }

        .nav-item.active .nav-icon {
            fill: var(--accent-blue);
        }

        .nav-item.active .nav-label {
            color: var(--accent-blue);
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            fill: var(--text-tertiary);
            transition: all 0.2s ease;
        }

        .nav-label {
            font-size: 11px;
            color: var(--text-tertiary);
            transition: all 0.2s ease;
        }

        .wifi-info-card {
            background: transparent;
            padding: 0 0 16px 0;
            margin-bottom: 20px;
            width: 100%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .wifi-info-card.hiding {
            opacity: 0;
            transform: translateY(-15px);
        }

        .wifi-info-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .wifi-name {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .wifi-icon-wrap {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wifi-icon-wrap svg {
            width: 18px;
            height: 18px;
            fill: #fff;
        }

        .wifi-ssid {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .wifi-status {
            font-size: 12px;
            color: var(--accent-green);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .wifi-status::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-green);
        }

        .wifi-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        .wifi-detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
        }

        .wifi-detail-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .wifi-detail-value {
            font-size: 13px;
            color: var(--text-primary);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 主内容 -->
        <main class="main-content">
            <div class="wifi-info-card" id="wifiInfoCard">
                <div class="wifi-info-header">
                    <div class="wifi-name">
                        <div class="wifi-icon-wrap">
                            <svg viewBox="0 0 24 24">
                                <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/>
                            </svg>
                        </div>
                        <span class="wifi-ssid">TP-LINK_5G_XXXX</span>
                    </div>
                    <span class="wifi-status">已连接</span>
                </div>
            </div>

            <div class="wifi-icon-large" id="wifiIcon">
                <svg viewBox="0 0 24 24">
                    <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/>
                </svg>
                <div class="wifi-pulse"></div>
                <div class="wifi-pulse"></div>
                <div class="wifi-pulse"></div>
            </div>
            <div class="main-title" id="mainTitle">WiFi诊断</div>
            <button class="start-test-btn" id="startBtn" onclick="startWiFiTest()">开始测试</button>
            <div class="progress-bar-container" id="progressBarContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="testing-steps" id="testingSteps">
                <div class="step-item active" id="step1">
                    <span class="step-dot"></span>
                    <span>获取WiFi信息</span>
                </div>
                <div class="step-item" id="step2">
                    <span class="step-dot"></span>
                    <span>测速</span>
                </div>
                <div class="step-item" id="step3">
                    <span class="step-dot"></span>
                    <span>连通性测试</span>
                </div>
                <div class="step-item" id="step4">
                    <span class="step-dot"></span>
                    <span>信道分析</span>
                </div>
            </div>
        </main>
    </div>

    <script>
        function startWiFiTest() {
            var wifiIcon = document.getElementById('wifiIcon');
            var mainTitle = document.getElementById('mainTitle');
            var startBtn = document.getElementById('startBtn');
            var wifiInfoCard = document.getElementById('wifiInfoCard');
            var progressBarContainer = document.getElementById('progressBarContainer');
            var testingSteps = document.getElementById('testingSteps');

            wifiIcon.classList.add('testing');
            mainTitle.classList.add('fade-out');
            startBtn.classList.add('hidden');
            wifiInfoCard.classList.add('hiding');

            setTimeout(function() {
                mainTitle.textContent = 'WiFi诊断中';
                mainTitle.classList.remove('fade-out');
                mainTitle.classList.add('testing');
            }, 400);

            setTimeout(function() {
                progressBarContainer.classList.add('show');
            }, 500);

            setTimeout(function() {
                testingSteps.classList.add('show');
            }, 600);

            var steps = [
                { id: 'step1', progress: 15 },
                { id: 'step2', progress: 40 },
                { id: 'step3', progress: 70 },
                { id: 'step4', progress: 100 }
            ];

            var currentStep = 0;
            var progressBar = document.getElementById('progressBar');

            function runStep() {
                if (currentStep > 0) {
                    var prevStep = document.getElementById(steps[currentStep - 1].id);
                    prevStep.classList.remove('active');
                    prevStep.classList.add('completed');
                }

                if (currentStep < steps.length) {
                    var currentStepEl = document.getElementById(steps[currentStep].id);
                    currentStepEl.classList.add('active');
                    progressBar.style.width = steps[currentStep].progress + '%';
                    currentStep++;
                    setTimeout(runStep, 1500);
                } else {
                    setTimeout(function() {
                        location.href = 'speedtestresult1.html';
                    }, 500);
                }
            }

            setTimeout(runStep, 600);
        }
    </script>

    <!-- 底部导航 -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <svg class="nav-icon" viewBox="0 0 24 24">
                <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/>
            </svg>
            <span class="nav-label">WiFi诊断</span>
        </a>
        <a href="toolbox.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
            </svg>
            <span class="nav-label">工具箱</span>
        </a>
        <a href="knowledge-base.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/>
            </svg>
            <span class="nav-label">知识库</span>
        </a>
        <a href="profile.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
            <span class="nav-label">我的</span>
        </a>
    </nav>
</body>
</html>
