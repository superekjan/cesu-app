<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络测速结果</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00d4ff;
            --primary-dark: #0099cc;
            --secondary: #7b2cbf;
            --accent: #ff006e;
            --success: #00f5d4;
            --warning: #fee440;
            --bg-dark: #0a0a0f;
            --bg-card: rgba(20, 20, 35, 0.8);
            --border-glow: rgba(0, 212, 255, 0.3);
        }

        body {
            font-family: 'Rajdhani', 'Microsoft YaHei', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
            position: relative;
        }

        /* 动态背景 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(123, 44, 191, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 245, 212, 0.05) 0%, transparent 70%);
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.6;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* 主容器 */
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 头部 */
        .header {
            text-align: center;
            padding: 30px 0;
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        .test-time {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 1px;
        }

        /* 状态卡片网格 */
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .status-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .status-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .status-card:hover::before {
            left: 100%;
        }

        .status-card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
            transform: translateY(-2px);
        }

        .card-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .signal-icon {
            position: relative;
        }

        .signal-icon span {
            position: absolute;
            bottom: 0;
            width: 3px;
            background: var(--primary);
            border-radius: 1px;
        }

        .signal-icon span:nth-child(1) { left: 0; height: 30%; }
        .signal-icon span:nth-child(2) { left: 5px; height: 55%; }
        .signal-icon span:nth-child(3) { left: 10px; height: 80%; }
        .signal-icon span:nth-child(4) { left: 15px; height: 100%; }

        .wifi-interference {
            display: flex;
            gap: 3px;
            align-items: flex-end;
        }

        .wifi-interference span {
            width: 8px;
            height: 8px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            border-bottom-color: transparent;
            border-left-color: transparent;
            transform: rotate(-45deg);
        }

        .wifi-interference span:nth-child(1) { width: 6px; height: 6px; }
        .wifi-interference span:nth-child(2) { width: 10px; height: 10px; }
        .wifi-interference span:nth-child(3) { width: 14px; height: 14px; }

        .card-value {
            font-size: 32px;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .card-value .unit {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
        }

        .signal-badge {
            display: inline-block;
            padding: 4px 12px;
            background: linear-gradient(135deg, var(--success), #00b894);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            color: #000;
            margin-top: 8px;
            box-shadow: 0 0 15px rgba(0, 245, 212, 0.4);
        }

        .interference-text {
            font-size: 16px;
            color: var(--success);
            margin-top: 8px;
            font-weight: 500;
        }

        /* 网速卡片 */
        .speed-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .speed-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            padding: 25px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .speed-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--primary));
            background-size: 200% 100%;
            animation: shimmer 2s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .speed-icon {
            width: 50px;
            height: 50px;
            margin: 0 auto 15px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .speed-icon::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--secondary);
            animation: rotate 2s linear infinite;
        }

        @keyframes rotate {
            to { transform: rotate(360deg); }
        }

        .speed-icon svg {
            width: 24px;
            height: 24px;
            fill: var(--primary);
        }

        .speed-label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .speed-value {
            font-size: 36px;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .speed-unit {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
        }

        /* 延迟卡片 */
        .latency-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .latency-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            position: relative;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .latency-card:hover {
            border-color: var(--primary);
            transform: scale(1.02);
        }

        .latency-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .latency-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .latency-value {
            font-size: 28px;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            color: var(--success);
        }

        /* AI诊断区域 */
        .ai-diagnosis {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .ai-diagnosis::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(0, 212, 255, 0.1), transparent 30%);
            animation: rotate 10s linear infinite;
        }

        .ai-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .ai-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            animation: aiGlow 2s ease-in-out infinite;
        }

        @keyframes aiGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(123, 44, 191, 0.5); }
            50% { box-shadow: 0 0 30px rgba(255, 0, 110, 0.5); }
        }

        .ai-title {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .ai-status {
            font-size: 11px;
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .ai-status::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .ai-content {
            position: relative;
            z-index: 1;
        }

        .diagnosis-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .diagnosis-item:last-child {
            border-bottom: none;
        }

        .diagnosis-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }

        .diagnosis-icon.good {
            background: rgba(0, 245, 212, 0.2);
            color: var(--success);
        }

        .diagnosis-icon.warning {
            background: rgba(254, 228, 64, 0.2);
            color: var(--warning);
        }

        .diagnosis-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.5;
        }

        /* 按钮区域 */
        .button-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: auto;
            padding-top: 20px;
        }

        .btn {
            width: 100%;
            padding: 18px 30px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #000;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 40px rgba(0, 212, 255, 0.6);
        }

        .btn-secondary {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-secondary::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background: var(--primary);
            transition: width 0.3s ease;
            z-index: -1;
        }

        .btn-secondary:hover::before {
            width: 100%;
        }

        .btn-secondary:hover {
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }

        /* 扫描线效果 */
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.5;
            animation: scan 4s linear infinite;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes scan {
            0% { transform: translateY(-100vh); }
            100% { transform: translateY(100vh); }
        }

        /* 角落装饰 */
        .corner-decoration {
            position: fixed;
            width: 100px;
            height: 100px;
            pointer-events: none;
            z-index: 10;
        }

        .corner-decoration.top-left {
            top: 20px;
            left: 20px;
            border-top: 2px solid var(--primary);
            border-left: 2px solid var(--primary);
        }

        .corner-decoration.top-right {
            top: 20px;
            right: 20px;
            border-top: 2px solid var(--primary);
            border-right: 2px solid var(--primary);
        }

        .corner-decoration.bottom-left {
            bottom: 20px;
            left: 20px;
            border-bottom: 2px solid var(--primary);
            border-left: 2px solid var(--primary);
        }

        .corner-decoration.bottom-right {
            bottom: 20px;
            right: 20px;
            border-bottom: 2px solid var(--primary);
            border-right: 2px solid var(--primary);
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }
            
            .header h1 {
                font-size: 24px;
            }
            
            .card-value {
                font-size: 28px;
            }
            
            .speed-value {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <!-- 背景效果 -->
    <div class="bg-animation"></div>
    <div class="grid-overlay"></div>
    <div class="particles" id="particles"></div>
    <div class="scan-line"></div>
    
    <!-- 角落装饰 -->
    <div class="corner-decoration top-left"></div>
    <div class="corner-decoration top-right"></div>
    <div class="corner-decoration bottom-left"></div>
    <div class="corner-decoration bottom-right"></div>

    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1>SPEED TEST</h1>
            <div class="test-time">2026-03-17 14:32:18</div>
        </header>

        <!-- 状态信息 -->
        <div class="status-grid">
            <div class="status-card">
                <div class="card-label">
                    <div class="card-icon signal-icon">
                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    信号强度
                </div>
                <div class="card-value">
                    -50<span class="unit">dBm</span>
                </div>
                <span class="signal-badge">信号很强</span>
            </div>
            
            <div class="status-card">
                <div class="card-label">
                    <div class="card-icon">
                        <div class="wifi-interference">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                    </div>
                    Wi-Fi 干扰
                </div>
                <div class="card-value" style="font-size: 24px; margin-top: 8px;">
                    干扰较少
                </div>
            </div>
        </div>

        <!-- 网速测试 -->
        <div class="speed-section">
            <div class="speed-card">
                <div class="speed-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M19 15l-6 6-1.42-1.42L15.17 16H4V4h2v10h9.17l-3.59-3.58L13 9l6 6z"/>
                    </svg>
                </div>
                <div class="speed-label">下行网速</div>
                <div class="speed-value">4.68</div>
                <div class="speed-unit">MB/s</div>
            </div>
            
            <div class="speed-card">
                <div class="speed-icon">
                    <svg viewBox="0 0 24 24" style="transform: rotate(180deg);">
                        <path d="M19 15l-6 6-1.42-1.42L15.17 16H4V4h2v10h9.17l-3.59-3.58L13 9l6 6z"/>
                    </svg>
                </div>
                <div class="speed-label">上行网速</div>
                <div class="speed-value">4.68</div>
                <div class="speed-unit">MB/s</div>
            </div>
        </div>

        <!-- 延迟信息 -->
        <div class="latency-section">
            <div class="latency-card">
                <div class="latency-label">
                    <span class="latency-dot"></span>
                    内网延迟
                </div>
                <div class="latency-value">4ms</div>
            </div>
            
            <div class="latency-card">
                <div class="latency-label">
                    <span class="latency-dot"></span>
                    外网延迟
                </div>
                <div class="latency-value">10ms</div>
            </div>
        </div>

        <!-- AI诊断 -->
        <div class="ai-diagnosis">
            <div class="ai-header">
                <div class="ai-icon">AI</div>
                <div>
                    <div class="ai-title">智能诊断结果</div>
                    <div class="ai-status">分析完成</div>
                </div>
            </div>
            <div class="ai-content">
                <div class="diagnosis-item">
                    <div class="diagnosis-icon good">✓</div>
                    <div class="diagnosis-text">网络连接稳定，信号强度优秀，适合高清视频流媒体播放</div>
                </div>
                <div class="diagnosis-item">
                    <div class="diagnosis-icon good">✓</div>
                    <div class="diagnosis-text">上下行速率均衡，满足日常办公和文件传输需求</div>
                </div>
                <div class="diagnosis-item">
                    <div class="diagnosis-icon warning">!</div>
                    <div class="diagnosis-text">建议定期检查路由器固件更新以获得最佳性能</div>
                </div>
            </div>
        </div>

        <!-- 按钮 -->
        <div class="button-section">
            <button class="btn btn-primary">测试详情</button>
            <button class="btn btn-secondary">重新检测</button>
        </div>
    </div>

    <script>
        // 生成粒子效果
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 30;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }
        
        createParticles();

        // 数字动画效果
        function animateValue(element, start, end, duration, suffix = '') {
            const range = end - start;
            const minTimer = 50;
            let stepTime = Math.abs(Math.floor(duration / range));
            stepTime = Math.max(stepTime, minTimer);
            
            let startTime = new Date().getTime();
            let endTime = startTime + duration;
            let timer;
            
            function run() {
                let now = new Date().getTime();
                let remaining = Math.max((endTime - now) / duration, 0);
                let value = Math.round(end - (remaining * range));
                element.textContent = value + suffix;
                if (value == end) {
                    clearInterval(timer);
                }
            }
            
            timer = setInterval(run, stepTime);
            run();
        }

        // 页面加载时的动画
        window.addEventListener('load', () => {
            // 可以在这里添加更多动画效果
        });
    </script>
</body>
</html>
