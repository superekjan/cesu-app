<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PING测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #131524;
            --bg-secondary: #131524;
            --bg-card: rgba(38, 41, 58, 0.65);
            --bg-card-hover: rgba(46, 49, 69, 0.75);
            --accent-blue: #5b8def;
            --accent-blue-light: #7ca6f3;
            --accent-cyan: #4ecdc4;
            --accent-green: #5dbe8d;
            --accent-orange: #f4a261;
            --accent-purple: #9b8bf4;
            --text-primary: #e8eaf0;
            --text-secondary: #9aa3b2;
            --text-tertiary: #6b7280;
            --border-subtle: rgba(91, 141, 239, 0.15);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 头部 */
        .header {
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.8) 0%, rgba(13, 17, 23, 0) 100%);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-subtle);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--text-primary);
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* 主内容 */
        .main-content {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        /* 网络状态 */
        .network-status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        .status-label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .status-badge {
            padding: 4px 12px;
            background: rgba(93, 190, 141, 0.2);
            border-radius: 6px;
            font-size: 13px;
            color: var(--accent-green);
            border: 1px solid rgba(93, 190, 141, 0.3);
        }

        /* WiFi图标区域 */
        .wifi-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }

        .wifi-icon {
            width: 120px;
            height: 120px;
            margin-bottom: 16px;
        }

        .wifi-icon svg {
            width: 100%;
            height: 100%;
            fill: var(--accent-blue);
        }

        .signal-info {
            font-size: 14px;
            color: var(--accent-blue);
            text-align: center;
        }

        /* 定时测试状态卡片 */
        .schedule-status-card {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .schedule-status-card:hover {
            border-color: rgba(155, 139, 244, 0.3);
            transform: translateY(-2px);
        }

        .schedule-status-card:active {
            transform: scale(0.98);
        }

        .schedule-status-icon {
            width: 40px;
            height: 40px;
            background: rgba(155, 139, 244, 0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
        }

        .schedule-status-icon svg {
            width: 22px;
            height: 22px;
            fill: var(--accent-purple);
        }

        .schedule-status-info {
            flex: 1;
        }

        .schedule-status-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }

        .schedule-status-value {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .schedule-status-value.active {
            color: var(--accent-purple);
        }

        .schedule-status-arrow {
            width: 20px;
            height: 20px;
            fill: var(--text-tertiary);
        }

        /* 按钮区域 */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }

        .action-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(91, 141, 239, 0.4);
        }

        .action-btn:active {
            transform: translateY(0);
        }

        .action-btn.secondary {
            background: linear-gradient(135deg, #3a7bd5, #00d2ff);
        }

        .action-btn.secondary:hover {
            box-shadow: 0 8px 20px rgba(58, 123, 213, 0.4);
        }

        /* 提示文字 */
        .hint-text {
            text-align: center;
            font-size: 13px;
            color: var(--text-tertiary);
            margin-bottom: 20px;
        }

        .safe-area-bottom {
            height: 20px;
        }

        /* 检测结果区域 */
        .result-section {
            display: none;
            margin-top: 20px;
        }

        .result-section.show {
            display: block;
        }

        .result-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-subtle);
        }

        .result-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-subtle);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .result-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .result-value.good {
            color: var(--accent-green);
        }

        .result-value.warning {
            color: var(--accent-orange);
        }

        .result-value.bad {
            color: var(--accent-red, #ef4444);
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-top">
                <div class="back-btn" onclick="location.href='toolbox.html'">
                    <svg viewBox="0 0 24 24">
                        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                    </svg>
                </div>
                <div class="header-title">PING测试</div>
            </div>
        </header>

        <main class="main-content">
            <div class="network-status">
                <span class="status-label">当前网络状态</span>
                <span class="status-badge" id="networkStatus">已连接Wi-Fi: X-WRT_4236_5G</span>
            </div>

            <div class="wifi-section">
                <div class="wifi-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/>
                    </svg>
                </div>
                <div class="signal-info" id="signalInfo">信号: 较强 | 292</div>
            </div>

            <div class="schedule-status-card" id="scheduleStatusCard" onclick="location.href='ping-schedule.html'">
                <div class="schedule-status-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>
                    </svg>
                </div>
                <div class="schedule-status-info">
                    <div class="schedule-status-label">定时测试</div>
                    <div class="schedule-status-value" id="scheduleStatusValue">未开启</div>
                </div>
                <svg class="schedule-status-arrow" viewBox="0 0 24 24">
                    <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/>
                </svg>
            </div>

            <div class="action-buttons">
                <button class="action-btn" onclick="location.href='ping-custom.html'">开始检测</button>
            </div>

            <div class="hint-text">一键检查您的家庭网络健康状况，快速找出问题根源</div>

            <div class="safe-area-bottom"></div>
        </main>
    </div>

    <script>
        function updateScheduleStatus() {
            const schedules = JSON.parse(localStorage.getItem('pingSchedules') || '[]');
            const statusValue = document.getElementById('scheduleStatusValue');

            if (schedules.length > 0) {
                const nextSchedule = schedules[0];
                const hourStr = String(nextSchedule.hour).padStart(2, '0');
                const minStr = String(nextSchedule.minute).padStart(2, '0');
                statusValue.textContent = `每天 ${hourStr}:${minStr}`;
                statusValue.classList.add('active');
            } else {
                statusValue.textContent = '未开启';
                statusValue.classList.remove('active');
            }
        }

        updateScheduleStatus();
        setInterval(updateScheduleStatus, 5000);
    </script>
</body>
</html>
