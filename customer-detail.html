<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>客户详情</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #131524;
            --bg-secondary: #131524;
            --bg-card: rgba(38, 41, 58, 0.65);
            --accent-blue: #5b8def;
            --accent-blue-light: #7ca6f3;
            --accent-cyan: #4ecdc4;
            --accent-green: #5dbe8d;
            --accent-orange: #f4a261;
            --accent-red: #ef4444;
            --text-primary: #e8eaf0;
            --text-secondary: #9aa3b2;
            --text-tertiary: #6b7280;
            --border-subtle: rgba(91, 141, 239, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 头部 */
        .header {
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.8) 0%, rgba(13, 17, 23, 0) 100%);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-subtle);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--text-primary);
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* 主内容 */
        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        /* 用户信息卡片 */
        .user-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-subtle);
            text-align: center;
            margin-bottom: 20px;
        }

        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .user-avatar svg {
            width: 40px;
            height: 40px;
            fill: #fff;
        }

        .user-name {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .user-phone {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .user-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(93, 190, 141, 0.15);
            border-radius: 20px;
            font-size: 13px;
            color: var(--accent-green);
        }

        .user-status::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent-green);
            border-radius: 50%;
        }

        /* 信息列表 */
        .info-section {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border-subtle);
            margin-bottom: 20px;
        }

        .info-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .info-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-subtle);
        }

        .info-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .info-item:first-child {
            padding-top: 0;
        }

        .info-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: rgba(91, 141, 239, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .info-icon svg {
            width: 18px;
            height: 18px;
            fill: var(--accent-blue);
        }

        .info-content {
            flex: 1;
        }

        .info-label {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 14px;
            color: var(--text-primary);
            line-height: 1.5;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px 8px;
            text-align: center;
            border: 1px solid var(--border-subtle);
        }

        .stat-box-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent-blue);
            margin-bottom: 4px;
        }

        .stat-box-label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* 测速记录 */
        .records-section {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border-subtle);
            margin-bottom: 20px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .view-all {
            font-size: 12px;
            color: var(--accent-blue);
            cursor: pointer;
        }

        .record-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-subtle);
        }

        .record-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .record-date {
            text-align: center;
            min-width: 50px;
        }

        .record-day {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .record-month {
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .record-info {
            flex: 1;
        }

        .record-speed {
            font-size: 14px;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .record-speed span {
            color: var(--accent-green);
            font-weight: 600;
        }

        .record-status {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .record-result {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 500;
        }

        .record-result.good {
            background: rgba(93, 190, 141, 0.15);
            color: var(--accent-green);
        }

        .record-result.normal {
            background: rgba(91, 141, 239, 0.15);
            color: var(--accent-blue);
        }

        /* 底部操作 */
        .footer-actions {
            display: flex;
            gap: 12px;
            padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
            border-top: 1px solid var(--border-subtle);
        }

        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-cyan) 100%);
            border: none;
            color: #fff;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--accent-red);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <div class="header-top">
                <div class="back-btn" onclick="history.back()">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                    </svg>
                </div>
                <div class="header-title">客户详情</div>
            </div>
        </header>

        <!-- 主内容 -->
        <main class="main-content">
            <!-- 用户信息 -->
            <div class="user-card">
                <div class="user-avatar">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </div>
                <div class="user-name">张先生</div>
                <div class="user-phone">138****5678</div>
                <span class="user-status">活跃客户</span>
            </div>

            <!-- 统计 -->
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-box-value">6</div>
                    <div class="stat-box-label">测速次数</div>
                </div>
                <div class="stat-box">
                    <div class="stat-box-value" style="color: var(--accent-green);">3</div>
                    <div class="stat-box-label">历史报告</div>
                </div>
                <div class="stat-box">
                    <div class="stat-box-value" style="color: var(--accent-orange);">2</div>
                    <div class="stat-box-label">服务工单</div>
                </div>
            </div>

            <!-- 基本信息 -->
            <div class="info-section">
                <div class="info-title">基本信息</div>
                <div class="info-item">
                    <div class="info-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                        </svg>
                    </div>
                    <div class="info-content">
                        <div class="info-label">服务地址</div>
                        <div class="info-value">北京市朝阳区建国路88号SOHO现代城A座1201室</div>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                        </svg>
                    </div>
                    <div class="info-content">
                        <div class="info-label">绑定时间</div>
                        <div class="info-value">2024年3月15日</div>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>
                        </svg>
                    </div>
                    <div class="info-content">
                        <div class="info-label">最近活跃</div>
                        <div class="info-value">2小时前进行了网络测速</div>
                    </div>
                </div>
            </div>

            <!-- 测速记录 -->
            <div class="records-section">
                <div class="section-header">
                    <div class="section-title">最近测速记录</div>
                    <div class="view-all" onclick="viewAllRecords()">查看全部</div>
                </div>
                <div class="record-item">
                    <div class="record-date">
                        <div class="record-day">20</div>
                        <div class="record-month">3月</div>
                    </div>
                    <div class="record-info">
                        <div class="record-speed">下载 <span>285</span> Mbps / 上传 <span>95</span> Mbps</div>
                        <div class="record-status">14:30 · 网络质量良好</div>
                    </div>
                    <span class="record-result good">优秀</span>
                </div>
                <div class="record-item">
                    <div class="record-date">
                        <div class="record-day">18</div>
                        <div class="record-month">3月</div>
                    </div>
                    <div class="record-info">
                        <div class="record-speed">下载 <span>260</span> Mbps / 上传 <span>88</span> Mbps</div>
                        <div class="record-status">09:15 · 网络质量正常</div>
                    </div>
                    <span class="record-result normal">良好</span>
                </div>
                <div class="record-item">
                    <div class="record-date">
                        <div class="record-day">15</div>
                        <div class="record-month">3月</div>
                    </div>
                    <div class="record-info">
                        <div class="record-speed">下载 <span>275</span> Mbps / 上传 <span>92</span> Mbps</div>
                        <div class="record-status">20:00 · 网络质量良好</div>
                    </div>
                    <span class="record-result good">优秀</span>
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="footer-actions" style="padding: 0; border: none; margin-bottom: 20px;">
                <button class="btn btn-danger" onclick="unbindCustomer()">
                    <svg viewBox="0 0 24 24">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                    解除绑定
                </button>
            </div>
        </main>
    </div>

    <script>
        // 查看全部记录
        function viewAllRecords() {
            console.log('查看全部记录');
        }

        // 解除绑定
        function unbindCustomer() {
            if (confirm('确定要解除与该客户的绑定关系吗？')) {
                alert('已解除绑定');
                history.back();
            }
        }
    </script>
</body>
</html>
