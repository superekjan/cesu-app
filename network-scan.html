<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>内网扫描</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #131524;
            --bg-secondary: #131524;
            --bg-card: rgba(38, 41, 58, 0.65);
            --bg-card-hover: rgba(46, 49, 69, 0.75);
            --accent-blue: #5b8def;
            --accent-blue-light: #7ca6f3;
            --accent-cyan: #4ecdc4;
            --accent-green: #5dbe8d;
            --accent-orange: #f4a261;
            --accent-purple: #9b8bf4;
            --accent-red: #e74c3c;
            --text-primary: #e8eaf0;
            --text-secondary: #9aa3b2;
            --text-tertiary: #6b7280;
            --border-subtle: rgba(91, 141, 239, 0.15);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.8) 0%, rgba(13, 17, 23, 0) 100%);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-subtle);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--text-primary);
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .main-content {
            flex: 1;
            padding: 20px;
        }

        .network-info {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid var(--border-subtle);
        }

        .network-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .network-name {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .network-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .network-icon svg {
            width: 22px;
            height: 22px;
            fill: #fff;
        }

        .network-ssid {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .network-gateway {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .scan-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--accent-cyan);
        }

        .scan-status::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-cyan);
        }

        .scan-status.scanning::before {
            animation: pulse 1s infinite;
        }

        .scan-status.idle::before {
            background: var(--text-tertiary);
        }

        .scan-status.idle {
            color: var(--text-tertiary);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .network-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .stat-item {
            text-align: center;
            padding: 12px 8px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .stat-value.devices { color: var(--accent-green); }
        .stat-value.routers { color: var(--accent-blue); }
        .stat-value.phones { color: var(--accent-cyan); }

        .stat-label {
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .device-list {
            margin-top: 16px;
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .device-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            border: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .device-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .device-icon.router {
            background: linear-gradient(135deg, rgba(91, 141, 239, 0.2), rgba(78, 205, 196, 0.2));
        }

        .device-icon.phone {
            background: linear-gradient(135deg, rgba(78, 205, 196, 0.2), rgba(91, 141, 239, 0.2));
        }

        .device-icon.computer {
            background: linear-gradient(135deg, rgba(155, 139, 244, 0.2), rgba(91, 141, 239, 0.2));
        }

        .device-icon.tv {
            background: linear-gradient(135deg, rgba(244, 162, 97, 0.2), rgba(155, 139, 244, 0.2));
        }

        .device-icon.other {
            background: linear-gradient(135deg, rgba(107, 114, 128, 0.2), rgba(91, 141, 239, 0.2));
        }

        .device-icon svg {
            width: 22px;
            height: 22px;
            fill: var(--text-primary);
        }

        .device-info {
            flex: 1;
            min-width: 0;
        }

        .device-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .device-ip {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-bottom: 2px;
        }

        .device-mac {
            font-size: 11px;
            color: var(--text-tertiary);
            opacity: 0.7;
        }

        .device-vendor {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .device-status {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .status-badge {
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 500;
        }

        .status-badge.online {
            background: rgba(93, 190, 141, 0.15);
            color: var(--accent-green);
        }

        .status-badge.offline {
            background: rgba(107, 114, 128, 0.15);
            color: var(--text-tertiary);
        }

        .signal-indicator {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .signal-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--accent-green);
        }

        .signal-dot:nth-child(2) { opacity: 0.8; }
        .signal-dot:nth-child(3) { opacity: 0.6; }
        .signal-dot:nth-child(4) { opacity: 0.4; }

        .action-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(155, 139, 244, 0.4);
        }

        .action-btn:active {
            transform: translateY(0);
        }

        .action-btn.scanning {
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-red));
        }

        .action-btn.scanning:hover {
            box-shadow: 0 8px 20px rgba(244, 162, 97, 0.4);
        }

        .action-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .action-btn svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        .loading-dots::after {
            content: '';
            animation: loadingDots 1.5s infinite;
        }

        @keyframes loadingDots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }

        .safe-area-bottom {
            height: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-tertiary);
        }

        .empty-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 16px;
            opacity: 0.5;
        }

        .empty-icon svg {
            width: 100%;
            height: 100%;
            fill: var(--text-tertiary);
        }

        .empty-text {
            font-size: 14px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-top">
                <div class="header-left">
                    <div class="back-btn" onclick="location.href='toolbox.html'">
                        <svg viewBox="0 0 24 24">
                            <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                        </svg>
                    </div>
                    <div class="header-title">内网扫描</div>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="network-info">
                <div class="network-header">
                    <div class="network-name">
                        <div class="network-icon">
                            <svg viewBox="0 0 24 24">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                            </svg>
                        </div>
                        <div>
                            <div class="network-ssid">TP-LINK_5G_XXXX</div>
                            <div class="network-gateway">网关: 192.168.1.1</div>
                        </div>
                    </div>
                    <div class="scan-status idle" id="scanStatus">未开始</div>
                </div>
                <div class="network-stats">
                    <div class="stat-item">
                        <div class="stat-value devices" id="deviceCount">0</div>
                        <div class="stat-label">在线设备</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value routers">1</div>
                        <div class="stat-label">路由器</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value phones" id="phoneCount">0</div>
                        <div class="stat-label">手机/平板</div>
                    </div>
                </div>
            </div>

            <button class="action-btn" id="scanBtn" onclick="startScan()">
                <svg viewBox="0 0 24 24" id="scanBtnIcon">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                </svg>
                <span id="scanBtnText">开始扫描</span>
            </button>

            <div class="device-list" id="deviceList">
                <div class="section-title">发现设备</div>
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                        </svg>
                    </div>
                    <div class="empty-text">点击上方按钮开始扫描内网设备</div>
                </div>
            </div>

            <div class="safe-area-bottom"></div>
        </main>
    </div>

    <script>
        let isScanning = false;
        let scanInterval = null;
        let deviceIndex = 0;

        const mockDevices = [
            { name: 'TP-LINK_5G_XXXX', ip: '192.168.1.1', mac: 'AA:BB:CC:DD:EE:F1', vendor: 'TP-LINK', type: 'router' },
            { name: 'iPhone 14 Pro', ip: '192.168.1.2', mac: 'AA:BB:CC:DD:EE:F2', vendor: 'Apple', type: 'phone' },
            { name: 'MacBook-Pro', ip: '192.168.1.3', mac: 'AA:BB:CC:DD:EE:F3', vendor: 'Apple', type: 'computer' },
            { name: 'Xiaomi 13', ip: '192.168.1.4', mac: 'AA:BB:CC:DD:EE:F4', vendor: 'Xiaomi', type: 'phone' },
            { name: 'Living Room TV', ip: '192.168.1.5', mac: 'AA:BB:CC:DD:EE:F5', vendor: 'Samsung', type: 'tv' },
            { name: 'iPad Air', ip: '192.168.1.6', mac: 'AA:BB:CC:DD:EE:F6', vendor: 'Apple', type: 'phone' },
            { name: 'Desktop-PC', ip: '192.168.1.7', mac: 'AA:BB:CC:DD:EE:F7', vendor: 'Dell', type: 'computer' },
            { name: 'Smart-Speaker', ip: '192.168.1.8', mac: 'AA:BB:CC:DD:EE:F8', vendor: 'Amazon', type: 'other' },
        ];

        function startScan() {
            if (isScanning) return;

            isScanning = true;
            deviceIndex = 0;

            document.getElementById('scanBtn').classList.add('scanning');
            document.getElementById('scanBtnText').textContent = '扫描中';
            document.getElementById('scanStatus').classList.remove('idle');
            document.getElementById('scanStatus').classList.add('scanning');
            document.getElementById('scanStatus').textContent = '扫描中...';
            document.getElementById('scanBtn').disabled = true;

            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('deviceList').innerHTML = '<div class="section-title">发现设备</div>';

            const existingEmpty = document.querySelector('.empty-state');
            if (existingEmpty) existingEmpty.remove();

            let count = 0;
            let phoneCount = 0;

            scanInterval = setInterval(() => {
                if (deviceIndex >= mockDevices.length) {
                    stopScan();
                    return;
                }

                const device = mockDevices[deviceIndex];
                addDeviceCard(device);
                deviceIndex++;
                count++;

                if (device.type === 'phone') phoneCount++;

                document.getElementById('deviceCount').textContent = count;
                document.getElementById('phoneCount').textContent = phoneCount;

                document.getElementById('scanStatus').textContent = `已发现 ${count} 台设备`;
            }, 600);
        }

        function stopScan() {
            isScanning = false;
            clearInterval(scanInterval);

            document.getElementById('scanBtn').classList.remove('scanning');
            document.getElementById('scanBtn').disabled = false;
            document.getElementById('scanBtnIcon').innerHTML = '<path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>';
            document.getElementById('scanBtnText').textContent = '重新扫描';
            document.getElementById('scanStatus').classList.remove('scanning');
            document.getElementById('scanStatus').classList.add('idle');
            const count = document.getElementById('deviceCount').textContent;
            document.getElementById('scanStatus').textContent = `扫描完成 (${count}台)`;
        }

        function addDeviceCard(device) {
            const iconSvg = getDeviceIcon(device.type);
            const vendor = device.vendor || '未知设备';

            const card = document.createElement('div');
            card.className = 'device-card';
            card.innerHTML = `
                <div class="device-icon ${device.type}">
                    ${iconSvg}
                </div>
                <div class="device-info">
                    <div class="device-name">${device.name}</div>
                    <div class="device-ip">${device.ip}</div>
                    <div class="device-mac">${device.mac}</div>
                    <div class="device-vendor">${vendor}</div>
                </div>
                <div class="device-status">
                    <span class="status-badge online">在线</span>
                    <div class="signal-indicator">
                        <span class="signal-dot"></span>
                        <span class="signal-dot"></span>
                        <span class="signal-dot"></span>
                        <span class="signal-dot"></span>
                    </div>
                </div>
            `;

            const sectionTitle = document.querySelector('.section-title');
            sectionTitle.parentNode.insertBefore(card, sectionTitle.nextSibling);
        }

        function getDeviceIcon(type) {
            const icons = {
                router: '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>',
                phone: '<svg viewBox="0 0 24 24"><path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/></svg>',
                computer: '<svg viewBox="0 0 24 24"><path d="M20 18c1.1 0 1.99-.9 1.99-2L22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z"/></svg>',
                tv: '<svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 1.99-.9 1.99-2L23 5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>',
                other: '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>'
            };
            return icons[type] || icons.other;
        }
    </script>
</body>
</html>
