<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工具箱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #131524;
            --bg-secondary: #131524;
            --bg-card: rgba(38, 41, 58, 0.65);
            --bg-card-hover: rgba(46, 49, 69, 0.75);
            --accent-blue: #5b8def;
            --accent-blue-light: #7ca6f3;
            --accent-cyan: #4ecdc4;
            --accent-green: #5dbe8d;
            --accent-orange: #f4a261;
            --accent-purple: #9b8bf4;
            --text-primary: #e8eaf0;
            --text-secondary: #9aa3b2;
            --text-tertiary: #6b7280;
            --border-subtle: rgba(91, 141, 239, 0.15);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: calc(80px + env(safe-area-inset-bottom));
        }

        /* 页面标题 */
        .page-title {
            text-align: center;
            padding: 20px;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* 主内容 */
        .main-content {
            flex: 1;
            padding: 20px;
        }

        /* 工具卡片网格 */
        .tools-section {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px;
            padding-bottom: 60px;
            margin-bottom: 16px;
            border: 1px solid var(--border-subtle);
        }

        .tools-section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        /* 工具卡片 */
        .tool-card {
            border-radius: 10px;
            padding: 12px 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 1px solid transparent;
        }

        .tool-card:hover {
            border-color: var(--accent-blue);
        }

        .tool-card:hover .tool-icon {
            transform: scale(1.1);
        }

        .tool-card:active {
            transform: scale(0.95);
        }

        .tool-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .tool-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 6px;
            transition: transform 0.2s ease;
        }

        .tool-icon svg {
            width: 20px;
            height: 20px;
            fill: var(--text-primary);
            opacity: 0.8;
        }

        .tool-icon.speedtest {
            background: rgba(93, 190, 141, 0.15);
        }

        .tool-icon.speedtest svg {
            fill: var(--accent-green);
            opacity: 1;
        }

        .tool-icon.ping {
            background: rgba(91, 141, 239, 0.15);
        }

        .tool-icon.ping svg {
            fill: var(--accent-blue);
            opacity: 1;
        }

        .tool-icon.video {
            background: rgba(244, 162, 97, 0.15);
        }

        .tool-icon.video svg {
            fill: var(--accent-orange);
            opacity: 1;
        }

        .tool-icon.wifi {
            background: rgba(91, 141, 239, 0.15);
        }

        .tool-icon.wifi svg {
            fill: var(--accent-blue);
            opacity: 1;
        }

        .tool-icon.signal {
            background: rgba(78, 205, 196, 0.15);
        }

        .tool-icon.signal svg {
            fill: var(--accent-cyan);
            opacity: 1;
        }

        .tool-icon.scan {
            background: rgba(155, 139, 244, 0.15);
        }

        .tool-icon.scan svg {
            fill: var(--accent-purple);
            opacity: 1;
        }

        /* WiFi信息卡片 */
        .wifi-info-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            border: 1px solid var(--border-subtle);
        }

        .wifi-info-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .wifi-name {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .wifi-icon-wrap {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wifi-icon-wrap svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        .wifi-ssid {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .wifi-status {
            font-size: 12px;
            color: var(--accent-green);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .wifi-status::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-green);
        }

        .wifi-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .wifi-detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }

        .wifi-detail-label {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .wifi-detail-value {
            font-size: 13px;
            color: var(--text-primary);
            font-weight: 500;
        }

        .wifi-chart-card {
            background: transparent;
            padding: 12px 0;
            margin-top: 8px;
        }

        .wifi-chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .wifi-chart-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .wifi-chart-time {
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .wifi-chart-container {
            position: relative;
            height: 60px;
        }

        .wifi-chart-line {
            fill: none;
            stroke: url(#wifiSignalLineGradient);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .wifi-chart-area {
            fill: url(#wifiSignalAreaGradient);
        }

        .tool-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .tool-name {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .tool-desc {
            font-size: 10px;
            color: var(--text-tertiary);
            line-height: 1.2;
        }

        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(22, 27, 34, 0.98);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 calc(12px + env(safe-area-inset-bottom));
            z-index: 100;
            max-width: 480px;
            margin: 0 auto;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 6px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            border-radius: 12px;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            background: rgba(88, 166, 255, 0.1);
        }

        .nav-item.active .nav-icon {
            fill: var(--accent-blue);
        }

        .nav-item.active .nav-label {
            color: var(--accent-blue);
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            fill: var(--text-tertiary);
            transition: all 0.2s ease;
        }

        .nav-label {
            font-size: 11px;
            color: var(--text-tertiary);
            transition: all 0.2s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 页面标题 -->
        <div class="page-title">工具箱</div>

        <!-- 主内容 -->
        <main class="main-content">
            <!-- WiFi信息卡片 -->
            <div class="wifi-info-card">
                <div class="wifi-info-header">
                    <div class="wifi-name">
                        <div class="wifi-icon-wrap">
                            <svg viewBox="0 0 24 24">
                                <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/>
                            </svg>
                        </div>
                        <span class="wifi-ssid">TP-LINK_5G_XXXX</span>
                    </div>
                    <span class="wifi-status">已连接</span>
                </div>
                <div class="wifi-details">
                    <div class="wifi-detail-item">
                        <span class="wifi-detail-label">信号强度</span>
                        <span class="wifi-detail-value">-45 dBm</span>
                    </div>
                    <div class="wifi-detail-item">
                        <span class="wifi-detail-label">频段</span>
                        <span class="wifi-detail-value">5 GHz</span>
                    </div>
                    <div class="wifi-detail-item">
                        <span class="wifi-detail-label">信道</span>
                        <span class="wifi-detail-value">149</span>
                    </div>
                    <div class="wifi-detail-item">
                        <span class="wifi-detail-label">网关地址</span>
                        <span class="wifi-detail-value">192.168.1.1</span>
                    </div>
                </div>
                <div class="wifi-chart-card">
                    <div class="wifi-chart-header">
                        <span class="wifi-chart-title">信号强度趋势</span>
                        <span class="wifi-chart-time" id="wifiChartTime">00:00</span>
                    </div>
                    <div class="wifi-chart-container">
                        <svg class="wifi-chart-svg" viewBox="0 0 280 80" preserveAspectRatio="none">
                            <defs>
                                <linearGradient id="wifiSignalLineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#5b8def;stop-opacity:1" />
                                </linearGradient>
                                <linearGradient id="wifiSignalAreaGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                    <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:0.3" />
                                    <stop offset="100%" style="stop-color:#4ecdc4;stop-opacity:0" />
                                </linearGradient>
                            </defs>
                            <path class="wifi-chart-area" id="wifiSignalArea" d="M 0,80 L 0,80 L 280,80 L 280,80 Z"/>
                            <path class="wifi-chart-line" id="wifiSignalLine" d="M 0,80 L 280,80"/>
                        </svg>
                    </div>
                </div>
            </div>

            <!-- 工具网格 -->
            <div class="tools-section">
                <div class="tools-section-title">网络工具</div>
                <div class="tools-grid">
                <!-- 网络测速卡片 -->
                <div class="tool-card" onclick="location.href='wifi-diagnosis.html'">
                    <div class="tool-header">
                        <div class="tool-icon speedtest">
                            <svg viewBox="0 0 24 24">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                            </svg>
                        </div>
                        <div class="tool-info">
                            <div class="tool-name">网络测速</div>
                            <div class="tool-desc">测试网络速度</div>
                        </div>
                    </div>
                </div>

                <!-- Ping测试卡片 -->
                <div class="tool-card" onclick="location.href='ping-diagnosis.html'">
                    <div class="tool-header">
                        <div class="tool-icon ping">
                            <svg viewBox="0 0 24 24">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                            </svg>
                        </div>
                        <div class="tool-info">
                            <div class="tool-name">Ping测试</div>
                            <div class="tool-desc">检测网络延迟</div>
                        </div>
                    </div>
                </div>

                <!-- 视频测试卡片 -->
                <div class="tool-card">
                    <div class="tool-header">
                        <div class="tool-icon video">
                            <svg viewBox="0 0 24 24">
                                <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
                            </svg>
                        </div>
                        <div class="tool-info">
                            <div class="tool-name">视频测试</div>
                            <div class="tool-desc">检测视频性能</div>
                        </div>
                    </div>
                </div>

                <!-- 信号检测卡片 -->
                <div class="tool-card" onclick="location.href='signal-detection.html'">
                    <div class="tool-header">
                        <div class="tool-icon signal">
                            <svg viewBox="0 0 24 24">
                                <path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/>
                            </svg>
                        </div>
                        <div class="tool-info">
                            <div class="tool-name">信号检测</div>
                            <div class="tool-desc">监测信号变化</div>
                        </div>
                    </div>
                </div>

                <!-- WiFi诊断卡片 -->
                <div class="tool-card" onclick="location.href='index.html'">
                    <div class="tool-header">
                        <div class="tool-icon wifi">
                            <svg viewBox="0 0 24 24">
                                <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/>
                            </svg>
                        </div>
                        <div class="tool-info">
                            <div class="tool-name">WiFi诊断</div>
                            <div class="tool-desc">诊断WiFi状态</div>
                        </div>
                    </div>
                </div>

                <!-- 内网扫描卡片 -->
                <div class="tool-card" onclick="location.href='network-scan.html'">
                    <div class="tool-header">
                        <div class="tool-icon scan">
                            <svg viewBox="0 0 24 24">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                            </svg>
                        </div>
                        <div class="tool-info">
                            <div class="tool-name">内网扫描</div>
                            <div class="tool-desc">扫描内网设备</div>
                    </div>
                </div>
            </div>
            </div>
        </main>
    </div>

    <!-- 底部导航 -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
                <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/>
            </svg>
            <span class="nav-label">WiFi诊断</span>
        </a>
        <a href="toolbox.html" class="nav-item active">
            <svg class="nav-icon" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
            </svg>
            <span class="nav-label">工具箱</span>
        </a>
        <a href="knowledge-base.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/>
            </svg>
            <span class="nav-label">知识库</span>
        </a>
        <a href="profile.html" class="nav-item">

            </svg>
            <span class="nav-label">我的</span>
        </a>
    </nav>

    <script>
        let wifiSignalData = [];
        let wifiChartInterval = null;
        let wifiStartTime = null;
        let wifiElapsedSeconds = 0;
        const maxWifiSignals = 15;

        function initWifiChart() {
            wifiSignalData = [];
            wifiElapsedSeconds = 0;
            wifiStartTime = Date.now();
            updateWifiChart();
            if (wifiChartInterval) clearInterval(wifiChartInterval);
            wifiChartInterval = setInterval(() => {
                wifiElapsedSeconds++;
                document.getElementById('wifiChartTime').textContent = formatTime(wifiElapsedSeconds);
                const signal = Math.round(-40 - Math.random() * 30);
                wifiSignalData.push(signal);
                if (wifiSignalData.length > maxWifiSignals) {
                    wifiSignalData.shift();
                }
                updateWifiChart();
            }, 1000);
        }

        function updateWifiChart() {
            const signalLine = document.getElementById('wifiSignalLine');
            const signalArea = document.getElementById('wifiSignalArea');
            if (!signalLine || !signalArea || wifiSignalData.length < 2) return;

            const width = 280;
            const height = 50;
            const xStep = width / (maxWifiSignals - 1);
            const yMin = -100;
            const yMax = -20;

            let linePath = '';
            let areaPath = '';
            const startX = 0;

            wifiSignalData.forEach((val, i) => {
                const x = startX + i * xStep;
                const y = height - ((val - yMin) / (yMax - yMin)) * height;
                if (i === 0) {
                    linePath = `M ${x},${y}`;
                    areaPath = `M ${x},${height} L ${x},${y}`;
                } else {
                    linePath += ` L ${x},${y}`;
                    areaPath += ` L ${x},${y}`;
                }
            });

            const lastX = startX + (wifiSignalData.length - 1) * xStep;
            areaPath += ` L ${lastX},${height} Z`;

            signalLine.setAttribute('d', linePath);
            signalArea.setAttribute('d', areaPath);
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        document.addEventListener('DOMContentLoaded', initWifiChart);
    </script>
</body>
