<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #131524;
            --bg-secondary: #131524;
            --bg-card: rgba(38, 41, 58, 0.65);
            --bg-card-hover: rgba(46, 49, 69, 0.75);
            --accent-blue: #5b8def;
            --accent-blue-light: #7ca6f3;
            --accent-cyan: #4ecdc4;
            --accent-green: #5dbe8d;
            --accent-orange: #f4a261;
            --accent-purple: #9b8bf4;
            --accent-gold: #e3b341;
            --text-primary: #e8eaf0;
            --text-secondary: #9aa3b2;
            --text-tertiary: #6b7280;
            --border-subtle: rgba(91, 141, 239, 0.15);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 头部用户信息 */
        .header {
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.8) 0%, rgba(13, 17, 23, 0) 100%);
            padding: 40px 20px 24px 20px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-avatar {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 16px rgba(91, 141, 239, 0.3);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .user-avatar:hover {
            transform: scale(1.05);
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }


        .user-phone {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .user-badges {
            display: flex;
            gap: 8px;
        }

        .user-badge {
            padding: 3px 10px;
            background: rgba(91, 141, 239, 0.15);
            border-radius: 12px;
            font-size: 11px;
            color: var(--accent-blue);
            border: 1px solid rgba(91, 141, 239, 0.2);
        }

        .user-badge.wechat {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-green);
            border-color: rgba(16, 185, 129, 0.2);
        }

        .user-badge.staff {
            background: rgba(155, 139, 244, 0.15);
            color: var(--accent-purple);
            border-color: rgba(155, 139, 244, 0.2);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .user-badge.staff svg {
            width: 12px;
            height: 12px;
            fill: var(--accent-purple);
        }

        /* 积分卡片 - 精致小巧版 */
        .points-section {
            padding: 12px 20px;
        }

        .points-card {
            background: linear-gradient(135deg, rgba(91, 141, 239, 0.15) 0%, rgba(78, 205, 196, 0.15) 100%);
            border-radius: 12px;
            padding: 16px 20px;
            border: 1px solid rgba(91, 141, 239, 0.15);
            position: relative;
            overflow: hidden;
        }


        .points-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .points-label {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .points-label svg {
            width: 14px;
            height: 14px;
            fill: var(--accent-gold);
        }

        .points-rules {
            font-size: 11px;
            color: var(--accent-blue);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 2px;
            opacity: 0.8;
            padding: 8px 12px;
            margin: -8px -12px;
            border-radius: 8px;
            transition: all 0.2s ease;
            background: transparent;
            border: none;
            font-family: inherit;
        }

        .points-rules:hover {
            opacity: 1;
            background: rgba(91, 141, 239, 0.1);
        }

        .points-rules:active {
            background: rgba(91, 141, 239, 0.2);
        }

        .points-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.2);
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .points-value::after {
            content: '积分';
            font-size: 12px;
            font-weight: 400;
            color: var(--text-secondary);
        }

        .points-actions {
            display: flex;
            gap: 8px;
        }

        .points-btn {
            flex: 1;
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .points-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .points-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        .points-btn.primary {
            background: linear-gradient(270deg, #00c6ff 0%, #0072ff 100%);
            border: none;
            box-shadow: 0 2px 8px rgba(0, 114, 255, 0.25);
        }

        .points-btn.primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 114, 255, 0.35);
        }

        /* 功能菜单 */
        .menu-section {
            padding: 0 20px;
        }

        .menu-group {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-subtle);
            margin-bottom: 12px;
            overflow: hidden;
        }

        .menu-title {
            padding: 12px 16px;
            font-size: 12px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .menu-list {
            display: flex;
            flex-direction: column;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 1px solid var(--border-subtle);
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .menu-icon {
            width: 40px;
            height: 40px;
            background: rgba(91, 141, 239, 0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .menu-icon svg {
            width: 20px;
            height: 20px;
            fill: url(#iconGradient);
        }

        .menu-icon.green {
            background: rgba(16, 185, 129, 0.15);
        }

        .menu-icon.green svg {
            fill: var(--accent-green);
        }

        .menu-icon.orange {
            background: rgba(240, 136, 62, 0.15);
        }

        .menu-icon.orange svg {
            fill: var(--accent-orange);
        }

        .menu-icon.blue {
            background: rgba(91, 141, 239, 0.15);
        }

        .menu-icon.blue svg {
            fill: var(--accent-blue);
        }

        .menu-icon.purple {
            background: rgba(163, 113, 247, 0.15);
        }

        .menu-icon.purple svg {
            fill: var(--accent-purple);
        }

        .menu-icon.red {
            background: rgba(248, 81, 73, 0.15);
        }

        .menu-icon.red svg {
            fill: #f85149;
        }

        .menu-content {
            flex: 1;
        }

        .menu-label {
            font-size: 14px;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .menu-desc {
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .menu-arrow {
            width: 20px;
            height: 20px;
            fill: var(--text-tertiary);
        }

        .menu-badge {
            padding: 2px 8px;
            background: rgba(240, 136, 62, 0.15);
            border-radius: 10px;
            font-size: 11px;
            color: var(--accent-orange);
            margin-right: 8px;
        }

        .menu-badge.new {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: #fff;
            font-weight: 600;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(22, 27, 34, 0.98);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 calc(12px + env(safe-area-inset-bottom));
            z-index: 100;
            max-width: 480px;
            margin: 0 auto;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 6px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            border-radius: 12px;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            background: rgba(88, 166, 255, 0.1);
        }

        .nav-item.active .nav-icon {
            fill: var(--accent-blue);
        }

        .nav-item.active .nav-label {
            color: var(--accent-blue);
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            fill: var(--text-tertiary);
            transition: all 0.2s ease;
        }

        .nav-label {
            font-size: 11px;
            color: var(--text-tertiary);
            transition: all 0.2s ease;
        }

        /* 安全区域 */
        .safe-area-bottom {
            height: calc(60px + env(safe-area-inset-bottom));
        }

        /* 满意度反馈 */
        .feedback-section {
            padding: 0 20px 20px 20px;
            margin-bottom: 30px;
        }

        .feedback-card {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-subtle);
            padding: 20px;
        }

        .feedback-header {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .feedback-icon {
            width: 20px;
            height: 20px;
            fill: var(--accent-orange);
        }

        .feedback-item {
            margin-bottom: 24px;
        }

        .feedback-item:last-of-type {
            margin-bottom: 0;
        }

        .feedback-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .star-rating {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stars-container {
            display: flex;
            gap: 6px;
        }

        .star {
            width: 22px;
            height: 22px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .star svg {
            width: 100%;
            height: 100%;
            fill: transparent;
            stroke: #FFD700;
            stroke-width: 1.5;
            transition: all 0.2s ease;
        }

        .star.filled svg {
            fill: #FFD700;
            stroke: #FFD700;
        }

        .star:hover svg {
            transform: scale(1.1);
            filter: drop-shadow(0 0 4px rgba(255, 215, 0, 0.5));
        }

        .star-rating-text {
            font-size: 14px;
            color: #FFD700;
            font-weight: 600;
            margin-left: 8px;
        }

        .feedback-submit {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(270deg, #00c6ff 0%, #0072ff 100%);
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            margin-top: 24px;
            transition: all 0.3s ease;
        }

        .feedback-submit:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(0, 114, 255, 0.4);
        }

        .feedback-submit:disabled {
            background: linear-gradient(270deg, #3a4a5c 0%, #2d3a4a 100%);
            cursor: not-allowed;
            box-shadow: none;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- SVG渐变定义 -->
        <svg width="0" height="0" style="position: absolute;">
            <defs>
                <linearGradient id="iconGradient" x1="0%" y1="100%" x2="0%" y2="0%">
                    <stop offset="0%" style="stop-color:#5b8def;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#4ecdc4;stop-opacity:1" />
                </linearGradient>
            </defs>
        </svg>

        <!-- 头部用户信息 -->
        <header class="header">

                    </svg>
                </div>
                <div class="user-info">
                    <div class="user-name">
                        张先生
                    </div>
                    <div class="user-phone">138****5678</div>
                    <div class="user-badges">
                        <span class="user-badge wechat">微信已绑定</span>
                        <span class="user-badge staff">
                            装维人员
                        </span>
                    </div>
                </div>
            </div>
        </header>

        <!-- 积分卡片 -->
        <section class="points-section">
            <div class="points-card">
                <div class="points-header">
                    <div class="points-label">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                        </svg>
                        我的积分
                    </div>
                    <button class="points-rules" onclick="showPointsHistory()">
                        积分明细
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/>
                        </svg>
                    </button>
                </div>
                <div class="points-value">2,580</div>
                <div class="points-actions">
                    <button class="points-btn primary" onclick="openPointsMall()">
                        <svg viewBox="0 0 24 24">
                            <path d="M19 6h-2c0-2.76-2.24-5-5-5S7 3.24 7 6H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-7-3c1.66 0 3 1.34 3 3H9c0-1.66 1.34-3 3-3zm7 17H5V8h14v12zm-7-8c-1.66 0-3-1.34-3-3H7c0 2.76 2.24 5 5 5s5-2.24 5-5h-2c0 1.66-1.34 3-3 3z"/>
                        </svg>
                        积分商城
                    </button>
                    <button class="points-btn" onclick="goToEarnPoints()">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1.41 16.09V20h-2.67v-1.93c-1.71-.36-3.16-1.46-3.27-3.4h1.96c.1 1.05.82 1.87 2.65 1.87 1.96 0 2.4-.98 2.4-1.59 0-.83-.44-1.61-2.67-2.14-2.48-.6-4.18-1.62-4.18-3.67 0-1.72 1.39-2.84 3.11-3.21V4h2.67v1.95c1.86.45 2.79 1.86 2.85 3.39H14.3c-.05-1.11-.64-1.87-2.22-1.87-1.5 0-2.4.68-2.4 1.64 0 .84.65 1.39 2.67 1.91s4.18 1.39 4.18 3.91c-.01 1.83-1.38 2.83-3.12 3.16z"/>
                        </svg>
                        赚积分
                    </button>
                </div>
            </div>
        </section>

        <!-- 功能菜单 -->
        <section class="menu-section">
            <!-- 装维人员入口 -->

                            </svg>
                        </div>
                        <div class="menu-content">

                    </div>
                    <div class="menu-item" onclick="goToStaffInvitation()">
                        <div class="menu-icon blue">

                        </div>
                        <div class="menu-content">

                        </div>
                        <svg class="menu-arrow" viewBox="0 0 24 24">
                            <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/>
                        </svg>
                    </div>

                            <svg viewBox="0 0 24 24">
                                <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
                            </svg>
                        </div>
                        <div class="menu-content">

                            <div class="menu-desc">管理已绑定的客户，查看客户信息和测速记录</div>
                        </div>
                        <span class="menu-badge">12</span>
                        <svg class="menu-arrow" viewBox="0 0 24 24">
                            <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/>
                        </svg>
                    </div> -->
                </div>
            </div>

            <!-- 测试相关 -->
            <div class="menu-group">
                <div class="menu-title">测试服务</div>
                <div class="menu-list">
                    <div class="menu-item" onclick="goToHistoryReports()">
                        <div class="menu-icon">
                            <svg viewBox="0 0 24 24">
                                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
                            </svg>
                        </div>
                        <div class="menu-content">
                            <div class="menu-label">历史报告</div>
                            <div class="menu-desc">查看测速、WiFi检测、故障诊断记录</div>
                        </div>
                        <svg class="menu-arrow" viewBox="0 0 24 24">
                            <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/>
                        </svg>
                    </div>
                    <div class="menu-item" onclick="goToAppointments()">

    <script>
        // 显示积分规则
        function showPointsRules() {

        function goToStaffInvitation() {

        }

        // 前往绑定客户管理
        function goToCustomerManagement() {
            window.location.href = 'customer-management.html';
        }

        // 评分数据存储
        let serviceRating = 0;
        let qualityRating = 0;
        let hoverServiceRating = 0;
        let hoverQualityRating = 0;

        // 检查是否可以提交
        function checkCanSubmit() {
            const submitBtn = document.getElementById('feedbackSubmitBtn');
            if (serviceRating > 0 && qualityRating > 0) {
                submitBtn.disabled = false;
            } else {
                submitBtn.disabled = true;
            }
        }

        // 设置星星评分
        function setStarRating(type, rating) {
            if (type === 'service') {
                serviceRating = rating;
            } else {
                qualityRating = rating;
            }
            updateStarDisplay(type);
            checkCanSubmit();
        }

        // 悬停星星评分
        function hoverStarRating(type, rating) {
            if (type === 'service') {
                hoverServiceRating = rating;
            } else {
                hoverQualityRating = rating;
            }
            updateStarHoverDisplay(type, rating);
        }

        // 重置悬停状态
        function resetStarHover(type) {
            if (type === 'service') {
                hoverServiceRating = 0;
            } else {
                hoverQualityRating = 0;
            }
            updateStarDisplay(type);
        }

        // 更新星星显示
        function updateStarDisplay(type) {
            const rating = type === 'service' ? serviceRating : qualityRating;
            const containerId = type === 'service' ? 'serviceStars' : 'qualityStars';
            const textId = type === 'service' ? 'serviceRatingText' : 'qualityRatingText';
            const stars = document.getElementById(containerId).querySelectorAll('.star');
            
            stars.forEach((star, index) => {
                if (index < rating) {
                    star.classList.add('filled');
                } else {
                    star.classList.remove('filled');
                }
            });
            
            document.getElementById(textId).textContent = rating > 0 ? rating + '分' : '';
        }

        // 更新星星悬停显示
        function updateStarHoverDisplay(type, hoverRating) {
            const containerId = type === 'service' ? 'serviceStars' : 'qualityStars';
            const textId = type === 'service' ? 'serviceRatingText' : 'qualityRatingText';
            const stars = document.getElementById(containerId).querySelectorAll('.star');
            const currentRating = type === 'service' ? serviceRating : qualityRating;
            
            stars.forEach((star, index) => {
                if (index < hoverRating) {
                    star.classList.add('filled');
                } else {
                    star.classList.remove('filled');
                }
            });
            
            document.getElementById(textId).textContent = hoverRating + '分';
        }

        // 提交反馈
        function submitFeedback() {
            if (serviceRating === 0 || qualityRating === 0) {
                return;
            }
            
            // 模拟提交
            const btn = document.getElementById('feedbackSubmitBtn');
            btn.disabled = true;
            btn.textContent = '提交中...';
            
            setTimeout(() => {
                alert('感谢您的评价！\n\n装维服务评分：' + serviceRating + '分\n宽带质量评分：' + qualityRating + '分');
                btn.disabled = true;
                btn.textContent = '提交评价';
                
                // 重置评分
                serviceRating = 0;
                qualityRating = 0;
                updateStarDisplay('service');
                updateStarDisplay('quality');
            }, 1000);
        }

        // 底部导航
        function goToHome() {
            window.location.href = 'index.html';
        }

        function goToTools() {
            window.location.href = 'toolbox.html';
        }

        }
